<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700">
<defs>
  <radialGradient id="n5bg" cx="50%" cy="15%" r="90%">
    <stop offset="0%" stop-color="#1a0e2e"/>
    <stop offset="40%" stop-color="#0f0a1a"/>
    <stop offset="100%" stop-color="#060010"/>
  </radialGradient>
  <radialGradient id="n5sun" cx="50%" cy="12%" r="25%">
    <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.15"/>
    <stop offset="50%" stop-color="#ff8800" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#060010" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="n5neb" cx="30%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#2a1050" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#060010" stop-opacity="0"/>
  </radialGradient>
</defs>
<!-- Space gradient -->
<rect width="400" height="700" fill="url(#n5bg)"/>
<!-- Sun glow at top -->
<rect width="400" height="700" fill="url(#n5sun)"/>
<!-- Nebula hint -->
<rect width="400" height="700" fill="url(#n5neb)"/>
<!-- Stars -->
<circle cx="30" cy="60" r="1.3" fill="#fff" opacity="0.8"/>
<circle cx="130" cy="35" r="0.7" fill="#ffee88" opacity="0.7"/>
<circle cx="280" cy="50" r="1.1" fill="#fff" opacity="0.85"/>
<circle cx="370" cy="90" r="0.9" fill="#ffdd66" opacity="0.6"/>
<circle cx="60" cy="170" r="1" fill="#fff" opacity="0.7"/>
<circle cx="200" cy="200" r="0.8" fill="#ffee88" opacity="0.65"/>
<circle cx="340" cy="230" r="1.4" fill="#fff" opacity="0.8"/>
<circle cx="90" cy="320" r="0.7" fill="#fff" opacity="0.6"/>
<circle cx="250" cy="370" r="1.2" fill="#ffdd66" opacity="0.75"/>
<circle cx="50" cy="460" r="1" fill="#fff" opacity="0.7"/>
<circle cx="310" cy="500" r="0.8" fill="#ffee88" opacity="0.65"/>
<circle cx="180" cy="560" r="1.3" fill="#fff" opacity="0.8"/>
<circle cx="360" cy="620" r="0.9" fill="#fff" opacity="0.7"/>
<circle cx="80" cy="660" r="1.1" fill="#ffdd66" opacity="0.6"/>
<!-- Sun rays (very faint, top area) -->
<g opacity="0.08" stroke="#ffcc44" stroke-width="1.5" stroke-linecap="round">
  <line x1="200" y1="45" x2="200" y2="0"/>
  <line x1="200" y1="45" x2="155" y2="5" />
  <line x1="200" y1="45" x2="245" y2="5" />
  <line x1="200" y1="45" x2="120" y2="25"/>
  <line x1="200" y1="45" x2="280" y2="25"/>
  <line x1="200" y1="45" x2="100" y2="55"/>
  <line x1="200" y1="45" x2="300" y2="55"/>
</g>
<!-- Star trail path (faint, center column) -->
<g opacity="0.1">
  <circle cx="200" cy="150" r="2" fill="#ffee88"/>
  <circle cx="200" cy="200" r="2" fill="#ffee88"/>
  <circle cx="200" cy="250" r="2" fill="#ffee88"/>
  <circle cx="200" cy="300" r="2" fill="#ffee88"/>
  <circle cx="200" cy="350" r="2" fill="#ffee88"/>
  <circle cx="200" cy="400" r="2" fill="#ffee88"/>
  <circle cx="200" cy="450" r="2" fill="#ffee88"/>
  <circle cx="200" cy="500" r="2" fill="#ffee88"/>
  <circle cx="200" cy="550" r="2" fill="#ffee88"/>
  <circle cx="200" cy="600" r="2" fill="#ffee88"/>
</g>
</svg>