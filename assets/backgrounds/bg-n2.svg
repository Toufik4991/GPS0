<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="50%" cy="100%" r="85%">
      <stop offset="0%" stop-color="#4a1800"/>
      <stop offset="35%" stop-color="#1e0c08"/>
      <stop offset="70%" stop-color="#0e0610"/>
      <stop offset="100%" stop-color="#060310"/>
    </radialGradient>
    <radialGradient id="lava-glow" cx="50%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#ff5200" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#cc2800" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff3000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lava2" cx="20%" cy="100%" r="35%">
      <stop offset="0%" stop-color="#ff7000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff3000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lava3" cx="80%" cy="100%" r="35%">
      <stop offset="0%" stop-color="#ff6000" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff3000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ciel volcanique -->
  <rect width="390" height="844" fill="url(#sky)"/>
  <rect width="390" height="844" fill="url(#lava-glow)"/>
  <rect width="390" height="844" fill="url(#lava2)"/>
  <rect width="390" height="844" fill="url(#lava3)"/>

  <!-- Étoiles lointaines (petites, tamisées par la chaleur) -->
  <circle cx="32" cy="45" r="1" fill="rgba(255,220,180,0.4)"/>
  <circle cx="78" cy="92" r="1.5" fill="rgba(255,200,150,0.3)"/>
  <circle cx="145" cy="28" r="1" fill="rgba(255,230,190,0.35)"/>
  <circle cx="210" cy="65" r="1.2" fill="rgba(255,210,160,0.28)"/>
  <circle cx="290" cy="38" r="1" fill="rgba(255,220,170,0.38)"/>
  <circle cx="355" cy="80" r="1.5" fill="rgba(255,200,140,0.3)"/>
  <circle cx="55" cy="130" r="1" fill="rgba(255,215,170,0.22)"/>
  <circle cx="170" cy="110" r="1.2" fill="rgba(255,225,185,0.28)"/>
  <circle cx="320" cy="125" r="1" fill="rgba(255,210,160,0.25)"/>
  <circle cx="22" cy="200" r="1" fill="rgba(255,200,140,0.2)"/>
  <circle cx="380" cy="160" r="1" fill="rgba(255,215,165,0.22)"/>
  <circle cx="110" cy="185" r="1.5" fill="rgba(255,220,175,0.18)"/>

  <!-- Brume volcanique haute -->
  <ellipse cx="80" cy="120" rx="140" ry="60" fill="rgba(80,30,10,0.18)"/>
  <ellipse cx="310" cy="90" rx="120" ry="50" fill="rgba(60,20,8,0.15)"/>
  <ellipse cx="195" cy="200" rx="180" ry="80" fill="rgba(40,15,5,0.12)"/>

  <!-- Silhouette volcanique lointaine (milieu) -->
  <path d="M0,760 L45,680 L80,720 L120,640 L160,700 L205,590 L250,700 L290,635 L340,710 L375,670 L390,760 Z" fill="#1a0800" opacity="0.85"/>
  <!-- Lueur sommet volcans -->
  <ellipse cx="205" cy="595" rx="22" ry="12" fill="rgba(255,80,0,0.35)"/>
  <ellipse cx="120" cy="645" rx="16" ry="8" fill="rgba(255,60,0,0.25)"/>
  <ellipse cx="290" cy="638" rx="14" ry="7" fill="rgba(255,70,0,0.22)"/>

  <!-- Coulées de lave sur les volcans -->
  <path d="M205,595 Q208,620 206,650 Q204,660 207,680 Q205,700 204,720" stroke="rgba(255,100,0,0.4)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M120,645 Q122,665 119,685 Q118,700 120,715" stroke="rgba(255,80,0,0.3)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Sol de lave en bas -->
  <path d="M0,820 Q50,800 100,815 Q150,828 200,808 Q250,795 300,810 Q350,822 390,805 L390,844 L0,844 Z" fill="rgba(200,50,0,0.7)"/>
  <path d="M0,830 Q80,815 160,828 Q240,840 320,820 Q355,812 390,825 L390,844 L0,844 Z" fill="rgba(255,80,0,0.5)"/>
  <!-- Lueur lave sol intense -->
  <rect x="0" y="780" width="390" height="64" fill="url(#lava-glow)" opacity="0.6"/>

  <!-- Particules cendres statiques (quelques) -->
  <circle cx="60" cy="300" r="1.2" fill="rgba(100,80,60,0.4)"/>
  <circle cx="180" cy="280" r="0.8" fill="rgba(90,70,55,0.35)"/>
  <circle cx="320" cy="320" r="1.5" fill="rgba(110,85,65,0.3)"/>
  <circle cx="240" cy="450" r="1" fill="rgba(95,75,58,0.28)"/>
  <circle cx="70" cy="480" r="1.3" fill="rgba(105,82,63,0.32)"/>
  <circle cx="350" cy="400" r="0.9" fill="rgba(88,68,52,0.25)"/>
</svg>
