  </radialGradient>
</defs>
<!-- Background -->
<rect width="400" height="700" fill="url(#n7bg)"/>
<rect width="400" height="700" fill="url(#n7neb1)"/>
<rect width="400" height="700" fill="url(#n7neb2)"/>
