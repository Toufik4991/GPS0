<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700">
<defs>
  <radialGradient id="n7bg" cx="50%" cy="35%" r="85%">
    <stop offset="0%" stop-color="#0f1230"/>
    <stop offset="50%" stop-color="#0a0a1a"/>
    <stop offset="100%" stop-color="#050508"/>
  </radialGradient>
  <radialGradient id="n7neb1" cx="20%" cy="20%" r="40%">
