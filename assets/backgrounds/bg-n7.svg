  <line x1="50" y1="35" x2="180" y2="55"/>
  <line x1="180" y1="55" x2="280" y2="160"/>
  <line x1="280" y1="160" x2="360" y2="310"/>
  <line x1="40" y1="260" x2="150" y2="400"/>
  <line x1="150" y1="400" x2="300" y2="450"/>
