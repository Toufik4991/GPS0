<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700">
<defs>
  <radialGradient id="n3space" cx="50%" cy="40%" r="80%">
    <stop offset="0%" stop-color="#0c1238"/>
    <stop offset="50%" stop-color="#050510"/>
    <stop offset="100%" stop-color="#020208"/>
  </radialGradient>
  <radialGradient id="n3neb" cx="30%" cy="25%" r="45%">
    <stop offset="0%" stop-color="#1a3060" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="n3neb2" cx="75%" cy="65%" r="40%">
    <stop offset="0%" stop-color="#182848" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
  </radialGradient>
  <filter id="n3glow">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Deep space -->
<rect width="400" height="700" fill="url(#n3space)"/>
<!-- Nebula patches -->
<rect width="400" height="700" fill="url(#n3neb)"/>
<rect width="400" height="700" fill="url(#n3neb2)"/>
