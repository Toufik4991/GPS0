<circle cx="80" cy="380" r="0.9" fill="#fff" opacity="0.7"/>
<circle cx="250" cy="420" r="1.2" fill="#aaddff" opacity="0.75"/>
<circle cx="370" cy="480" r="0.8" fill="#fff" opacity="0.65"/>
<circle cx="50" cy="520" r="1.3" fill="#88ccff" opacity="0.8"/>
