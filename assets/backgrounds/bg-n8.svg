<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700">
<defs>
  <linearGradient id="n8bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#080818"/>
    <stop offset="50%" stop-color="#0a0a14"/>
    <stop offset="100%" stop-color="#060610"/>
  </linearGradient>
  <radialGradient id="n8glow" cx="50%" cy="15%" r="40%">
    <stop offset="0%" stop-color="#c0b8d0" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#060610" stop-opacity="0"/>
  </radialGradient>
</defs>
<!-- Station dark bg -->
<rect width="400" height="700" fill="url(#n8bg)"/>
<rect width="400" height="700" fill="url(#n8glow)"/>
<!-- Metal panel grid (station walls) -->
<g stroke="#1a1a30" stroke-width="0.6" opacity="0.35">
  <!-- Vertical beams -->
  <line x1="44" y1="0" x2="44" y2="700"/>
  <line x1="89" y1="0" x2="89" y2="700"/>
  <line x1="133" y1="0" x2="133" y2="700"/>
  <line x1="178" y1="0" x2="178" y2="700"/>
  <line x1="222" y1="0" x2="222" y2="700"/>
  <line x1="267" y1="0" x2="267" y2="700"/>
  <line x1="311" y1="0" x2="311" y2="700"/>
  <line x1="356" y1="0" x2="356" y2="700"/>
  <!-- Horizontal beams (every ~78px) -->
  <line x1="0" y1="78" x2="400" y2="78"/>
  <line x1="0" y1="156" x2="400" y2="156"/>
  <line x1="0" y1="234" x2="400" y2="234"/>
  <line x1="0" y1="312" x2="400" y2="312"/>
  <line x1="0" y1="390" x2="400" y2="390"/>
  <line x1="0" y1="468" x2="400" y2="468"/>
  <line x1="0" y1="546" x2="400" y2="546"/>
  <line x1="0" y1="624" x2="400" y2="624"/>
</g>
<!-- Rivets at intersections (a few) -->
<g fill="#22223a" opacity="0.5">
  <circle cx="44" cy="78" r="2.5"/>
  <circle cx="178" cy="78" r="2.5"/>
  <circle cx="311" cy="78" r="2.5"/>
  <circle cx="89" cy="234" r="2.5"/>
  <circle cx="222" cy="234" r="2.5"/>
  <circle cx="356" cy="234" r="2.5"/>
  <circle cx="44" cy="390" r="2.5"/>
  <circle cx="178" cy="390" r="2.5"/>
  <circle cx="311" cy="390" r="2.5"/>
  <circle cx="89" cy="546" r="2.5"/>
  <circle cx="222" cy="546" r="2.5"/>
  <circle cx="356" cy="546" r="2.5"/>
</g>
<!-- Warning lights (small colored dots) -->
<g opacity="0.35">
  <circle cx="20" cy="40" r="3" fill="#ff4444"/>
  <circle cx="380" cy="40" r="3" fill="#ff4444"/>
  <circle cx="20" cy="350" r="3" fill="#ffaa00"/>
  <circle cx="380" cy="350" r="3" fill="#ffaa00"/>
  <circle cx="20" cy="660" r="3" fill="#44ff44"/>
  <circle cx="380" cy="660" r="3" fill="#44ff44"/>
</g>
<!-- Faint stars through viewport -->
<circle cx="200" cy="50" r="0.8" fill="#c0b8d0" opacity="0.5"/>
<circle cx="130" cy="120" r="0.6" fill="#fff" opacity="0.35"/>
<circle cx="300" cy="200" r="0.9" fill="#c0b8d0" opacity="0.45"/>
<circle cx="80" cy="450" r="0.7" fill="#fff" opacity="0.35"/>
<circle cx="350" cy="580" r="0.8" fill="#c0b8d0" opacity="0.4"/>
</svg>