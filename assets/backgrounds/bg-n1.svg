<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <radialGradient id="spaceBg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#0c1535"/>
      <stop offset="55%" stop-color="#070d20"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <radialGradient id="earth" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#7ad4f5" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#4090cc" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#205090" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#102040" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="earthAtmo" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#4FC3F7" stop-opacity="0.22"/>
    </radialGradient>
    <linearGradient id="moonSurf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f48" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#111424" stop-opacity="1"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep space base -->
  <rect width="390" height="844" fill="url(#spaceBg)"/>

  <!-- Stars — large/bright -->
  <circle cx="32"  cy="48"  r="1.8" fill="white" opacity="0.88"/>
  <circle cx="198" cy="22"  r="2.2" fill="white" opacity="0.95"/>
  <circle cx="312" cy="65"  r="1.6" fill="white" opacity="0.75"/>
  <circle cx="78"  cy="130" r="1.4" fill="white" opacity="0.7"/>
  <circle cx="255" cy="170" r="1.9" fill="white" opacity="0.85"/>
  <circle cx="360" cy="108" r="1.5" fill="white" opacity="0.72"/>
  <circle cx="44"  cy="260" r="1.7" fill="white" opacity="0.8"/>
  <circle cx="180" cy="310" r="2.0" fill="white" opacity="0.9"/>
  <circle cx="340" cy="280" r="1.3" fill="white" opacity="0.65"/>
  <circle cx="110" cy="400" r="1.6" fill="white" opacity="0.75"/>
  <circle cx="290" cy="380" r="1.4" fill="white" opacity="0.68"/>

  <!-- Stars — small -->
  <rect x="15"  y="90"  width="1.2" height="1.2" fill="white" opacity="0.55"/>
  <rect x="88"  y="55"  width="1.2" height="1.2" fill="white" opacity="0.5"/>
  <rect x="145" y="115" width="1.2" height="1.2" fill="white" opacity="0.6"/>
  <rect x="220" y="80"  width="1"   height="1"   fill="white" opacity="0.48"/>
  <rect x="270" y="140" width="1.2" height="1.2" fill="white" opacity="0.52"/>
  <rect x="330" y="40"  width="1"   height="1"   fill="white" opacity="0.6"/>
  <rect x="60"  y="185" width="1.2" height="1.2" fill="white" opacity="0.45"/>
  <rect x="160" y="230" width="1"   height="1"   fill="white" opacity="0.5"/>
  <rect x="306" cy="195" width="1.2" height="1.2" fill="white" opacity="0.55"/>
  <rect x="22"  y="340" width="1.2" height="1.2" fill="white" opacity="0.48"/>
  <rect x="375" y="220" width="1"   height="1"   fill="white" opacity="0.42"/>
  <rect x="230" y="290" width="1.2" height="1.2" fill="white" opacity="0.5"/>
  <rect x="130" y="460" width="1"   height="1"   fill="white" opacity="0.4"/>
  <rect x="355" y="340" width="1.2" height="1.2" fill="white" opacity="0.52"/>

  <!-- Nebula hint -->
  <ellipse cx="120" cy="200" rx="90" ry="60" fill="#1a3060" opacity="0.08"/>
  <ellipse cx="300" cy="150" rx="70" ry="45" fill="#200a40" opacity="0.07"/>

  <!-- Earth (top-right) -->
  <circle cx="330" cy="70" r="58" fill="url(#earth)"/>
  <!-- Earth clouds/land masses -->
  <ellipse cx="320" cy="52" rx="18" ry="8"  fill="white" opacity="0.12" transform="rotate(-20,320,52)"/>
  <ellipse cx="345" cy="78" rx="12" ry="5"  fill="white" opacity="0.1" transform="rotate(10,345,78)"/>
  <ellipse cx="308" cy="85" rx="22" ry="6"  fill="#356030" opacity="0.2" transform="rotate(-5,308,85)"/>
  <ellipse cx="342" cy="60" rx="14" ry="4"  fill="#356030" opacity="0.18" transform="rotate(15,342,60)"/>
  <!-- Atmosphere rim -->
  <circle cx="330" cy="70" r="62" fill="url(#earthAtmo)"/>
  <circle cx="330" cy="70" r="64" fill="none" stroke="#4FC3F7" stroke-width="3" opacity="0.18"/>

  <!-- Distant planet (left) -->
  <circle cx="28" cy="320" r="22" fill="#6a3a20" opacity="0.35"/>
  <circle cx="28" cy="320" r="24" fill="none" stroke="#a06040" stroke-width="2" opacity="0.15"/>

  <!-- Moon surface at bottom -->
  <path d="M0,740 Q50,720 100,730 Q150,738 195,718 Q240,700 280,722 Q320,742 360,715 Q375,708 390,720 L390,844 L0,844 Z" fill="url(#moonSurf)"/>
  <!-- Surface bumps -->
  <ellipse cx="55"  cy="760" rx="18" ry="5" fill="none" stroke="#3a4060" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="180" cy="775" rx="24" ry="7" fill="none" stroke="#3a4060" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="310" cy="755" rx="14" ry="4" fill="none" stroke="#3a4060" stroke-width="1.5" opacity="0.45"/>
  <!-- Foreground rocks -->
  <path d="M0,800 L18,775 L38,795 L60,768 L78,790 L0,790Z" fill="#1e2238" opacity="0.8"/>
  <path d="M350,810 L368,782 L385,800 L390,795 L390,810Z" fill="#1e2238" opacity="0.7"/>
</svg>
