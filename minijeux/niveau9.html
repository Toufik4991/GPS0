<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N9 Boss</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none;background:#000}
body{display:flex;flex-direction:column;height:100dvh}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:8px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:60px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#ffdd88}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:60px;text-align:right}
#boss-hp-wrap{width:100%;padding:4px 10px 0;background:rgba(0,0,0,.6);flex-shrink:0;z-index:20}
#boss-hp-label{font-size:.72rem;color:rgba(255,255,255,.7);text-align:center;margin-bottom:2px;letter-spacing:1px;text-transform:uppercase}
#boss-hp-bar-bg{height:10px;background:rgba(255,255,255,.1);border-radius:6px;border:1px solid rgba(255,255,255,.2);overflow:hidden}
#boss-hp-bar{height:100%;width:100%;border-radius:6px;transition:width .3s ease,background .5s ease;background:linear-gradient(90deg,#8844cc,#cc44ff)}
#game-container{position:relative;flex:1;overflow:hidden}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:30</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="boss-hp-wrap">
  <div id="boss-hp-label">LUNE MAL&#201;FIQUE &#8212; <span id="boss-hp-pct">100%</span></div>
  <div id="boss-hp-bar-bg"><div id="boss-hp-bar"></div></div>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
'use strict';
window.NIVEAU = 9;
window.GPS0_TIMER_SEC = 150;
window.GPS0_MAX_LIVES = 3;
window.TUTO_TEXT = "&#127769; Affronte la Lune Mal&#233;fique !<br>Collecte les <span style='color:#ff4466'>&#128165; poussi&#232;res rouges</span> pour affaiblir le boss.<br><br>&#128066; <b>Touche GAUCHE = Glisser</b><br>&#128065; <b>Touche DROITE = Sauter</b>";

const GY = 0.78;
const PX = 0.18;
const HP_MAX = 100;

let cv, ctx, W, H;
let phase, bossHp, totalDust;
let player, projs, dustItems, meteors, shocks, parts, platforms, bullets;
let finalDust, finalDustSpawned;
let phaseTimer, transitioning;
let p1done, p2done, p3done;
let scrollX, bossScale, bossFlash;
let gravInv, gravActive, gravTime;
let laserOn, laserCharge, laserChT, laserT2, laserY, laserDir;
let warnMsg, warnT;
let cinema, cinemaT;
let spd;
let shakeAmt, shakeDur;
let tProj, tDust, tMeteor, tShock, tLaser, tGrav, tBullet;
let rafId;
let transEl = null;

function _bbar() {
  const bar = document.getElementById('boss-hp-bar');
  const pct = document.getElementById('boss-hp-pct');
  const hp = Math.max(0, bossHp);
  if (bar) {
    bar.style.width = hp + '%';
    if (phase === 1) bar.style.background = 'linear-gradient(90deg,#5522aa,#cc44ff)';
    else if (phase === 2) bar.style.background = 'linear-gradient(90deg,#cc6600,#ff9933)';
    else if (phase === 3) bar.style.background = 'linear-gradient(90deg,#880000,#ff2222)';
    else bar.style.background = 'linear-gradient(90deg,#aa8800,#FFD700)';
  }
  if (pct) pct.textContent = hp.toFixed(0) + '%';
}

function _lite(h, a) {
  const r = Math.min(255, parseInt(h.slice(1,3),16)+a);
  const g = Math.min(255, parseInt(h.slice(3,5),16)+a);
  const b = Math.min(255, parseInt(h.slice(5,7),16)+a);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function _shake(a, d) { shakeAmt = a; shakeDur = d; }
function _flash(c) { bossFlash = c; setTimeout(()=>{ bossFlash = null; }, 200); }

function _bg(t) {
  let c1,c2;
  if (phase===1){c1='#100820';c2='#1a0a35';}
  else if (phase===2){c1='#1a0800';c2='#2a1000';}
  else if (phase===3){c1='#150000';c2='#200000';}
  else{c1='#000000';c2='#050510';}
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  const sc = phase===4?120:80;
  for (let i=0;i<sc;i++) {
    const sx = ((i*173+t*0.2)%W+W)%W;
    const sy = (i*97)%(H*0.85);
    const sa = 0.25+Math.sin(t*0.004+i*0.7)*0.25;
    ctx.fillStyle = phase===4 ? `rgba(255,215,0,${sa})` : `rgba(255,255,255,${sa})`;
    ctx.beginPath(); ctx.arc(sx,sy,1,0,Math.PI*2); ctx.fill();
  }
  if (phase===3 && Math.random()<0.02) {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
    const lx = Math.random()*W;
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx+(Math.random()-0.5)*40,H*0.4); ctx.stroke();
  }
}

function _ground() {
  const gy = H*GY;
  scrollX -= spd; if (scrollX<-W) scrollX+=W;
  ctx.fillStyle = phase>=3?'#1a0000':(phase===2?'#1a0a00':'#0d0818');
  ctx.fillRect(0,gy,W,H-gy);
  ctx.strokeStyle = phase>=3?'rgba(200,0,0,0.6)':'rgba(200,162,200,0.3)';
  ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  const tw = 80;
  for (let i=-1;i<W/tw+2;i++) {
    const tx = i*tw+(scrollX%tw);
    ctx.beginPath(); ctx.moveTo(tx,gy); ctx.lineTo(tx,H); ctx.stroke();
  }
}

function _boss(t) {
  const bx=W*0.78, by=H*0.14;
  const bR = Math.min(W,H)*0.11*bossScale;
  const bob = Math.sin(t*0.015)*4;
  ctx.save(); ctx.translate(bx,by+bob);
  if (phase>=3) {
    const aG = ctx.createRadialGradient(0,0,bR*0.8,0,0,bR*2.2);
    aG.addColorStop(0, phase===4?'rgba(255,215,0,0.15)':'rgba(200,0,0,0.15)');
    aG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=aG; ctx.beginPath(); ctx.arc(0,0,bR*2.2,0,Math.PI*2); ctx.fill();
  }
  if (laserCharge) {
    const cp = Math.min(1,1-laserChT/90);
    ctx.fillStyle=`rgba(255,0,0,${cp*0.4})`; ctx.beginPath(); ctx.arc(0,0,bR*(1+cp*0.5),0,Math.PI*2); ctx.fill();
  }
  let mc;
  if (phase===1) mc='#7a6a9e';
  else if (phase===2) mc='#8a5020';
  else if (phase===3) mc='#6a1010';
  else mc='#2a2a2a';
  const mG = ctx.createRadialGradient(-bR*0.3,-bR*0.3,0,0,0,bR);
  if (bossFlash) { mG.addColorStop(0,bossFlash); mG.addColorStop(1,mc); }
  else { mG.addColorStop(0,_lite(mc,40)); mG.addColorStop(1,mc); }
  ctx.fillStyle=mG; ctx.beginPath(); ctx.arc(0,0,bR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.15)';
  [[-0.35,-0.2,0.18],[0.3,0.25,0.12],[-0.05,0.38,0.08]].forEach(([cx,cy,cr])=>{
    ctx.beginPath(); ctx.arc(cx*bR,cy*bR,cr*bR,0,Math.PI*2); ctx.fill();
  });
  if (phase===4) {
    ctx.strokeStyle='rgba(255,215,0,0.8)'; ctx.lineWidth=2; ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(-bR*.2,-bR*.6); ctx.lineTo(bR*.05,bR*.2); ctx.lineTo(bR*.4,bR*.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bR*.1,-bR*.7); ctx.lineTo(-bR*.3,bR*.1); ctx.stroke();
    ctx.shadowBlur=0;
  }
  _face(bR,t); ctx.restore();
}

function _face(bR,t) {
  if (phase===1) {
    ctx.fillStyle='#220044';
    ctx.beginPath(); ctx.ellipse(-bR*.35,-bR*.15,bR*.17,bR*.09,0.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bR*.35,-bR*.15,bR*.17,bR*.09,-0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffaa00';
    ctx.beginPath(); ctx.arc(-bR*.35,-bR*.12,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.35,-bR*.12,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#440022'; ctx.lineWidth=bR*.07; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(0,bR*.2,bR*.28,0.1,Math.PI-0.1); ctx.stroke();
  } else if (phase===2) {
    ctx.strokeStyle='#551100'; ctx.lineWidth=bR*.09;
    ctx.beginPath(); ctx.moveTo(-bR*.55,-bR*.3); ctx.lineTo(-bR*.15,-bR*.18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bR*.55,-bR*.3); ctx.lineTo(bR*.15,-bR*.18); ctx.stroke();
    ctx.fillStyle='#ff6600';
    ctx.beginPath(); ctx.ellipse(-bR*.35,-bR*.1,bR*.15,bR*.15,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bR*.35,-bR*.1,bR*.15,bR*.15,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-bR*.35,-bR*.08,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.35,-bR*.08,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#220000'; ctx.beginPath(); ctx.ellipse(0,bR*.3,bR*.3,bR*.17,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff2222'; ctx.beginPath(); ctx.arc(0,bR*.38,bR*.14,0,Math.PI); ctx.fill();
  } else if (phase===3) {
    ctx.strokeStyle='#550000'; ctx.lineWidth=bR*.12;
    ctx.beginPath(); ctx.moveTo(-bR*.6,-bR*.38); ctx.lineTo(-bR*.1,-bR*.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bR*.6,-bR*.38); ctx.lineTo(bR*.1,-bR*.2); ctx.stroke();
    ctx.fillStyle='#ff0000'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.ellipse(-bR*.32,-bR*.1,bR*.16,bR*.16,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bR*.32,-bR*.1,bR*.16,bR*.16,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-bR*.32,-bR*.08,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.32,-bR*.08,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#110000'; ctx.beginPath(); ctx.ellipse(0,bR*.32,bR*.36,bR*.22,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff1111'; ctx.beginPath(); ctx.arc(0,bR*.44,bR*.2,0,Math.PI); ctx.fill();
    ctx.fillStyle='#fff';
    for (let i=-2;i<=2;i++) {
      ctx.beginPath(); ctx.moveTo(i*bR*.1,bR*.22); ctx.lineTo((i+.5)*bR*.1,bR*.1); ctx.lineTo((i+1)*bR*.1,bR*.22); ctx.fill();
    }
  } else {
    const ey = -bR*.15+Math.sin(t*.06)*bR*.04;
    ctx.fillStyle='#eeeeff';
    ctx.beginPath(); ctx.ellipse(-bR*.32,ey,bR*.19,bR*.22,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bR*.32,ey,bR*.19,bR*.22,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2244cc';
    ctx.beginPath(); ctx.arc(-bR*.32,ey,bR*.11,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.32,ey,bR*.11,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-bR*.32,ey,bR*.055,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.32,ey,bR*.055,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#220022'; ctx.beginPath(); ctx.ellipse(0,bR*.38,bR*.2,bR*.25,0,0,Math.PI*2); ctx.fill();
  }
}

function _minions(t) {
  if (phase<2) return;
  const bx=W*0.78,by=H*0.14,bR=Math.min(W,H)*0.11*bossScale;
  for (let i=0;i<2;i++) {
    const a = t*0.015+i*Math.PI;
    const mx = bx+Math.cos(a)*(bR+40);
    const my = by+Math.sin(a)*(bR+35)*0.6;
    ctx.fillStyle='#8844cc'; ctx.shadowColor='#cc88ff'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(mx,my,13,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(mx-4,my-3,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx+4,my-3,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(mx-4,my-3,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx+4,my-3,1.5,0,Math.PI*2); ctx.fill();
  }
}

function _pSize() { return Math.min(W,H)*0.062; }
function _pxAbs() { return W*PX; }
function _onGround() {
  const ps = _pSize();
  return gravInv ? player.y<=ps+2 : player.y>=H*GY-ps-2;
}

function _updPlayer() {
  const ps = _pSize();
  const g = gravInv ? -0.55 : 0.55;
  player.vy += g; player.y += player.vy;
  if (!gravInv) {
    for (const pl of platforms) {
      if (pl.vis && player.vy>0 && player.y+ps>=pl.y && player.y+ps<=pl.y+16 && _pxAbs()>=pl.x-pl.w/2 && _pxAbs()<=pl.x+pl.w/2) {
        player.y=pl.y-ps; player.vy=0;
      }
    }
    if (player.y>=H*GY-ps) { player.y=H*GY-ps; player.vy=0; }
  } else {
    if (player.y<=ps) { player.y=ps; player.vy=0; }
  }
  if (player.slideT>0) player.slideT--; else player.sliding=false;
  if (player.invT>0) player.invT--;
}

function _drawPlayer(t) {
  const px = _pxAbs(), ps = _pSize();
  if (player.invT>0 && Math.floor(player.invT/5)%2===0) return;
  ctx.save();
  if (gravInv) { ctx.translate(px,player.y+ps); ctx.scale(1,-1); ctx.translate(-px,-player.y); }
  const st = player.sliding?'slide':(_onGround()?'run':'jump');
  if (player.sliding) {
    ctx.save(); ctx.translate(px,player.y+ps*0.4); ctx.scale(1,0.4);
    drawCosmonaut(ctx,0,ps*.5,ps,0,'run'); ctx.restore();
  } else {
    drawCosmonaut(ctx,px,player.y,ps,0,st);
  }
  ctx.restore();
}

function _jump() {
  if (!GPS0_running()&&!cinema) return;
  if (!_onGround()) return;
  player.vy = gravInv ? 11 : -11;
}
function _slide() {
  if (!GPS0_running()&&!cinema) return;
  player.sliding=true; player.slideT=55;
  if (gravInv) player.vy=9;
}

function _hitC(ox,oy,or_) {
  const px=_pxAbs(),ps=_pSize();
  const cx=px,cy=player.y+ps*.5;
  const dx=ox-cx,dy=oy-cy;
  return Math.sqrt(dx*dx+dy*dy)<or_+ps*.4;
}
function _hitR(rx,ry,rw,rh) {
  const px=_pxAbs(),ps=_pSize();
  return px>rx&&px<rx+rw&&player.y<ry+rh&&player.y+ps>ry;
}
function _dmgPlayer() {
  if (player.invT>0) return;
  player.invT=120; loseLife(); _shake(6,18);
}

function _spawnProj() {
  const gy=H*GY,ps=_pSize();
  const ht = [gy-ps, H*0.45][Math.floor(Math.random()*2)];
  const s = phase===1?4:phase===2?6:phase===3?8:10;
  const c = phase===1?'#aa44ff':phase===2?'#ff8800':'#ff2200';
  projs.push({x:W+20,y:ht,r:11,vx:-s,col:c});
}
function _updProjs() {
  for (let i=projs.length-1;i>=0;i--) {
    const p=projs[i]; p.x+=p.vx;
    if (p.x<-30){projs.splice(i,1);continue;}
    if (player.invT===0&&_hitC(p.x,p.y,p.r)){_dmgPlayer();projs.splice(i,1);}
  }
}
function _drawProjs() {
  for (const p of projs) {
    ctx.shadowColor=p.col; ctx.shadowBlur=10; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  }
}

function _spawnMeteor() {
  const mx=W*0.2+Math.random()*W*0.6;
  meteors.push({x:mx,y:-20,r:13,vy:5+Math.random()*3});
}
function _updMeteors() {
  for (let i=meteors.length-1;i>=0;i--) {
    const m=meteors[i]; m.y+=m.vy;
    if (m.y>H+30){meteors.splice(i,1);continue;}
    if (player.invT===0&&_hitC(m.x,m.y,m.r+6)){_dmgPlayer();_spawnParts(m.x,m.y,'#ff6600',8);meteors.splice(i,1);}
  }
}
function _drawMeteors() {
  for (const m of meteors) {
    const gy=H*GY;
    const sa=Math.max(0,1-m.y/gy)*0.6;
    ctx.fillStyle=`rgba(255,60,0,${sa*0.45})`;
    ctx.beginPath(); ctx.ellipse(m.x,gy,m.r+10,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#cc4400'; ctx.shadowColor='#ff8800'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  }
}

function _spawnShock() {
  const low = Math.random()<0.5;
  const yy = low?H*GY-18:H*0.28;
  const col = low?'#ff66cc':'#4488ff';
  warnMsg = low?'&#9888; ONDE BASSE &mdash; SAUTER !':'&#9888; ONDE HAUTE &mdash; GLISSER !';
  warnT=70;
  setTimeout(()=>{ shocks.push({x:W+10,y:yy,h:65,col,vx:-9}); },1000);
}
function _updShocks() {
  for (let i=shocks.length-1;i>=0;i--) {
    const s=shocks[i]; s.x+=s.vx;
    if (s.x<-50){shocks.splice(i,1);continue;}
    if (player.invT===0&&_hitR(s.x-14,s.y-s.h/2,28,s.h)) _dmgPlayer();
  }
}
function _drawShocks() {
  for (const s of shocks) {
    ctx.globalAlpha=0.3; ctx.fillStyle=s.col; ctx.fillRect(s.x-14,s.y-s.h/2,28,s.h); ctx.globalAlpha=1;
    ctx.strokeStyle=s.col; ctx.lineWidth=3; ctx.shadowColor=s.col; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.moveTo(s.x,s.y-s.h/2); ctx.lineTo(s.x,s.y+s.h/2); ctx.stroke(); ctx.shadowBlur=0;
  }
}

function _startLaser() {
  laserCharge=true; laserChT=90; warnMsg='&#9888; LASER EN CHARGE !'; warnT=90;
}
function _updLaser() {
  if (laserCharge){laserChT--;if(laserChT<=0){laserCharge=false;laserOn=true;laserT2=180;laserY=H*0.2;laserDir=1;}}
  if (laserOn) {
    laserT2--; laserY+=laserDir*2;
    if(laserY>H*0.74)laserDir=-1; if(laserY<H*0.14)laserDir=1;
    if(laserT2<=0)laserOn=false;
    if (player.invT===0) {
      const ps=_pSize(),py=player.y;
      if(py+ps>laserY-15&&py<laserY+15) _dmgPlayer();
    }
  }
}
function _drawLaser() {
  if (!laserOn) return;
  ctx.lineWidth=16; ctx.strokeStyle='#ff0000'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=28; ctx.globalAlpha=0.8;
  ctx.beginPath(); ctx.moveTo(W*0.7,laserY); ctx.lineTo(0,laserY); ctx.stroke();
  ctx.lineWidth=4; ctx.strokeStyle='#ff8888'; ctx.globalAlpha=1;
  ctx.beginPath(); ctx.moveTo(W*0.7,laserY); ctx.lineTo(0,laserY); ctx.stroke(); ctx.shadowBlur=0;
}

function _startGrav() {
  gravActive=true; gravInv=true; gravTime=300;
  warnMsg='&#9888; GRAVIT&#201; INVERS&#201;E !'; warnT=70; player.vy=-8;
}
function _updGrav() {
  if(!gravActive)return; gravTime--;
  if(gravTime<=0){gravActive=false;gravInv=false;player.vy=-3;}
}

function _spawnDust(red) {
  const gy=H*GY;
  const fl=(red&&phase>=2&&Math.random()<0.5);
  const yBase=fl?gy-60-Math.random()*50:gy-22-Math.random()*18;
  const mov=(phase>=3&&red&&Math.random()<0.5);
  dustItems.push({x:W+30+Math.random()*40,y:yBase,r:red?12:9,red,yBase,fAmp:fl?14:0,fT:Math.random()*Math.PI*2,mov,zigT:0});
}
function _updDust() {
  for (let i=dustItems.length-1;i>=0;i--) {
    const d=dustItems[i]; d.x-=spd*0.88; d.fT+=0.04;
    if(d.fAmp>0) d.y=d.yBase+Math.sin(d.fT)*d.fAmp;
    if(d.mov){d.zigT+=0.05;d.x+=Math.sin(d.zigT*2)*1.2;}
    if(d.x<-20){dustItems.splice(i,1);continue;}
    const px=_pxAbs(),ps=_pSize();
    const dx=d.x-px,dy=d.y-(player.y+ps*.5);
    if(Math.sqrt(dx*dx+dy*dy)<d.r+ps*.45){_collectDust(d);dustItems.splice(i,1);}
  }
}
function _collectDust(d) {
  totalDust++; addDust(1); _spawnParts(d.x,d.y,d.red?'#ff4444':'#FFD700',6);
  if (d.red) {
    const dmg=phase===2?6:phase===3?4:3;
    bossHp=Math.max(0,bossHp-dmg); _bbar(); _flash('#ff0000'); _shake(3,10);
    _spawnTrail(d.x,d.y); _checkPhase();
  }
}
function _spawnTrail(sx,sy) {
  const bx=W*0.78,by=H*0.14;
  for(let i=0;i<8;i++) {
    parts.push({x:sx,y:sy,vx:(bx-sx)/35+(Math.random()-0.5)*3,vy:(by-sy)/35+(Math.random()-0.5)*3,life:35,maxL:35,r:4,col:'#ff2244'});
  }
}
function _drawDust(t) {
  for (const d of dustItems) {
    ctx.shadowColor=d.red?'#ff2244':'#FFD700'; ctx.shadowBlur=14; ctx.fillStyle=d.red?'#ff4466':'#FFD700';
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
    const pulse=0.4+Math.sin(d.fT*2)*0.25;
    ctx.globalAlpha=pulse*0.35; ctx.beginPath(); ctx.arc(d.x,d.y,d.r*1.8,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

function _spawnPlatform() {
  const yy=H*(0.45+Math.random()*0.2);
  platforms.push({x:W+60,y:yy,w:80+Math.random()*40,vis:true,life:200,blT:0});
}
function _updPlatforms() {
  for(let i=platforms.length-1;i>=0;i--) {
    const p=platforms[i]; p.x-=spd; p.life--;
    if(p.life<60){p.blT++;p.vis=Math.floor(p.blT/7)%2===0;}
    if(p.x+p.w<0||p.life<=0)platforms.splice(i,1);
  }
}
function _drawPlatforms() {
  for(const p of platforms){
    if(!p.vis)continue;
    ctx.fillStyle='rgba(100,50,150,0.65)'; ctx.strokeStyle='rgba(200,100,255,0.8)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.rect(p.x-p.w/2,p.y,p.w,12); ctx.fill(); ctx.stroke();
  }
}

function _spawnBullets(t) {
  const bx=W*0.78,by=H*0.14,cnt=12;
  for(let i=0;i<cnt;i++) {
    const a=(i/cnt)*Math.PI*2+(t*0.0003), s=3+Math.random()*2;
    bullets.push({x:bx,y:by,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:6+Math.random()*5,life:200,col:Math.random()<0.5?'#ff44ff':'#ff2222'});
  }
}
function _updBullets() {
  for(let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0||b.x<-30||b.x>W+30||b.y<-30||b.y>H+30){bullets.splice(i,1);continue;}
    if(player.invT===0&&_hitC(b.x,b.y,b.r)){_dmgPlayer();bullets.splice(i,1);}
  }
}
function _drawBullets() {
  for(const b of bullets){
    ctx.globalAlpha=Math.min(1,b.life/30); ctx.shadowColor=b.col; ctx.shadowBlur=6; ctx.fillStyle=b.col;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  }ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function _spawnFinalDust() {
  finalDustSpawned=true; bullets=[];
  const cx=W*.5,cy=H*.45;
  const obs=[];
  for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2;obs.push({x:cx+Math.cos(a)*65,y:cy+Math.sin(a)*65,r:10});}
  finalDust={x:cx,y:cy,r:16,done:false,pT:0,obs};
  warnMsg='&#10024; UNE POUSSI&#200;RE FINALE APPARA&#206;T !'; warnT=140;
}
function _updFinalDust() {
  if(!finalDust||finalDust.done) return;
  finalDust.pT++;
  for(const o of finalDust.obs){if(player.invT===0&&_hitC(o.x,o.y,o.r+_pSize()*.3))_dmgPlayer();}
  const px=_pxAbs(),ps=_pSize();
  const dx=finalDust.x-px,dy=finalDust.y-(player.y+ps*.5);
  if(Math.sqrt(dx*dx+dy*dy)<finalDust.r+ps*.5){finalDust.done=true;_startCinema();}
}
function _drawFinalDust() {
  if(!finalDust||finalDust.done) return;
  for(const o of finalDust.obs){ctx.fillStyle='#444';ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();ctx.stroke();}
  const p=0.8+Math.sin(finalDust.pT*.1)*.2;
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=28+Math.sin(finalDust.pT*.1)*10; ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(finalDust.x,finalDust.y,finalDust.r*p,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.25; ctx.beginPath(); ctx.arc(finalDust.x,finalDust.y,finalDust.r*2.5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font='bold 16px system-ui'; ctx.textAlign='center';
  ctx.fillText('&#10024;',finalDust.x,finalDust.y+6);
}

function _spawnParts(x,y,col,n) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:35+Math.random()*15,maxL:50,r:2+Math.random()*3,col});
  }
}
function _updParts(){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life--;if(p.life<=0)parts.splice(i,1);}}
function _drawParts(){
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.life/p.maxL);ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

function _drawZones(){
  // Indicateur subtle gauche/droite en bas de l'écran
  const bh=44, by=H-bh;
  ctx.globalAlpha=0.18;
  ctx.fillStyle='#4488ff';
  ctx.fillRect(0,by,W/2,bh);
  ctx.fillStyle='#44cc88';
  ctx.fillRect(W/2,by,W/2,bh);
  ctx.globalAlpha=0.55;
  ctx.font='bold 13px system-ui'; ctx.textAlign='center';
  ctx.fillStyle='#fff';
  ctx.fillText('&#128583; GLISSER',W/4,by+26);
  ctx.fillText('&#128640; SAUTER',W*3/4,by+26);
  ctx.globalAlpha=1;
}

function _drawWarn(){
  if(warnT<=0)return; warnT--;
  ctx.globalAlpha=Math.min(1,warnT/15);
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H*.42,W,46);
  ctx.fillStyle='#FFD700'; ctx.font='bold 14px system-ui'; ctx.textAlign='center';
  ctx.fillText(warnMsg,W/2,H*.42+30); ctx.globalAlpha=1;
}

function _checkPhase(){
  if(phase===1&&bossHp<=70&&!p1done){p1done=true;_doTransition(2,'LA LUNE EST EN COL&#200;RE !','#ff8800');}
  else if(phase===2&&bossHp<=40&&!p2done){p2done=true;_doTransition(3,'FURIE LUNAIRE !','#ff0000');}
  else if(phase===3&&bossHp<=10&&!p3done){p3done=true;_doTransition(4,'PHASE FINALE...','#FFD700');}
  else if(phase===4&&bossHp<=0&&!finalDustSpawned){_spawnFinalDust();}
}

function _doTransition(toP,text,col){
  transitioning=true; _shake(toP===4?8:5,40);
  if(transEl){transEl.remove();transEl=null;}
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s';
  const txt=document.createElement('div');
  txt.style.cssText=`font-size:1.45rem;font-weight:900;color:${col};text-align:center;text-shadow:0 0 30px ${col};letter-spacing:2px;opacity:0;transform:scale(0.7);transition:all .3s ease;padding:20px;max-width:80vw`;
  txt.innerHTML=text; ov.appendChild(txt); document.body.appendChild(ov); transEl=ov;
  setTimeout(()=>{
    ov.style.background='rgba(0,0,0,0.55)'; txt.style.opacity='1'; txt.style.transform='scale(1)';
    bossScale=(toP===2?1.2:1.44); phase=toP;
    projs=[]; shocks=[]; meteors=[]; laserOn=false; laserCharge=false;
    if(toP===3)spd=4; if(toP===4)spd=2; _bbar();
  },300);
  setTimeout(()=>{
    txt.style.opacity='0'; ov.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{if(ov.parentNode)ov.remove();transEl=null;transitioning=false;},400);
  },2200);
}

function _startCinema(){cinema=true;cinemaT=0;_spawnParts(W*.78,H*.14,'#FFD700',60);_shake(12,60);}
function _drawCinema(){
  cinemaT++;
  const bx=W*.78,by=H*.14;
  if(cinemaT<30){
    for(let i=0;i<5;i++){
      parts.push({x:W*PX,y:player.y,vx:(bx-W*PX)/18+(Math.random()-.5)*5,vy:(by-player.y)/18+(Math.random()-.5)*5,life:18,maxL:18,r:5,col:'#FFD700'});
    }
  }else if(cinemaT===30){bossFlash='#ffffff';_spawnParts(bx,by,'#FFD700',80);_spawnParts(bx,by,'#ff8800',40);}
  else if(cinemaT>30&&cinemaT<90){const a=Math.max(0,1-(cinemaT-30)/28);ctx.fillStyle=`rgba(255,255,255,${a*.65})`;ctx.fillRect(0,0,W,H);}
  else if(cinemaT>=90&&cinemaT<240){
    if(cinemaT%3===0)_spawnParts(Math.random()*W,-10,'#FFD700',2);
    if(cinemaT===90){totalDust+=50;addDust(50);}
  }else if(cinemaT===240){window.GPS0_rewardOverride=totalDust;endGame(true);}
  if(cinemaT>=180){
    const a=Math.min(1,(cinemaT-180)/30); ctx.globalAlpha=a;
    ctx.font=`bold ${Math.floor(W*.046)}px system-ui`; ctx.textAlign='center';
    ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=24;
    ctx.fillText('&#127769; LA LUNE EST VAINCUE ! &#127769;',W/2,H/2);
    ctx.font=`bold ${Math.floor(W*.036)}px system-ui`;
    ctx.fillStyle='#fff'; ctx.shadowBlur=0;
    ctx.fillText('+50 &#10024; Bonus Victoire !',W/2,H/2+44);
    ctx.globalAlpha=1;
  }
}

function gameReset(){
  cancelAnimationFrame(rafId);
  if(transEl){transEl.remove();transEl=null;}
  phase=1;bossHp=HP_MAX;totalDust=0;
  player={y:0,vy:0,sliding:false,slideT:0,invT:0};
  projs=[];dustItems=[];meteors=[];shocks=[];parts=[];platforms=[];bullets=[];
  finalDust=null;finalDustSpawned=false;
  phaseTimer=0;transitioning=false;
  p1done=false;p2done=false;p3done=false;
  scrollX=0;bossScale=1;bossFlash=null;
  gravInv=false;gravActive=false;gravTime=0;
  laserOn=false;laserCharge=false;laserChT=0;laserT2=0;laserY=0;laserDir=1;
  warnMsg='';warnT=0;cinema=false;cinemaT=0;spd=3;
  shakeAmt=0;shakeDur=0;
  tProj=-9999;tDust=-9999;tMeteor=-9999;tShock=-9999;tLaser=-9999;tGrav=-9999;tBullet=-9999;
  _bbar();
}
window.gameReset=gameReset;

function gameStart(){
  gameReset();
  cv=document.getElementById('cv'); GPS0_resizeCanvas(cv); ctx=cv.getContext('2d');
  W=cv.width; H=cv.height;
  player.y=H*GY-_pSize();

  cv.addEventListener('touchstart',e=>{
    e.preventDefault();
    const tx=e.touches[0].clientX;
    if(tx<W/2)_slide();else _jump();
  },{passive:false});
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key===' '){e.preventDefault();_jump();}
    if(e.key==='ArrowDown')_slide();
  });

  const loop=()=>{
    rafId=requestAnimationFrame(loop);
    if(!GPS0_running()&&!cinema)return;
    W=cv.width; H=cv.height;
    let ox=0,oy=0;
    if(shakeDur>0){ox=(Math.random()-.5)*shakeAmt*2;oy=(Math.random()-.5)*shakeAmt*2;shakeDur--;}
    ctx.save(); ctx.translate(ox,oy);
    const t=Date.now();
    _bg(t); _ground();
    if(phase>=3)_drawPlatforms();
    if(!cinema)_updPlayer();
    _drawPlayer(t);
    _boss(t); _minions(t);
    if(!cinema)_updLaser(); _drawLaser();
    if(!cinema)_updProjs(); _drawProjs();
    if(!cinema)_updMeteors(); _drawMeteors();
    if(!cinema)_updShocks(); _drawShocks();
    if(!cinema)_updDust(); _drawDust(t);
    if(phase===4&&!finalDustSpawned&&!cinema){_updBullets();_drawBullets();}
    if(finalDustSpawned&&!cinema){_updFinalDust();_drawFinalDust();}
    _updParts(); _drawParts();
    _drawWarn();
    _drawZones();
    _bbar();
    if(cinema)_drawCinema();
    ctx.restore();
    if(!GPS0_running()||cinema||transitioning)return;
    phaseTimer++;
    const now=t;
    if(phase===1){
      if(now-tProj>2000){tProj=now;_spawnProj();}
      if(now-tDust>3000){tDust=now;_spawnDust(true);}
      if(Math.random()<0.001)_spawnDust(false);
    }else if(phase===2){
      if(now-tProj>1500){tProj=now;_spawnProj();}
      if(now-tDust>5000){tDust=now;_spawnDust(true);}
      if(now-tMeteor>4000){tMeteor=now;_spawnMeteor();}
      if(now-tShock>10000){tShock=now;_spawnShock();}
      if(Math.random()<0.0008)_spawnDust(false);
      _updGrav();
    }else if(phase===3){
      if(now-tProj>1000){tProj=now;_spawnProj();}
      if(now-tDust>4000){tDust=now;_spawnDust(true);}
      if(now-tMeteor>2500){tMeteor=now;_spawnMeteor();}
      if(now-tShock>7000){tShock=now;_spawnShock();}
      if(now-tLaser>15000){tLaser=now;_startLaser();}
      if(now-tGrav>20000){tGrav=now;_startGrav();}
      if(phaseTimer%(15*60)===0)spd=Math.min(8,spd+0.5);
      if(Math.random()<0.004)_spawnPlatform();
      _updGrav(); _updPlatforms();
      if(Math.random()<0.0006)_spawnDust(false);
    }else if(phase===4&&!finalDustSpawned){
      if(now-tBullet>600){tBullet=now;_spawnBullets(t);}
    }
  };
  loop();
}
window.gameStart=gameStart;
window.GPS0_onTimerExpired=function(){window.GPS0_rewardOverride=totalDust;endGame(false);};
</script>
