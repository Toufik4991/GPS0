<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N9 Boss</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none;background:#000}
body{display:flex;flex-direction:column;height:100dvh}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:8px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:60px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#ffdd88}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:60px;text-align:right}
#boss-hp-wrap{width:100%;padding:4px 10px 0;background:rgba(0,0,0,.6);flex-shrink:0;z-index:20}
#boss-hp-label{font-size:.72rem;color:rgba(255,255,255,.7);text-align:center;margin-bottom:2px;letter-spacing:1px;text-transform:uppercase}
#boss-hp-bar-bg{height:10px;background:rgba(255,255,255,.1);border-radius:6px;border:1px solid rgba(255,255,255,.2);overflow:hidden}
#boss-hp-bar{height:100%;width:100%;border-radius:6px;transition:width .3s ease,background .5s ease;background:linear-gradient(90deg,#8844cc,#cc44ff)}
#game-container{position:relative;flex:1;overflow:hidden}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:30</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="boss-hp-wrap">
  <div id="boss-hp-label">LUNE MAL&#201;FIQUE &#8212; <span id="boss-hp-pct">100%</span></div>
  <div id="boss-hp-bar-bg"><div id="boss-hp-bar"></div></div>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
'use strict';
window.NIVEAU = 9;
window.GPS0_TIMER_SEC = 150;
window.GPS0_MAX_LIVES = 3;
window.GPS0_NO_CAP = true;
window.GPS0_computeDust = function(success) {
  return totalDust + (bossVaincu ? 50 : 0) + GPS0_lives() * 5 + (phaseMax || 1) * 5;
};
window.TUTO_TEXT = "&#127769; Affronte la Lune Mal&#233;fique !<br>Collecte les <span style='color:#FFD700'>&#9728;&#65039; mini-soleils</span> pour l'affaiblir.<br>&#9888;&#65039; Saute lors des <b>novas blanches</b> (anneau) !<br><br>&#128066; <b>Touche GAUCHE = Glisser</b><br>&#128065; <b>Touche DROITE = Sauter</b>";

const GY = 0.78;
const PX = 0.18;
const HP_MAX = 100;

let cv, ctx, W, H;
let phase, bossHp, totalDust, phaseMax, bossVaincu;
let player, soleils, meteors, novas, hearts, parts;
let finalDustSpawned;
let phaseTimer, transitioning;
let p1done, p2done, p3done;
let scrollX, bgT, bossScale, bossFlash;
let warnMsg, warnT;
let cinema, cinemaT;
let spd;
let shakeAmt, shakeDur;
let tSoleil, tMeteor, tNova, tHeart;
let novaWarnActive, novaWarnLeft;
let heartPhaseSpawned;
let metColBusy;
let rafId;
let transEl = null;

function _bbar() {
  const bar = document.getElementById('boss-hp-bar');
  const pct = document.getElementById('boss-hp-pct');
  const hp = Math.max(0, bossHp);
  if (bar) {
    bar.style.width = hp + '%';
    if (phase === 1) bar.style.background = 'linear-gradient(90deg,#5522aa,#cc44ff)';
    else if (phase === 2) bar.style.background = 'linear-gradient(90deg,#cc6600,#ff9933)';
    else if (phase === 3) bar.style.background = 'linear-gradient(90deg,#880000,#ff2222)';
    else bar.style.background = 'linear-gradient(90deg,#aa8800,#FFD700)';
  }
  if (pct) pct.textContent = hp.toFixed(0) + '%';
}

function _lite(h, a) {
  const r = Math.min(255, parseInt(h.slice(1,3),16)+a);
  const g = Math.min(255, parseInt(h.slice(3,5),16)+a);
  const b = Math.min(255, parseInt(h.slice(5,7),16)+a);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function _shake(a, d) { shakeAmt = a; shakeDur = d; }
function _flash(c) { bossFlash = c; setTimeout(()=>{ bossFlash = null; }, 200); }

function _bg(t) {
  let c1,c2;
  if (phase===1){c1='#100820';c2='#1a0a35';}
  else if (phase===2){c1='#1a0800';c2='#2a1000';}
  else if (phase===3){c1='#150000';c2='#200000';}
  else{c1='#000000';c2='#050510';}
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  const sc = phase===4?120:80;
  for (let i=0;i<sc;i++) {
    const sx = ((i*173+t*0.2)%W+W)%W;
    const sy = (i*97)%(H*0.85);
    const sa = 0.25+Math.sin(t*0.004+i*0.7)*0.25;
    ctx.fillStyle = phase===4 ? `rgba(255,215,0,${sa})` : `rgba(255,255,255,${sa})`;
    ctx.beginPath(); ctx.arc(sx,sy,1,0,Math.PI*2); ctx.fill();
  }
  if (phase===3 && Math.random()<0.02) {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
    const lx = Math.random()*W;
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx+(Math.random()-0.5)*40,H*0.4); ctx.stroke();
  }
}

function _ground() {
  const gy = H*GY;
  scrollX -= spd; if (scrollX<-W) scrollX+=W;
  ctx.fillStyle = phase>=3?'#1a0000':(phase===2?'#1a0a00':'#0d0818');
  ctx.fillRect(0,gy,W,H-gy);
  ctx.strokeStyle = phase>=3?'rgba(200,0,0,0.6)':'rgba(200,162,200,0.3)';
  ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  const tw = 80;
  for (let i=-1;i<W/tw+2;i++) {
    const tx = i*tw+(scrollX%tw);
    ctx.beginPath(); ctx.moveTo(tx,gy); ctx.lineTo(tx,H); ctx.stroke();
  }
}

function _boss(t) {
  const bx=W*0.78, by=H*0.14;
  const bR = Math.min(W,H)*0.11*bossScale;
  const bob = Math.sin(t*0.015)*4;
  ctx.save(); ctx.translate(bx,by+bob);
  if (phase>=3) {
    const aG = ctx.createRadialGradient(0,0,bR*0.8,0,0,bR*2.2);
    aG.addColorStop(0, phase===4?'rgba(255,215,0,0.15)':'rgba(200,0,0,0.15)');
    aG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=aG; ctx.beginPath(); ctx.arc(0,0,bR*2.2,0,Math.PI*2); ctx.fill();
  }
  if (novaWarnActive && Math.floor(novaWarnLeft/8)%2===0) {
    ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.beginPath(); ctx.arc(0,0,bR*1.25,0,Math.PI*2); ctx.fill();
  }
  let mc;
  if (phase===1) mc='#7a6a9e';
  else if (phase===2) mc='#8a5020';
  else if (phase===3) mc='#6a1010';
  else mc='#2a2a2a';
  const mG = ctx.createRadialGradient(-bR*0.3,-bR*0.3,0,0,0,bR);
  if (bossFlash) { mG.addColorStop(0,bossFlash); mG.addColorStop(1,mc); }
  else { mG.addColorStop(0,_lite(mc,40)); mG.addColorStop(1,mc); }
  ctx.fillStyle=mG; ctx.beginPath(); ctx.arc(0,0,bR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.15)';
  [[-0.35,-0.2,0.18],[0.3,0.25,0.12],[-0.05,0.38,0.08]].forEach(([cx,cy,cr])=>{
    ctx.beginPath(); ctx.arc(cx*bR,cy*bR,cr*bR,0,Math.PI*2); ctx.fill();
  });
  if (phase===4) {
    ctx.strokeStyle='rgba(255,215,0,0.8)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-bR*.2,-bR*.6); ctx.lineTo(bR*.05,bR*.2); ctx.lineTo(bR*.4,bR*.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bR*.1,-bR*.7); ctx.lineTo(-bR*.3,bR*.1); ctx.stroke();
  }
  _face(bR,t); ctx.restore();
}

function _face(bR,t) {
  if (phase===1) {
    ctx.fillStyle='#220044';
    ctx.beginPath(); ctx.ellipse(-bR*.35,-bR*.15,bR*.17,bR*.09,0.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bR*.35,-bR*.15,bR*.17,bR*.09,-0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffaa00';
    ctx.beginPath(); ctx.arc(-bR*.35,-bR*.12,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.35,-bR*.12,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#440022'; ctx.lineWidth=bR*.07; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(0,bR*.2,bR*.28,0.1,Math.PI-0.1); ctx.stroke();
  } else if (phase===2) {
    ctx.strokeStyle='#551100'; ctx.lineWidth=bR*.09;
    ctx.beginPath(); ctx.moveTo(-bR*.55,-bR*.3); ctx.lineTo(-bR*.15,-bR*.18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bR*.55,-bR*.3); ctx.lineTo(bR*.15,-bR*.18); ctx.stroke();
    ctx.fillStyle='#ff6600';
    ctx.beginPath(); ctx.ellipse(-bR*.35,-bR*.1,bR*.15,bR*.15,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bR*.35,-bR*.1,bR*.15,bR*.15,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-bR*.35,-bR*.08,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.35,-bR*.08,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#220000'; ctx.beginPath(); ctx.ellipse(0,bR*.3,bR*.3,bR*.17,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff2222'; ctx.beginPath(); ctx.arc(0,bR*.38,bR*.14,0,Math.PI); ctx.fill();
  } else if (phase===3) {
    ctx.strokeStyle='#550000'; ctx.lineWidth=bR*.12;
    ctx.beginPath(); ctx.moveTo(-bR*.6,-bR*.38); ctx.lineTo(-bR*.1,-bR*.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bR*.6,-bR*.38); ctx.lineTo(bR*.1,-bR*.2); ctx.stroke();
    ctx.fillStyle='#ff0000';
    ctx.beginPath(); ctx.ellipse(-bR*.32,-bR*.1,bR*.16,bR*.16,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bR*.32,-bR*.1,bR*.16,bR*.16,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-bR*.32,-bR*.08,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.32,-bR*.08,bR*.07,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#110000'; ctx.beginPath(); ctx.ellipse(0,bR*.32,bR*.36,bR*.22,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff1111'; ctx.beginPath(); ctx.arc(0,bR*.44,bR*.2,0,Math.PI); ctx.fill();
    ctx.fillStyle='#fff';
    for (let i=-2;i<=2;i++) {
      ctx.beginPath(); ctx.moveTo(i*bR*.1,bR*.22); ctx.lineTo((i+.5)*bR*.1,bR*.1); ctx.lineTo((i+1)*bR*.1,bR*.22); ctx.fill();
    }
  } else {
    const ey = -bR*.15+Math.sin(t*.06)*bR*.04;
    ctx.fillStyle='#eeeeff';
    ctx.beginPath(); ctx.ellipse(-bR*.32,ey,bR*.19,bR*.22,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bR*.32,ey,bR*.19,bR*.22,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2244cc';
    ctx.beginPath(); ctx.arc(-bR*.32,ey,bR*.11,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.32,ey,bR*.11,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-bR*.32,ey,bR*.055,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR*.32,ey,bR*.055,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#220022'; ctx.beginPath(); ctx.ellipse(0,bR*.38,bR*.2,bR*.25,0,0,Math.PI*2); ctx.fill();
  }
}

function _minions(t) {
  if (phase<2) return;
  const bx=W*0.78,by=H*0.14,bR=Math.min(W,H)*0.11*bossScale;
  for (let i=0;i<2;i++) {
    const a = t*0.015+i*Math.PI;
    const mx = bx+Math.cos(a)*(bR+40);
    const my = by+Math.sin(a)*(bR+35)*0.6;
    ctx.fillStyle='#8844cc';
    ctx.beginPath(); ctx.arc(mx,my,13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(mx-4,my-3,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx+4,my-3,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(mx-4,my-3,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx+4,my-3,1.5,0,Math.PI*2); ctx.fill();
  }
}

function _pSize() { return Math.min(W,H)*0.062; }
function _pxAbs() { return W*PX; }
function _onGround() {
  return player.y >= H*GY - _pSize() - 2;
}

function _updPlayer() {
  const ps = _pSize();
  player.vy += 0.55; player.y += player.vy;
  if (player.y >= H*GY - ps) { player.y = H*GY - ps; player.vy = 0; }
  if (player.slideT > 0) player.slideT--; else player.sliding = false;
  if (player.invT > 0) player.invT--;
}

function _drawPlayer(t) {
  const px = _pxAbs(), ps = _pSize();
  if (player.invT > 0 && Math.floor(player.invT/5)%2 === 0) return;
  ctx.save();
  const st = player.sliding ? 'slide' : (_onGround() ? 'run' : 'jump');
  if (player.sliding) {
    ctx.save(); ctx.translate(px, player.y + ps*0.4); ctx.scale(1, 0.4);
    drawCosmonaut(ctx, 0, ps*.5, ps, 0, 'run'); ctx.restore();
  } else {
    drawCosmonaut(ctx, px, player.y, ps, 0, st);
  }
  ctx.restore();
}

function _jump() {
  if (!GPS0_running() && !cinema) return;
  if (!_onGround()) return;
  player.vy = -11;
}
function _slide() {
  if (!GPS0_running() && !cinema) return;
  player.sliding = true; player.slideT = 55;
}

function _hitC(ox,oy,or_) {
  const px=_pxAbs(),ps=_pSize();
  const cx=px,cy=player.y+ps*.5;
  const dx=ox-cx,dy=oy-cy;
  return Math.sqrt(dx*dx+dy*dy)<or_+ps*.4;
}
function _hitR(rx,ry,rw,rh) {
  const px=_pxAbs(),ps=_pSize();
  return px>rx&&px<rx+rw&&player.y<ry+rh&&player.y+ps>ry;
}
function _dmgPlayer() {
  if (player.invT>0) return;
  player.invT=120; loseLife(); _shake(6,18);
}

/* ══ MINI SOLEILS ══════════════════════════════════════════════════ */
function _spawnSoleil(xOff) {
  const gy=H*GY, ps=_pSize();
  const yT = H*0.25 + Math.random()*(gy-ps*2-H*0.25);
  soleils.push({x:W+25+(xOff||0),y:H*0.45,yt:yT,r:14,t:0});
}
function _updSoleils() {
  for (let i=soleils.length-1;i>=0;i--) {
    const s=soleils[i]; s.x-=spd*1.1; s.y+=(s.yt-s.y)*0.06; s.t++;
    if (s.x<-40){soleils.splice(i,1);continue;}
    if (player.invT===0&&_hitC(s.x,s.y,s.r+6)){
      const dmg=phase===1?6:phase===2?5:phase===3?4:3;
      bossHp=Math.max(0,bossHp-dmg); totalDust++; addDust(1);
      _bbar(); _flash('#FFD700'); _shake(2,8);
      _spawnParts(s.x,s.y,'#FFD700',8); soleils.splice(i,1); _checkPhase();
    }
  }
}
function _drawSoleils() {
  for (const s of soleils) {
    const pulse=0.87+0.13*Math.sin(s.t*0.12), r=s.r*pulse;
    ctx.save(); ctx.translate(s.x,s.y);
    for (let i=0;i<8;i++) {
      const a=(i/8)*Math.PI*2+s.t*0.035, r2=r+9+2*Math.sin(s.t*0.12+i);
      ctx.strokeStyle='rgba(255,200,50,0.65)'; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*(r+3),Math.sin(a)*(r+3));
      ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2); ctx.stroke();
    }
    const sg=ctx.createRadialGradient(0,0,r*0.4,0,0,r*2);
    sg.addColorStop(0,'rgba(255,220,60,0.38)'); sg.addColorStop(1,'rgba(255,120,0,0)');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,r*2,0,Math.PI*2); ctx.fill();
    const sg2=ctx.createRadialGradient(-r*0.3,-r*0.3,2,0,0,r);
    sg2.addColorStop(0,'#fff8c0'); sg2.addColorStop(0.5,'#FFD700'); sg2.addColorStop(1,'#ff8800');
    ctx.fillStyle=sg2; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

/* ══ MÉTÉORITES ════════════════════════════════════════════════════ */
function _spawnMeteorSafe() {
  const busy=metColBusy.filter(Boolean).length;
  if (busy>=2) return;
  const free=[]; for(let i=0;i<4;i++){if(!metColBusy[i])free.push(i);}
  if (!free.length) return;
  const col=free[Math.floor(Math.random()*free.length)];
  metColBusy[col]=true;
  const cw=W/4, cx=cw*col+cw*0.2+Math.random()*cw*0.6;
  const r=18+Math.random()*(phase>=3?22:10);
  const vx=phase>=3&&Math.random()<0.4?(Math.random()-0.5)*2.5:0;
  meteors.push({x:cx,y:-30,vy:2.5+Math.random()*1.5+(phase-1)*0.7,vx,r,col,t:0});
}
function _updMeteors() {
  const gy=H*GY;
  for (let i=meteors.length-1;i>=0;i--) {
    const m=meteors[i]; m.x+=m.vx; m.y+=m.vy; m.t++;
    if (m.y>gy+m.r+5){metColBusy[m.col]=false;meteors.splice(i,1);continue;}
    if (player.invT===0&&_hitC(m.x,m.y,m.r-5)){
      metColBusy[m.col]=false; _spawnParts(m.x,m.y,'#ff6600',10); meteors.splice(i,1); _dmgPlayer();
    }
  }
}
function _drawMeteors() {
  const gy=H*GY;
  for (const m of meteors) {
    const frac=Math.max(0,1-m.y/gy);
    ctx.fillStyle=`rgba(60,30,0,${frac*0.45})`;
    ctx.beginPath(); ctx.ellipse(m.x,gy-2,m.r*(0.7+frac*0.5),5,0,0,Math.PI*2); ctx.fill();
    const tl=Math.min(36,m.t*2.5);
    if (tl>2){
      const fg=ctx.createLinearGradient(m.x,m.y-tl,m.x,m.y);
      fg.addColorStop(0,'rgba(255,80,0,0)');fg.addColorStop(0.6,'rgba(255,160,0,0.38)');fg.addColorStop(1,'rgba(255,220,60,0.60)');
      ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(m.x,m.y-tl*0.5,m.r*0.38,tl*0.55,0,0,Math.PI*2); ctx.fill();
    }
    ctx.save(); ctx.translate(m.x,m.y);
    const segs=7, sd=m.r*5.3;
    ctx.fillStyle='#503828'; ctx.beginPath();
    for (let i=0;i<segs;i++){const a=(i/segs)*Math.PI*2,r=m.r*(0.80+Math.sin(i*1.9+sd)*0.20);i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#6a5040'; ctx.beginPath();
    for (let i=0;i<segs;i++){const a=(i/segs)*Math.PI*2,r=m.r*(0.62+Math.sin(i*1.9+sd)*0.14);i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.arc(-m.r*0.25,-m.r*0.20,m.r*0.17,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(m.r*0.28,m.r*0.18,m.r*0.11,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
/* ══ NOVA BLANCHE ══════════════════════════════════════════════════ */
function _triggerNova() {
  novaWarnActive=true; novaWarnLeft=120;
  warnMsg='⚡ NOVA ! SAUTEZ !'; warnT=110; _flash('#ffffff');
}
function _updNovas() {
  if (novaWarnActive){
    novaWarnLeft--;
    if (novaWarnLeft<=0){ novaWarnActive=false; novas.push({x:W*0.78,y:H*GY,r:10,vr:4+phase*0.8,alpha:1}); }
    return;
  }
  for (let i=novas.length-1;i>=0;i--){
    const n=novas[i]; n.r+=n.vr; n.alpha=Math.max(0,1-n.r/(W*0.95));
    if (n.r>W*1.1){novas.splice(i,1);continue;}
    if (player.invT===0){
      const px=_pxAbs(),py=player.y+_pSize()*0.5;
      const dist=Math.hypot(n.x-px,n.y-py);
      const aboveGround=H*GY-(player.y+_pSize());
      if (aboveGround<65&&Math.abs(dist-n.r)<28) _dmgPlayer();
    }
  }
}
function _drawNovas() {
  if (novaWarnActive&&Math.floor(novaWarnLeft/9)%2===0){
    ctx.save(); ctx.globalAlpha=0.28; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(W*0.78,H*0.14,65,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  for (const n of novas){
    if (n.alpha<=0) continue;
    ctx.save(); ctx.globalAlpha=n.alpha;
    ctx.strokeStyle=`rgba(255,255,255,${n.alpha})`; ctx.lineWidth=7;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=2; ctx.strokeStyle=`rgba(200,220,255,${n.alpha*0.5})`;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r*0.85,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}
/* ══ CŒURS ══════════════════════════════════════════════════════ */
function _spawnHeart() {
  heartPhaseSpawned[phase]=true;
  const gy=H*GY,ps=_pSize();
  hearts.push({x:W*0.55+(Math.random()-0.5)*W*0.28,y:gy-ps*2-Math.random()*H*0.18,r:16,life:300,t:0});
}
function _updHearts() {
  for (let i=hearts.length-1;i>=0;i--){
    const h=hearts[i]; h.life--; h.t++; h.y+=Math.sin(h.t*0.06)*0.4;
    if (h.life<=0){hearts.splice(i,1);continue;}
    if (player.invT===0&&_hitC(h.x,h.y,h.r+5)){
      hearts.splice(i,1);
      if (typeof GPS0_addLife==='function') GPS0_addLife();
      _spawnParts(h.x,h.y,'#ff4466',14);
      warnMsg='❤️ +1 VIE !'; warnT=90; _shake(2,6);
    }
  }
}
function _drawHearts() {
  for (const h of hearts){
    const p=0.90+0.10*Math.sin(h.t*0.14),al=h.life<80?h.life/80:1;
    ctx.save(); ctx.globalAlpha=al; ctx.translate(h.x,h.y); ctx.scale(p,p);
    const hg=ctx.createRadialGradient(0,3,2,0,3,26);
    hg.addColorStop(0,'rgba(255,80,80,0.40)'); hg.addColorStop(1,'rgba(255,80,80,0)');
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(0,3,26,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff2244'; ctx.beginPath(); ctx.moveTo(0,8);
    ctx.bezierCurveTo(-3,5,-12,-3,-12,-8); ctx.bezierCurveTo(-12,-16,0,-13,0,-6);
    ctx.bezierCurveTo(0,-13,12,-16,12,-8); ctx.bezierCurveTo(12,-3,3,5,0,8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,185,185,0.5)'; ctx.beginPath(); ctx.ellipse(-4,-8,3.5,2.5,-0.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
/* ══ PARTICULES ════════════════════════════════════════════════════ */
function _spawnParts(x,y,col,n) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:35+Math.random()*15,maxL:50,r:2+Math.random()*3,col});
  }
}
function _updParts(){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life--;if(p.life<=0)parts.splice(i,1);}}
function _drawParts(){
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.life/p.maxL);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}
/* ══ UI ═══════════════════════════════════════════════════════════ */
function _drawZones(){
  const bh=44,by=H-bh;
  ctx.globalAlpha=0.18;
  ctx.fillStyle='#4488ff'; ctx.fillRect(0,by,W/2,bh);
  ctx.fillStyle='#44cc88'; ctx.fillRect(W/2,by,W/2,bh);
  ctx.globalAlpha=0.55; ctx.font='bold 13px system-ui'; ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.fillText('⛷ GLISSER',W/4,by+26); ctx.fillText('🚀 SAUTER',W*3/4,by+26);
  ctx.globalAlpha=1;
}
function _drawWarn(){
  if(warnT<=0)return; warnT--;
  ctx.globalAlpha=Math.min(1,warnT/15);
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H*.42,W,46);
  ctx.fillStyle='#FFD700'; ctx.font='bold 14px system-ui'; ctx.textAlign='center';
  ctx.fillText(warnMsg,W/2,H*.42+30); ctx.globalAlpha=1;
}
/* ══ PHASES ════════════════════════════════════════════════════════ */
function _checkPhase(){
  if(phase===1&&bossHp<=70&&!p1done){p1done=true;_doTransition(2,'FUREUR — LA LUNE S\u2019ÉVEILLE !','#ff8800');}
  else if(phase===2&&bossHp<=40&&!p2done){p2done=true;_doTransition(3,'CHAOS — FURIE LUNAIRE !','#ff0000');}
  else if(phase===3&&bossHp<=15&&!p3done){p3done=true;_doTransition(4,'AGONIE — PHASE FINALE...','#FFD700');}
  else if(phase===4&&bossHp<=0&&!finalDustSpawned){finalDustSpawned=true;_startCinema();}
}
function _doTransition(toP,text,col){
  transitioning=true; _shake(toP===4?8:5,40);
  if(transEl){transEl.remove();transEl=null;}
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s';
  const txt=document.createElement('div');
  txt.style.cssText=`font-size:1.45rem;font-weight:900;color:${col};text-align:center;text-shadow:0 0 30px ${col};letter-spacing:2px;opacity:0;transform:scale(0.7);transition:all .3s ease;padding:20px;max-width:80vw`;
  txt.innerHTML=text; ov.appendChild(txt); document.body.appendChild(ov); transEl=ov;
  setTimeout(()=>{
    ov.style.background='rgba(0,0,0,0.55)'; txt.style.opacity='1'; txt.style.transform='scale(1)';
    bossScale=(toP===2?1.2:1.44); phase=toP;
    soleils=[]; meteors=[]; novas=[]; hearts=[]; metColBusy=[false,false,false,false];
    if(toP===3)spd=3.5; if(toP===4)spd=2.5;
    tSoleil=90; tMeteor=150; tNova=(toP===2?720:toP===3?480:300);
    tHeart=300+Math.floor(Math.random()*300);
    _bbar();
  },300);
  setTimeout(()=>{
    txt.style.opacity='0'; ov.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{if(ov.parentNode)ov.remove();transEl=null;transitioning=false;},400);
  },2200);
}
/* ══ CINÉMA FINALE ═════════════════════════════════════════════════ */
function _startCinema(){bossVaincu=true;cinema=true;cinemaT=0;_spawnParts(W*.78,H*.14,'#FFD700',60);_shake(12,60);}
function _drawCinema(){
  cinemaT++;
  const bx=W*.78,by=H*.14;
  if(cinemaT<30){
    for(let i=0;i<5;i++){
      parts.push({x:W*PX,y:player.y,vx:(bx-W*PX)/18+(Math.random()-.5)*5,vy:(by-player.y)/18+(Math.random()-.5)*5,life:18,maxL:18,r:5,col:'#FFD700'});
    }
  }else if(cinemaT===30){bossFlash='#ffffff';_spawnParts(bx,by,'#FFD700',80);_spawnParts(bx,by,'#ff8800',40);}
  else if(cinemaT>30&&cinemaT<90){const a=Math.max(0,1-(cinemaT-30)/28);ctx.fillStyle=`rgba(255,255,255,${a*.65})`;ctx.fillRect(0,0,W,H);}
  else if(cinemaT>=90&&cinemaT<240){
    if(cinemaT%3===0)_spawnParts(Math.random()*W,-10,'#FFD700',2);
    if(cinemaT===90)addDust(50);
  }else if(cinemaT===240){endGame(true);}
  if(cinemaT>=180){
    const a=Math.min(1,(cinemaT-180)/30); ctx.globalAlpha=a;
    ctx.font=`bold ${Math.floor(W*.046)}px system-ui`; ctx.textAlign='center';
    ctx.fillStyle='#FFD700';
    ctx.fillText('🌙 LA LUNE EST VAINCUE ! 🌙',W/2,H/2);
    ctx.font=`bold ${Math.floor(W*.036)}px system-ui`;
    ctx.fillStyle='#fff';
    ctx.fillText('+50 ✨ Bonus Victoire !',W/2,H/2+44); ctx.globalAlpha=1;
  }
}
/* ══ RESET / START ══════════════════════════════════════════════════ */
function gameReset(){
  cancelAnimationFrame(rafId);
  if(transEl){transEl.remove();transEl=null;}
  phase=1;bossHp=HP_MAX;totalDust=0;phaseMax=1;bossVaincu=false;
  player={y:0,vy:0,sliding:false,slideT:0,invT:0};
  soleils=[];meteors=[];novas=[];hearts=[];parts=[];
  finalDustSpawned=false;phaseTimer=0;transitioning=false;
  p1done=false;p2done=false;p3done=false;
  scrollX=0;bgT=0;bossScale=1;bossFlash=null;
  warnMsg='';warnT=0;cinema=false;cinemaT=0;spd=2.5;
  shakeAmt=0;shakeDur=0;
  tSoleil=120;tMeteor=240;tNova=720;tHeart=420+Math.floor(Math.random()*360);
  novaWarnActive=false;novaWarnLeft=0;
  heartPhaseSpawned={1:false,2:false,3:false,4:false};
  metColBusy=[false,false,false,false];
  _bbar();
}
window.gameReset=gameReset;

function gameStart(){
  gameReset();
  cv=document.getElementById('cv'); GPS0_resizeCanvas(cv);
  if(!cv.width||!cv.height){const hud=document.getElementById('hud');cv.width=window.innerWidth;cv.height=window.innerHeight-(hud?hud.offsetHeight:44);}
  ctx=cv.getContext('2d'); W=cv.width; H=cv.height;
  player.y=H*GY-_pSize();
  cv.addEventListener('touchstart',e=>{
    e.preventDefault();
    const tx=e.touches[0].clientX;
    if(tx<W/2)_slide();else _jump();
  },{passive:false});
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key===' '){e.preventDefault();_jump();}
    if(e.key==='ArrowDown')_slide();
  });
  const loop=()=>{
    rafId=requestAnimationFrame(loop);
    if(!GPS0_running()&&!cinema)return;
    W=cv.width; H=cv.height;
    let ox=0,oy=0;
    if(shakeDur>0){ox=(Math.random()-.5)*shakeAmt*2;oy=(Math.random()-.5)*shakeAmt*2;shakeDur--;}
    ctx.save(); ctx.translate(ox,oy);
    bgT++;
    _bg(bgT); _ground();
    if(!cinema){_updPlayer();_updSoleils();_updMeteors();_updNovas();_updHearts();}
    _updParts();
    _drawSoleils(); _drawMeteors(); _drawNovas(); _drawHearts();
    _drawPlayer(bgT); _drawParts();
    _boss(bgT); _minions(bgT);
    _drawWarn(); _drawZones(); _bbar();
    if(cinema)_drawCinema();
    ctx.restore();
    if(!cinema&&!transitioning&&GPS0_running()){
      phaseTimer++;
      if(phase>(phaseMax||1))phaseMax=phase;
      if(--tSoleil<=0){
        _spawnSoleil(0);
        if(phase===3){_spawnSoleil(55);_spawnSoleil(110);}
        if(phase===4){_spawnSoleil(45);_spawnSoleil(90);_spawnSoleil(135);}
        tSoleil=phase===1?120:phase===2?90:phase===3?70:35;
      }
      if(--tMeteor<=0){
        _spawnMeteorSafe();
        tMeteor=phase===1?240:phase===2?150:phase===3?90:58;
      }
      if(phase>=2&&!novaWarnActive&&--tNova<=0){
        _triggerNova();
        tNova=phase===2?720:phase===3?480:300;
      }
      if(!heartPhaseSpawned[phase]&&--tHeart<=0)_spawnHeart();
      if(phaseTimer%(18*60)===0)spd=Math.min(5.5,spd+0.35);
    }
  };
  loop();
}
window.gameStart=gameStart;
window.GPS0_onTimerExpired=function(){endGame(false);};
</script>
