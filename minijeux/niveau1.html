<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <title>GPS0 - Facile</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden;background:#0A0A1A;color:#fff;font-family:"Trebuchet MS",sans-serif;touch-action:none}#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);border-bottom:1px solid rgba(200,162,200,.2);font-weight:bold;font-size:.9rem}#mj-e{color:#FFD700}#mj-v{color:#FF6B6B;letter-spacing:2px}#btn-q{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.6);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:.8rem}#monde{position:fixed;inset:0;overflow:hidden;background:url('../assets/backgrounds/fond_ecran1.jpeg') center/cover no-repeat}.bg-e{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.35) 1px,transparent 1px);background-size:55px 55px;animation:dr 45s linear infinite;pointer-events:none}@keyframes dr{to{transform:translateX(55px)}}.plate{position:absolute;border-radius:8px;background:linear-gradient(180deg,#5a5a6e,#3a3a4e);border-top:2px solid rgba(200,162,200,.4);box-shadow:0 4px 12px rgba(0,0,0,.5)}.plate:not(.sol){box-shadow:0 4px 12px rgba(0,0,0,.5),0 0 14px rgba(200,162,200,.55),0 0 30px rgba(200,162,200,.25)}.plate.sol{background:linear-gradient(180deg,#4a4a5e,#2a2a3e)}#joueur{position:absolute;width:40px;height:52px;display:flex;flex-direction:column;align-items:center;pointer-events:none}#casque{width:36px;height:36px;border-radius:50%;background:rgba(79,195,247,.15);border:2px solid rgba(79,195,247,.6);overflow:hidden;flex-shrink:0}#ts{width:100%;height:100%;image-rendering:pixelated;background-color:#9a72c8;background-size:cover;background-position:center}#corps{width:28px;height:20px;border-radius:4px;background:linear-gradient(180deg,#C8A2C8,#9a72c8);display:flex;align-items:center;justify-content:center;margin-top:1px}#corps::after{content:"";width:8px;height:8px;border-radius:50%;background:#FFD700}#jambes{display:flex;gap:4px;margin-top:1px}.jambe{width:10px;height:10px;border-radius:2px;background:#9a72c8}@keyframes sc{from{opacity:.7;transform:scale(.9)}to{opacity:1;transform:scale(1.1)}}.pic{position:absolute;clip-path:polygon(50% 0%,100% 100%,0% 100%);background:linear-gradient(180deg,#FF6B6B,#CC0000)}#ctrl-bar{position:fixed;bottom:0;left:0;right:0;height:110px;z-index:45;display:flex;align-items:center;justify-content:center;background:transparent;padding:8px}#bs{width:100%;max-width:600px;height:80px;border-radius:14px;border:2px solid rgba(79,195,247,.2);background:rgba(79,195,247,.05);color:rgba(255,255,255,.25);font-size:2.5rem;cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none}#lune{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:rgba(10,10,26,.95);border:1px solid rgba(255,255,255,.4);border-radius:14px;padding:8px 14px;font-size:.9rem;color:#fff;font-weight:bold;opacity:0;transition:opacity .4s;max-width:90vw;z-index:60;pointer-events:none;white-space:nowrap}#lune.v{opacity:1}#tuto{position:fixed;inset:0;z-index:100;background:rgba(10,10,26,.93);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:32px}#tuto h2{color:#C8A2C8;font-size:1.35rem;text-align:center;font-weight:bold}#tuto p{color:rgba(255,255,255,.85);text-align:center;font-size:.9rem;line-height:1.6;max-width:300px;font-weight:bold}.ti{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border-radius:12px;padding:10px 16px;width:100%;max-width:300px;font-size:.85rem;font-weight:bold}#btn-st{padding:14px 32px;background:linear-gradient(135deg,#C8A2C8,#9a72c8);border:none;border-radius:16px;color:#0A0A1A;font-weight:bold;font-size:1rem;cursor:pointer;margin-top:8px}#ov{position:fixed;inset:0;z-index:100;display:none;background:rgba(10,10,26,.93);backdrop-filter:blur(10px);flex-direction:column;align-items:center;justify-content:center;gap:20px}#ov.v{display:flex}#ot{font-size:2rem;font-weight:900}#ot.win{color:#69FF47}#ot.lose{color:#FF6B6B}.bo{padding:14px 32px;border:none;border-radius:16px;font-weight:bold;font-size:1rem;cursor:pointer}#bb{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff}#br{background:linear-gradient(135deg,#C8A2C8,#9a72c8);color:#0A0A1A}</style>
</head>
<body>

<div id="hud"><span>Facile ⭐</span><span id="mj-e">0/10 ✨</span><span id="mj-v">❤️❤️❤️</span><button id="btn-q">Quitter</button></div>
<div id="lune"></div><div id="monde"><div class="bg-e"></div></div>
<div id="joueur"><div id="casque"><div id="ts"></div></div><div id="corps"></div><div id="jambes"><div class="jambe"></div><div class="jambe"></div></div></div>
<div id="ctrl-bar"><button id="bs">⬆</button></div>
<div id="tuto"><h2>🌟 Facile — Premier Pas</h2><p>AUTO-RUNNER : le personnage avance tout seul ! Saute pour franchir les trous et les obstacles. 3 minutes pour collecter un max de ✨ !</p><div class="ti"><span>👆</span><span>Appui court = petit saut | long = grand saut</span></div><div class="ti"><span>✨</span><span>Collecte les étoiles dorées !</span></div><div class="ti"><span>⚠️</span><span>Les trous font chuter — 3 vies</span></div><button id="btn-st">C'est parti ! 🚀</button></div>
<div id="ov"><div id="ot"></div><div id="os"></div><div id="op"></div><div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;width:min(300px,90vw);align-items:stretch"><button class="bo" id="bc" style="display:none">🎁 Prendre la récompense</button><button class="bo" id="br" style="display:none">🔄 Recommencer</button><button class="bo" id="bb" style="display:none">❌ Abandonner</button></div></div>

    {x:Math.round(W*2.79+85),y:H-60,w:Math.round(W*.55),h:60,sol:true},
    {x:Math.round(W*3.39+90),y:H-60,w:Math.round(W*.61),h:60,sol:true},
    // Plateformes hautes accessibles (index 7-19)
    {x:Math.round(W*.12), y:H-155,w:110,h:18},
    {x:Math.round(W*.40), y:H-185,w:110,h:18},
    {x:Math.round(W*.70), y:H-170,w:115,h:18},
    {x:Math.round(W*.98), y:H-195,w:110,h:18},
    {x:Math.round(W*1.25),y:H-175,w:115,h:18},
    {x:Math.round(W*1.50),y:H-200,w:110,h:18},
    {x:Math.round(W*1.78),y:H-180,w:115,h:18},
    {x:Math.round(W*2.08),y:H-190,w:110,h:18},
    {x:Math.round(W*2.35),y:H-175,w:115,h:18},
    {x:Math.round(W*2.65),y:H-205,w:110,h:18},
    {x:Math.round(W*2.92),y:H-185,w:115,h:18},
    {x:Math.round(W*3.22),y:H-170,w:110,h:18},
    {x:Math.round(W*3.52),y:H-195,w:115,h:18}
  ],
  slimes:[],
  poussieres:[
    {pi:7},{pi:8},{pi:9},{pi:10},{pi:11},{pi:13},{pi:15},{pi:16},{pi:18},{pi:19}
  ],
  pics:[
    {x:Math.round(W*.78),y:H-78,h:18},
    {x:Math.round(W*1.45),y:H-78,h:18},
    {x:Math.round(W*2.08),y:H-78,h:18},
    {x:Math.round(W*2.65),y:H-78,h:18}
  ]
};})();</script>
