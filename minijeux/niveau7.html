<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 — Niveau 7</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0a0a1a url(../assets/backgrounds/bg-n7.svg) center/cover no-repeat;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
body{display:flex;flex-direction:column;height:100dvh}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#66ccff}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:52px;text-align:right}

#game-container{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;z-index:1}

/* ── ÉTOILES DE FOND ─────────────────────────────────────────────── */
#stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── CANVAS FX (explosions étoiles) ──────────────────────────────── */
#fx-cv{position:fixed;inset:0;z-index:50;pointer-events:none}

/* ── LISTE DES MOTS ──────────────────────────────────────────────── */
#word-list{flex:1;overflow-y:auto;padding:6px 8px 4px;display:flex;flex-direction:column;gap:5px;-webkit-overflow-scrolling:touch}
.wcard{padding:10px 12px;background:rgba(15,25,60,.85);border:1px solid rgba(70,160,255,.2);border-radius:12px;cursor:pointer;transition:background .2s,border-color .2s}
.wcard.sel{background:rgba(55,100,220,.35);border-color:rgba(100,175,255,.7)}
.wcard.found{background:rgba(30,140,60,.35);border-color:rgba(80,255,130,.4);pointer-events:none}
.wcard.wrong{animation:shake .4s}
.wdef{font-size:.85rem;color:#c0d8ff;line-height:1.35}
.winfo{display:flex;align-items:center;gap:8px;margin-top:4px}
.wlen{font-size:.72rem;color:rgba(180,200,255,.5);font-weight:bold}
.wans{font-size:.95rem;font-weight:900;letter-spacing:3px;color:#80ff80;display:none}
.wcard.found .wans{display:inline}
.wcard.found .wlen{display:none}
.wnum{width:22px;height:22px;border-radius:50%;background:rgba(70,130,255,.45);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;flex-shrink:0}
.wcard.found .wnum{background:rgba(50,180,80,.6)}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-3px)}}

/* ── ZONE DE SAISIE (lettres) ────────────────────────────────────── */
#input-area{display:none;padding:6px 8px;flex-shrink:0;text-align:center}
#input-area.show{display:block}
#letter-boxes{display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.lbox{width:32px;height:38px;border:2px solid rgba(100,170,255,.35);border-radius:8px;background:rgba(10,20,50,.9);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;color:#fff;transition:border-color .15s,background .15s}
.lbox.filled{border-color:rgba(100,190,255,.7);background:rgba(30,60,130,.7);color:#d8f0ff;text-shadow:0 0 6px rgba(100,200,255,.4)}
.lbox.correct{border-color:rgba(80,255,130,.65);background:rgba(30,120,50,.5);color:#80ff80}
.lbox.wrong-letter{border-color:#f44;background:rgba(180,30,30,.35);color:#faa}

/* ── CLAVIER AZERTY ──────────────────────────────────────────────── */
#kb{display:none;width:100%;padding:4px 3px 8px;flex-shrink:0}
#kb.show{display:flex;flex-direction:column;gap:5px}
.kr{display:flex;justify-content:center;gap:4px}
.kk{flex:1;max-width:42px;height:48px;border:none;border-radius:8px;background:rgba(35,55,120,.8);color:#d8eeff;font-size:1.05rem;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1px solid rgba(70,150,255,.2);transition:background .1s;-webkit-tap-highlight-color:transparent}
.kk:active{background:rgba(80,130,255,.6)}
.kk.wide{max-width:64px;font-size:.85rem;letter-spacing:1px}
.kk.action-back{background:rgba(180,60,60,.6);border-color:rgba(255,80,80,.3)}
.kk.action-back:active{background:rgba(220,80,80,.7)}
.kk.action-ok{background:rgba(40,150,70,.65);border-color:rgba(80,255,130,.3)}
.kk.action-ok:active{background:rgba(60,200,90,.7)}
</style>
</head>
<body>
<canvas id="stars-bg"></canvas>
<canvas id="fx-cv"></canvas>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:30</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="game-container">
  <div id="word-list"></div>
  <div id="input-area">
    <div id="letter-boxes"></div>
  </div>
  <div id="kb"></div>
</div>

<script src="shared.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════════════
   NIVEAU 7 — MOTS COSMIQUES
   10 mots spatiaux à deviner depuis leurs définitions
   Clavier AZERTY ergonomique, animation étoiles explosives
   2 poussières/mot + bonus 30 si 10/10 = 50 total
   ══════════════════════════════════════════════════════════════════════ */
window.NIVEAU = 7;
window.GPS0_TIMER_SEC = 0;
window.GPS0_onTimerExpired = function(){ };
window.GPS0_HIDE_TIMER = true;
window.TUTO_TEXT = "🔤 Mots Cosmiques !<br>Devine les 10 mots spatiaux 🚀<br><small>Lis la définition → tape le mot → valide ! Pas de chrono ⚔️</small>";

/* ── 10 MOTS ──────────────────────────────────────────────────────── */
var WORDS = [
  {w:'ETOILE',    d:'Boule de gaz brillante dans le ciel nocturne ⭐'},
  {w:'COMETE',    d:'Astre chevelu avec une longue queue lumineuse ☄️'},
  {w:'ORBITE',    d:"Trajectoire d'un objet autour d'un autre dans l'espace 🪐"},
  {w:'NEBULEUSE', d:'Immense nuage de gaz et de poussière cosmique 🌌'},
  {w:'CRATERE',   d:"Trou formé par l'impact d'une météorite 💥"},
  {w:'GALAXIE',   d:"Ensemble de milliards d'étoiles, comme la Voie Lactée 🌀"},
  {w:'SATELLITE', d:"Objet qui tourne autour d'une planète 🛰️"},
  {w:'FUSEE',     d:"Véhicule propulsé pour voyager dans l'espace 🚀"},
  {w:'APESANTEUR',d:"État où l'on flotte, sans gravité 🧑‍🚀"},
  {w:'COSMOS',    d:"Autre nom pour désigner l'Univers tout entier 🌠"}
];

/* ── ÉTAT ──────────────────────────────────────────────────────────── */
var aw = -1;      // active word index
var buf = '';      // input buffer
var nFound = 0;
var fxParts = [];  // particles for star explosions
var fxRaf = 0;
var fxCv, fxCtx;

/* ── ÉTOILES DE FOND ──────────────────────────────────────────────── */
function _drawStars(){
  var cv = document.getElementById('stars-bg');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  var x = cv.getContext('2d');
  for(var i=0;i<90;i++){
    var sx=Math.random()*cv.width, sy=Math.random()*cv.height;
    var r=Math.random()*1.5+.3, a=Math.random()*.6+.3;
    x.fillStyle='rgba(180,210,255,'+a+')';
    x.beginPath(); x.arc(sx,sy,r,0,6.283); x.fill();
  }
}

/* ── CONSTRUCTION LISTE DE MOTS ───────────────────────────────────── */
function _buildList(){
  var list = document.getElementById('word-list');
  list.innerHTML = '';
  for(var i=0;i<WORDS.length;i++){
    var card = document.createElement('div');
    card.className = 'wcard';
    card.dataset.i = i;
    card.innerHTML =
      '<div class="wdef"><span class="wnum">'+(i+1)+'</span> '+WORDS[i].d+'</div>'+
      '<div class="winfo"><span class="wlen">'+WORDS[i].w.length+' lettres</span>'+
      '<span class="wans"></span></div>';
    card.addEventListener('pointerdown', _tapCard);
    list.appendChild(card);
  }
}

/* ── CONSTRUCTION CLAVIER AZERTY ──────────────────────────────────── */
function _buildKB(){
  var kb = document.getElementById('kb');
  kb.innerHTML = '';
  var rows = ['AZERTYUIOP','QSDFGHJKLM','WXCVBN'];
  for(var ri=0;ri<3;ri++){
    var row = document.createElement('div');
    row.className = 'kr';
    if(ri===2){
      var bk = _mkKey('⬅','BACK','wide action-back');
      row.appendChild(bk);
    }
    for(var ci=0;ci<rows[ri].length;ci++){
      row.appendChild(_mkKey(rows[ri][ci], rows[ri][ci], ''));
    }
    if(ri===2){
      row.appendChild(_mkKey('OK','OK','wide action-ok'));
    }
    kb.appendChild(row);
  }
}

function _mkKey(txt, key, cls){
  var b = document.createElement('button');
  b.className = 'kk'+(cls?' '+cls:'');
  b.textContent = txt;
  b.dataset.k = key;
  b.addEventListener('pointerdown', _tapKey);
  return b;
}

/* ── INTERACTIONS ─────────────────────────────────────────────────── */
function _tapCard(e){
  if(!GPS0_running()) return;
  var idx = +e.currentTarget.dataset.i;
  if(WORDS[idx].found) return;
  _selectWord(idx);
}

function _selectWord(idx){
  // Deselect previous
  var cards = document.querySelectorAll('.wcard');
  for(var i=0;i<cards.length;i++) cards[i].classList.remove('sel');
  aw = idx; buf = '';
  cards[idx].classList.add('sel');
  // Scroll card into view
  cards[idx].scrollIntoView({behavior:'smooth', block:'nearest'});
  // Show input area + keyboard
  document.getElementById('input-area').classList.add('show');
  document.getElementById('kb').classList.add('show');
  _renderInput();
}

function _tapKey(e){
  if(!GPS0_running() || aw<0) return;
  var k = e.currentTarget.dataset.k;
  if(k==='BACK'){
    if(buf.length>0){ buf=buf.slice(0,-1); _renderInput(); }
    return;
  }
  if(k==='OK'){ _validate(); return; }
  if(buf.length < WORDS[aw].w.length){
    buf += k;
    _renderInput();
    if(buf.length === WORDS[aw].w.length) setTimeout(_validate, 200);
  }
}

/* ── AFFICHAGE CASES DE LETTRES ───────────────────────────────────── */
function _renderInput(){
  if(aw<0) return;
  var word = WORDS[aw].w;
  var box = document.getElementById('letter-boxes');
  box.innerHTML = '';
  for(var i=0;i<word.length;i++){
    var d = document.createElement('div');
    d.className = 'lbox'+(i<buf.length?' filled':'');
    d.textContent = i<buf.length ? buf[i] : '';
    box.appendChild(d);
  }
}

/* ── VALIDATION ──────────────────────────────────────────────────── */
function _validate(){
  if(aw<0) return;
  var word = WORDS[aw].w;
  if(buf.length < word.length) return; // pas assez de lettres

  var cards = document.querySelectorAll('.wcard');
  var boxes = document.querySelectorAll('.lbox');

  if(buf === word){
    // ✅ CORRECT
    WORDS[aw].found = true;
    nFound++;

    // Color boxes green
    for(var i=0;i<boxes.length;i++){
      boxes[i].classList.remove('filled');
      boxes[i].classList.add('correct');
    }

    // Update card
    cards[aw].classList.remove('sel');
    cards[aw].classList.add('found');
    var ansEl = cards[aw].querySelector('.wans');
    ansEl.textContent = '✅ '+word;
    ansEl.style.display = 'inline';

    // Star explosion!
    var rect = cards[aw].getBoundingClientRect();
    _spawnStarExplosion(rect.left + rect.width/2, rect.top + rect.height/2);

    addDust(5);
    if(navigator.vibrate) navigator.vibrate([8,4,15]);

    // All 10 found?
    if(nFound >= 10){
      window.GPS0_rewardOverride = 50;
      setTimeout(function(){ endGame(true); }, 1200);
    }

    // Hide input after short delay
    var savedAw = aw;
    aw = -1; buf = '';
    setTimeout(function(){
      document.getElementById('input-area').classList.remove('show');
      document.getElementById('kb').classList.remove('show');
      // Auto-select next unfound word
      for(var j=savedAw+1;j<WORDS.length;j++){
        if(!WORDS[j].found){ _selectWord(j); return; }
      }
      for(var j2=0;j2<savedAw;j2++){
        if(!WORDS[j2].found){ _selectWord(j2); return; }
      }
    }, 600);
  } else {
    // ❌ WRONG
    // Show which letters are wrong
    for(var i2=0;i2<boxes.length;i2++){
      if(buf[i2] === word[i2]) boxes[i2].classList.add('correct');
      else boxes[i2].classList.add('wrong-letter');
    }
    cards[aw].classList.add('wrong');
    if(navigator.vibrate) navigator.vibrate([40,20,80]);

    var savedAw2 = aw;
    buf = '';
    setTimeout(function(){
      if(aw === savedAw2) _renderInput();
      cards[savedAw2].classList.remove('wrong');
    }, 700);
  }
}

/* ══════════════════════════════════════════════════════════════════════
   ANIMATION ÉTOILES EXPLOSIVES (canvas overlay)
   ══════════════════════════════════════════════════════════════════════ */
var STAR_COLORS = ['#FFD700','#FFFFFF','#66CCFF','#FF88CC','#80FF80','#FFA500'];

function _spawnStarExplosion(cx, cy){
  for(var i=0;i<28;i++){
    var angle = Math.random()*Math.PI*2;
    var speed = 2 + Math.random()*5;
    var sz = 4 + Math.random()*8;
    fxParts.push({
      x: cx, y: cy,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      sz: sz,
      rot: Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*0.3,
      life: 1,
      decay: 0.012 + Math.random()*0.015,
      color: STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)]
    });
  }
  if(!fxRaf) fxRaf = requestAnimationFrame(_fxLoop);
}

function _drawStar(ctx, cx, cy, r, rot, color, alpha){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  for(var i=0;i<5;i++){
    var a = (i*4*Math.PI/5) - Math.PI/2;
    var method = i===0 ? 'moveTo' : 'lineTo';
    ctx[method](Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fill();
  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = r*2;
  ctx.fill();
  ctx.restore();
}

function _fxLoop(){
  fxCv.width = window.innerWidth;
  fxCv.height = window.innerHeight;
  fxCtx.clearRect(0, 0, fxCv.width, fxCv.height);

  for(var i=fxParts.length-1;i>=0;i--){
    var p = fxParts[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity
    p.vx *= 0.99;
    p.rot += p.rotV;
    p.life -= p.decay;
    if(p.life <= 0){ fxParts.splice(i, 1); continue; }
    _drawStar(fxCtx, p.x, p.y, p.sz*p.life, p.rot, p.color, p.life);
  }

  if(fxParts.length > 0){
    fxRaf = requestAnimationFrame(_fxLoop);
  } else {
    fxRaf = 0;
  }
}

/* ── LIFECYCLE ───────────────────────────────────────────────────── */
function gameReset(){
  aw = -1; buf = ''; nFound = 0;
  fxParts = []; fxRaf = 0;
  for(var i=0;i<WORDS.length;i++) WORDS[i].found = false;
  fxCv = document.getElementById('fx-cv');
  fxCtx = fxCv.getContext('2d');
  _buildList();
  _buildKB();
  _drawStars();
  document.getElementById('input-area').classList.remove('show');
  document.getElementById('kb').classList.remove('show');
}
window.gameReset = gameReset;
function gameStart(){ gameReset(); }
window.gameStart = gameStart;
</script>
</body>
</html>
