<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#050510 url(../assets/backgrounds/bg-n3.svg) center/cover no-repeat;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#88CCFF}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:52px;text-align:right}
#game-container{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}
canvas{display:block;width:100%;height:100%}
body{display:flex;flex-direction:column;height:100dvh}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:00</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
window.NIVEAU = 3;
window.TUTO_TEXT = "\u2604\ufe0f Rebond automatique \u00b7 Tape \u25c4 \u25ba pour diriger<br><small>3 vies \u00b7 Bulle prot\u00e8ge 5s apr\u00e8s coup \u00b7 Survive 2 minutes</small>";
window.GPS0_TIMER_SEC = 120;

// \u2500\u2500 CONSTANTES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const GRAV       = 0.36;
const BOUNCE_VY  = -14.5;
const PLAYER_R   = 22;
const PLAT_H     = 12;
const MOVE_SPEED = 4.4;

// \u2500\u2500 \u00c9TAT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let player, platforms, parts, stars;
let cameraY, genTopY, startPlayerY, maxHeight;
let frame, bgT, rafId, invincible, bubbleTimer;
let touching, pointers;
let platformsLanded;

window.GPS0_computeDust = function(success) {
  const tempsJoue = GPS0_timerTotal() - GPS0_timerSec();
  if (tempsJoue < 15) return 0;
  if (tempsJoue < 30) return 2;
  if (tempsJoue < 45) return 5;
  if (tempsJoue < 60) return 10;
  if (tempsJoue < 90) return 20;
  if (tempsJoue < 120) return 35;
  return 50;
};

function gameReset() {
  cancelAnimationFrame(rafId);
  player       = { x: 0, worldY: 0, vx: 0, vy: 0 };
  platforms    = [];
  parts        = [];
  stars        = [];
  cameraY      = 0;
  genTopY      = 0;
  startPlayerY = 0;
  maxHeight    = 0;
  frame        = 0;
  bgT          = 0;
  invincible   = 0;
  bubbleTimer  = 0;
  touching     = { left: false, right: false };
  pointers     = {};
  platformsLanded = 0;
}
window.gameReset = gameReset;

function gameStart() {
  const cv = document.getElementById('cv');
  GPS0_resizeCanvas(cv);
  gameReset();
  const W = cv.width, H = cv.height;

  // \u00c9toiles (world-relative, parallax lent)
  for (let i = 0; i < 90; i++) {
    stars.push({
      x: Math.random() * W,
      wy: (Math.random() - 0.5) * H * 6,
      r: 0.5 + Math.random() * 1.5,
      twOff: Math.random() * Math.PI * 2
    });
  }

  // Position initiale joueur
  startPlayerY  = H * 0.62;
  player.x      = W * 0.5;
  player.worldY = startPlayerY;
  cameraY       = startPlayerY - H * 0.62;
  genTopY       = startPlayerY + PLAT_H + 10;

  // Plateforme de d\u00e9part sous le joueur
  platforms.push({
    x: player.x - 42, worldY: startPlayerY + PLAYER_R + 4,
    w: 84, type: 'normal', vx: 0, broken: false, alpha: 1
  });

  // G\u00e9n\u00e9rer le premier lot
  _genPlatforms(W, H);

  // Premier rebond auto
  player.vy = BOUNCE_VY;

  // Contr\u00f4les tactiles (split-screen gauche/droite)
  const _updateTouching = () => {
    touching.left  = Object.values(pointers).includes('left');
    touching.right = Object.values(pointers).includes('right');
  };
  cv.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (!GPS0_running()) return;
    pointers[e.pointerId] = e.clientX < window.innerWidth * 0.5 ? 'left' : 'right';
    _updateTouching();
  });
  const _rel = e => { delete pointers[e.pointerId]; _updateTouching(); };
  cv.addEventListener('pointerup', _rel);
  cv.addEventListener('pointercancel', _rel);

  const ctx = cv.getContext('2d');

  const loop = () => {
    rafId = requestAnimationFrame(loop);
    if (!GPS0_running()) return;
    const W = cv.width, H = cv.height;
    frame++; bgT++;

    // Contr\u00f4le horizontal
    if (touching.left)       player.vx = Math.max(player.vx - 0.55, -MOVE_SPEED);
    else if (touching.right) player.vx = Math.min(player.vx + 0.55,  MOVE_SPEED);
    else                     player.vx *= 0.80;

    // Physique joueur
    player.vy     += GRAV;
    player.worldY += player.vy;
    player.x      += player.vx;

    // Wrap horizontal
    if (player.x < -PLAYER_R)    player.x = W + PLAYER_R;
    if (player.x > W + PLAYER_R) player.x = -PLAYER_R;

    // Hauteur max
    const climbed = startPlayerY - player.worldY;
    if (climbed > maxHeight) maxHeight = climbed;

    // Cam\u00e9ra : suit uniquement vers le haut
    const idealCamY = player.worldY - H * 0.42;
    if (idealCamY < cameraY) cameraY = idealCamY;

    // G\u00e9n\u00e9ration plateformes
    _genPlatforms(W, H);

    // Rebond sur plateformes (seulement en chute)
    if (player.vy > 0) {
      for (const p of platforms) {
        if (p.broken) continue;
        const prevBot = player.worldY - player.vy + PLAYER_R;
        const currBot = player.worldY + PLAYER_R;
        if (
          prevBot <= p.worldY + 3 &&
          currBot >= p.worldY &&
          player.x > p.x - PLAYER_R * 0.55 &&
          player.x < p.x + p.w + PLAYER_R * 0.55
        ) {
          player.vy     = BOUNCE_VY;
          player.worldY = p.worldY - PLAYER_R;
          platformsLanded++;
          navigator.vibrate && navigator.vibrate(10);
          for (let i = 0; i < 6; i++) {
            parts.push({
              x: player.x + (Math.random() - 0.5) * 20,
              worldY: p.worldY,
              vx: (Math.random() - 0.5) * 4.5,
              vy: 0.5 + Math.random() * 2,
              life: 20,
              col: p.type === 'fragile' ? '#FF5548' : '#aaddff'
            });
          }
          if (p.type === 'fragile') { p.broken = true; }
          break;
        }
      }
    }

    // Chute mortelle
    if (player.worldY > cameraY + H + 90 && GPS0_running()) {
      invincible = 100;
      loseLife();
      if (GPS0_running()) _respawn(W, H);
    }

    // Plateformes mobiles
    platforms.forEach(p => {
      if (p.vx !== 0) {
        p.x += p.vx;
        if (p.x < 0 || p.x + p.w > W) p.vx *= -1;
      }
      if (p.broken) p.alpha = Math.max(0, p.alpha - 0.055);
    });
    platforms = platforms.filter(p => p.worldY < cameraY + H + PLAT_H * 2 && p.alpha > 0);

    // Invincibilit\u00e9 apr\u00e8s d\u00e9g\u00e2t
    if (invincible > 0) invincible--;

    // Particules
    parts = parts.filter(p => p.life > 0);
    parts.forEach(p => { p.x += p.vx; p.worldY += p.vy; p.vy += 0.12; p.life--; });

    // \u2500\u2500\u2500\u2500 DESSIN \u2500\u2500\u2500\u2500
    ctx.clearRect(0, 0, W, H);
    _drawBg(ctx, W, H);
    _drawPlatforms(ctx, H);

    // Particules
    parts.forEach(p => {
      const sy = p.worldY - cameraY;
      if (sy < -10 || sy > H + 10) return;
      ctx.globalAlpha = p.life / 32;
      ctx.fillStyle   = p.col;
      ctx.beginPath(); ctx.arc(p.x, sy, 3, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Cosmonaute (clignotant si invincible)
    const pSY  = player.worldY - cameraY;
    const show = invincible === 0 || Math.floor(invincible / 6) % 2 === 0;
    // Bulle de protection visible
    if (bubbleTimer > 0 && show) {
      const bubbleAlpha = Math.min(1, bubbleTimer / 60) * 0.55;
      const bubbleR = PLAYER_R + 18 + Math.sin(Date.now() * 0.008) * 4;
      const bg = ctx.createRadialGradient(player.x, pSY, bubbleR * 0.5, player.x, pSY, bubbleR);
      bg.addColorStop(0, 'rgba(80,180,255,0)');
      bg.addColorStop(0.7, `rgba(80,180,255,${bubbleAlpha * 0.4})`);
      bg.addColorStop(1, `rgba(160,230,255,${bubbleAlpha})`);
      ctx.beginPath(); ctx.arc(player.x, pSY, bubbleR, 0, Math.PI * 2);
      ctx.fillStyle = bg; ctx.fill();
      ctx.strokeStyle = `rgba(180,240,255,${bubbleAlpha * 1.4})`;
      ctx.lineWidth = 2; ctx.stroke();
    }
    if (show) {
      const tilt = Math.max(-0.9, Math.min(0.9, player.vx * 0.07));
      drawCosmonaut(ctx, player.x, pSY, PLAYER_R, tilt, 'jump');
    }

    // Fl\u00e8ches directionnelles
    _drawControls(ctx, W, H);
    // Indicateur de palier poussières (bas droite)
    const _tempsJ = GPS0_timerTotal() - GPS0_timerSec();
    const _paliers = [{t:0,d:0},{t:15,d:2},{t:30,d:5},{t:45,d:10},{t:60,d:20},{t:90,d:35},{t:120,d:50}];
    let _palierActuel = _paliers[0], _palierSuivant = null;
    for (let _pi = _paliers.length - 1; _pi >= 0; _pi--) {
      if (_tempsJ >= _paliers[_pi].t) { _palierActuel = _paliers[_pi]; _palierSuivant = _paliers[_pi + 1] || null; break; }
    }
    const _palierTxt = _palierActuel.d + ' ✨';
    const _nextTxt = _palierSuivant ? 'Prochain : ' + _palierSuivant.t + 's → ' + _palierSuivant.d + '✨' : 'MAX 🌟';
    const _hPalier = 44;
    ctx.fillStyle = 'rgba(0,0,0,.52)';
    ctx.beginPath(); ctx.roundRect(W - 122, H - _hPalier - 2, 116, _hPalier, 7); ctx.fill();
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(_palierTxt, W - 64, H - _hPalier + 14);
    ctx.fillStyle = 'rgba(255,215,0,.6)'; ctx.font = '9px system-ui';
    ctx.fillText(_nextTxt, W - 64, H - _hPalier + 28);
    // Compteur hauteur (bas gauche)
    ctx.fillStyle = 'rgba(0,0,0,.52)';
    ctx.beginPath(); ctx.roundRect(6, H - 44, 86, 38, 7); ctx.fill();
    ctx.fillStyle   = '#88CCFF';
    ctx.font        = 'bold 12px system-ui';
    ctx.textAlign   = 'center';
    ctx.fillText('\u2191 ' + Math.round(maxHeight) + 'm', 49, H - 26);
    ctx.fillStyle = 'rgba(136,204,255,.55)';
    ctx.font      = '10px system-ui';
    ctx.fillText('hauteur', 49, H - 14);
  };

  loop();
}
window.gameStart = gameStart;

// \u2500\u2500 G\u00c9N\u00c9RATION PLATEFORMES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _genPlatforms(W, H) {
  const genTarget = cameraY - H * 1.6;
  // Paliers de difficulté par temps (frame/60 = secondes depuis le début du jeu)
  const t = frame / 60;
  let fragileChance, platW, gap, mobileChance, mobileSpd;
  if      (t < 30) { fragileChance = 0;    platW = 84; gap = 68;  mobileChance = 0;    mobileSpd = 0;   }
  else if (t < 45) { fragileChance = 0.20; platW = 68; gap = 80;  mobileChance = 0;    mobileSpd = 0;   }
  else if (t < 60) { fragileChance = 0.40; platW = 56; gap = 92;  mobileChance = 0.25; mobileSpd = 1.2; }
  else if (t < 90) { fragileChance = 0.50; platW = 48; gap = 108; mobileChance = 0.38; mobileSpd = 2.0; }
  else             { fragileChance = 0.60; platW = 38; gap = 124; mobileChance = 0.50; mobileSpd = 2.8; }

  while (genTopY > genTarget) {
    genTopY -= gap + Math.random() * 28;
    const x    = 10 + Math.random() * (W - platW - 20);
    const type = Math.random() < fragileChance ? 'fragile' : 'normal';
    const vx   = Math.random() < mobileChance
      ? (mobileSpd + Math.random() * 0.8) * (Math.random() < 0.5 ? 1 : -1)
      : 0;
    platforms.push({ x, worldY: genTopY, w: platW, type, vx, broken: false, alpha: 1 });
  }
}

// \u2500\u2500 RESPAWN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _respawn(W, H) {
  const visible = platforms.filter(p =>
    !p.broken &&
    p.worldY > cameraY + H * 0.05 &&
    p.worldY < cameraY + H * 0.72
  );
  if (visible.length > 0) {
    const top     = visible.reduce((a, b) => a.worldY < b.worldY ? a : b);
    player.x      = top.x + top.w * 0.5;
    player.worldY = top.worldY - PLAYER_R;
  } else {
    player.x      = W * 0.5;
    player.worldY = cameraY + H * 0.5;
  }
  player.vy = BOUNCE_VY;
  player.vx = 0;
}

// \u2500\u2500 FOND \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _drawBg(ctx, W, H) {
  ctx.fillStyle = '#030310';
  ctx.fillRect(0, 0, W, H);

  // Gradient subtil (haut = plus sombre)
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, 'rgba(2,2,14,0)');
  bg.addColorStop(1, 'rgba(8,10,28,0.5)');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // \u00c9toiles (parallax lent)
  stars.forEach(s => {
    const sy = ((s.wy - cameraY * 0.045) % (H * 6) + H * 6) % (H * 6) - H * 0.5;
    if (sy < -4 || sy > H + 4) return;
    const tw = 0.42 + 0.58 * Math.sin(bgT * 0.017 + s.twOff);
    ctx.globalAlpha = tw;
    ctx.fillStyle   = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, sy, s.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Terre (coin haut droit, fixe)
  _drawEarth(ctx, W, H);

  // Surface lunaire (visible seulement au d\u00e9but, dispara\u00eet en montant)
  const surfSY = (startPlayerY + PLAYER_R + 30) - cameraY;
  if (surfSY < H + 20) _drawLunarSurface(ctx, W, H, surfSY);
}

function _drawEarth(ctx, W, H) {
  const er = Math.min(W, H) * 0.17;
  const ex = W * 0.84, ey = er * 0.72;

  // Atmosph\u00e8re
  const atmG = ctx.createRadialGradient(ex, ey, er * 0.88, ex, ey, er * 1.3);
  atmG.addColorStop(0, 'rgba(80,160,255,0.20)');
  atmG.addColorStop(1, 'rgba(40,80,255,0)');
  ctx.fillStyle = atmG;
  ctx.beginPath(); ctx.arc(ex, ey, er * 1.3, 0, Math.PI * 2); ctx.fill();

  // Globe
  const eg = ctx.createRadialGradient(ex - er * 0.3, ey - er * 0.35, er * 0.06, ex, ey, er);
  eg.addColorStop(0, '#5ab8ff');
  eg.addColorStop(0.38, '#2470d8');
  eg.addColorStop(0.72, '#1a4a8e');
  eg.addColorStop(1, '#0a1840');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI * 2); ctx.fill();

  // Continents + nuages (clip)
  ctx.save();
  ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI * 2); ctx.clip();
  ctx.fillStyle = 'rgba(32,155,80,0.76)';
  ctx.beginPath(); ctx.ellipse(ex - er * 0.24, ey + er * 0.08, er * 0.30, er * 0.40,  0.35, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex + er * 0.30, ey - er * 0.18, er * 0.22, er * 0.32, -0.28, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex - er * 0.05, ey - er * 0.38, er * 0.38, er * 0.14,  0.15, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.ellipse(ex - er * 0.32, ey - er * 0.42, er * 0.30, er * 0.09,  0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex + er * 0.14, ey + er * 0.30, er * 0.26, er * 0.07, -0.10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.beginPath(); ctx.ellipse(ex - er * 0.28, ey - er * 0.30, er * 0.22, er * 0.14, -0.58, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  ctx.strokeStyle = 'rgba(100,195,255,0.32)';
  ctx.lineWidth   = 1.8;
  ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI * 2); ctx.stroke();
}

function _drawLunarSurface(ctx, W, H, groundSY) {
  const sg = ctx.createLinearGradient(0, groundSY, 0, H);
  sg.addColorStop(0, '#3e4248');
  sg.addColorStop(0.3, '#2a2d32');
  sg.addColorStop(1, '#181a1e');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.moveTo(-5, H + 5);
  for (let x = 0; x <= W + 10; x += 14) {
    const bump = Math.sin(x * 0.038 + 1.2) * 8 + Math.sin(x * 0.012 + 3) * 14;
    ctx.lineTo(x, groundSY + bump);
  }
  ctx.lineTo(W + 5, H + 5); ctx.closePath(); ctx.fill();

  [[W * 0.13, 12, 13], [W * 0.45, 8, 10], [W * 0.74, 14, 16]].forEach(([cx, dy, cr]) => {
    ctx.fillStyle   = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.arc(cx, groundSY + dy, cr, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(180,185,195,0.22)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath(); ctx.arc(cx, groundSY + dy, cr, 0, Math.PI * 2); ctx.stroke();
  });
}

// \u2500\u2500 PLATEFORMES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _drawPlatforms(ctx, H) {
  platforms.forEach(p => {
    const sy = p.worldY - cameraY;
    if (sy < -PLAT_H - 5 || sy > H + 10) return;

    ctx.globalAlpha = p.alpha;

    const isFragile = p.type === 'fragile';
    const isMove    = p.vx !== 0;
    const topCol    = isFragile ? '#d04830' : isMove ? '#4a98d8' : '#8a9eac';
    const botCol    = isFragile ? '#7a1810' : isMove ? '#2a5888' : '#4e6070';

    const pg = ctx.createLinearGradient(p.x, sy, p.x, sy + PLAT_H);
    pg.addColorStop(0, topCol);
    pg.addColorStop(1, botCol);
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.roundRect(p.x, sy, p.w, PLAT_H, 5); ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.20)';
    ctx.beginPath(); ctx.roundRect(p.x + 3, sy + 2, p.w - 6, 3, 2); ctx.fill();

    if (isMove) {
      const pulse = 0.55 + 0.45 * Math.sin(bgT * 0.1);
      ctx.fillStyle = `rgba(140,220,255,${pulse.toFixed(2)})`;
      ctx.beginPath(); ctx.arc(p.x + p.w * 0.5, sy + PLAT_H * 0.5, 3.5, 0, Math.PI * 2); ctx.fill();
    }
    if (isFragile) {
      // Craquelures danger
      ctx.strokeStyle = 'rgba(255,80,40,0.55)';
      ctx.lineWidth   = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.roundRect(p.x + 2, sy + 2, p.w - 4, PLAT_H - 4, 3); ctx.stroke();
      ctx.setLineDash([]);
      // Symbole danger
      ctx.fillStyle = 'rgba(255,160,40,0.70)';
      ctx.font = `${Math.min(PLAT_H - 2, 9)}px system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText('⚠', p.x + p.w * 0.5, sy + PLAT_H - 2);
    }
    ctx.globalAlpha = 1;
  });
}

// \u2500\u2500 HUD FL\u00c8CHES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _drawControls(ctx, W, H) {
  ctx.font      = '28px system-ui';
  ctx.textAlign = 'center';
  ctx.globalAlpha = touching.left ? 0.70 : 0.22;
  ctx.fillStyle   = '#88CCFF';
  ctx.fillText('\u25c4', W * 0.16, H - 20);
  ctx.globalAlpha = touching.right ? 0.70 : 0.22;
  ctx.fillText('\u25ba', W * 0.84, H - 20);
  ctx.globalAlpha = 1;
}
</script>
