<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#88ddff}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:52px;text-align:right}
#game-container{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}
canvas{display:block;width:100%;height:100%}
body{display:flex;flex-direction:column;height:100dvh}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:30</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
window.NIVEAU = 8;
window.TUTO_TEXT = "Niveau 8 \u2014 Swipe ou D-pad \u00b7 Monte le plus haut possible \u00b7 \u00c9vite les wagons \u00b7 10s sans bouger = vie perdue";

const COLS = 9, ROW_H = 66, IDLE_LIMIT = 600, FLOOR_PCT = 0.82;

let CELL_W;
let player, rows, camOffY, idleTimer, invTimer, maxRow, frame, bgT, particles, dpadEl, rafId;
let swX = null, swY = null;

function rowTop(r, H) {
  return H * FLOOR_PCT - (r + 1) * ROW_H + camOffY;
}

function _shipWidth(r) {
  return Math.min(0.76 + r * 0.021, 1.54);
}

function _rowSpeed(r) {
  return Math.min(1.4 + r * 0.085, 5.0);
}

function _isSafeRow(r) {
  return r === 0 || r % 7 === 0;
}

function _genRow(r) {
  if (_isSafeRow(r)) return { ships: [], safe: true, dir: 0, spd: 0 };
  const dir = (r % 2 === 0) ? 1 : -1;
  const spd = _rowSpeed(r);
  const n = r < 6 ? 2 : r < 14 ? 2 + (r % 2) : 3;
  const ships = [];
  for (let i = 0; i < n; i++) {
    ships.push({ x: (i * COLS / n) + 0.2 + Math.random() * 0.6 });
  }
  return { ships, safe: false, dir, spd };
}

function gameReset() {
  cancelAnimationFrame(rafId);
  player = { col: Math.floor(COLS / 2), row: 0, drawCol: Math.floor(COLS / 2) };
  rows = [];
  for (let i = 0; i < 22; i++) rows.push(_genRow(i));
  camOffY = 0;
  idleTimer = 0; invTimer = 0; maxRow = 0;
  frame = 0; bgT = 0; particles = [];
}
window.gameReset = gameReset;

function gameStart() {
  const cv = document.getElementById('cv');
  GPS0_resizeCanvas(cv);
  CELL_W = cv.width / COLS;
  gameReset();
  _buildDpad();

  cv.addEventListener('touchstart', e => {
    const t = e.touches[0]; swX = t.clientX; swY = t.clientY;
  }, { passive: true });
  cv.addEventListener('touchend', e => {
    if (swX === null) return;
    const dx = e.changedTouches[0].clientX - swX, dy = e.changedTouches[0].clientY - swY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 22) { swX = null; swY = null; return; }
    if (Math.abs(dx) > Math.abs(dy)) _tryMove(dx > 0 ? 1 : -1, 0);
    else _tryMove(0, dy < 0 ? 1 : -1);
    swX = null; swY = null;
  }, { passive: true });
  document.addEventListener('keydown', e => {
    const m = { ArrowLeft:[-1,0], ArrowRight:[1,0], ArrowUp:[0,1], ArrowDown:[0,-1] };
    if (m[e.key]) { e.preventDefault(); _tryMove(...m[e.key]); }
  });

  const ctx = cv.getContext('2d');
  const loop = () => {
    rafId = requestAnimationFrame(loop);
    if (!GPS0_running()) return;
    const W = cv.width, H = cv.height;
    frame++; bgT++;

    // Smooth col anim
    player.drawCol += (player.col - player.drawCol) * 0.22;

    // Camera smooth follow
    camOffY += (player.row * ROW_H - camOffY) * 0.13;

    // Idle timer
    if (invTimer === 0) idleTimer++;
    if (idleTimer >= IDLE_LIMIT) {
      idleTimer = 0; invTimer = 80;
      const px = player.drawCol * CELL_W + CELL_W / 2;
      const py = rowTop(player.row, H) + ROW_H / 2;
      _spawnFx(px, py, '#ffaa00', 10);
      loseLife();
    }
    if (invTimer > 0) invTimer--;

    // Ensure rows
    while (rows.length < player.row + 24) rows.push(_genRow(rows.length));

    // Update ships
    rows.forEach(row => {
      if (row.safe) return;
      row.ships.forEach(s => {
        s.x += row.dir * row.spd / CELL_W;
        if (s.x > COLS + 1.2) s.x -= COLS;
        if (s.x < -1.2) s.x += COLS;
      });
    });

    // Collision
    if (invTimer === 0 && player.row < rows.length && !rows[player.row].safe) {
      const row = rows[player.row];
      const sw = _shipWidth(player.row);
      const pL = player.col + 0.14, pR = player.col + 0.86;
      let hit = false;
      for (const s of row.ships) {
        if (hit) break;
        for (const ox of [0, COLS, -COLS]) {
          const sL = s.x + ox - sw / 2, sR = s.x + ox + sw / 2;
          if (sR > pL && sL < pR) {
            hit = true;
            invTimer = 80;
            idleTimer = 0;
            player.row = Math.max(0, player.row - 1);
            const hpx = player.drawCol * CELL_W + CELL_W / 2;
            const hpy = rowTop(player.row, H) + ROW_H / 2;
            _spawnFx(hpx, hpy, '#80ccff', 14);
            loseLife();
            navigator.vibrate && navigator.vibrate([20, 8, 45]);
            break;
          }
        }
      }
    }

    // Particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.life--; });

    // ====== DRAW ======
    ctx.clearRect(0, 0, W, H);

    // Deep space BG
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#010915'); bg.addColorStop(1, '#040f2c');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Frost nebula BG
    ctx.fillStyle = 'rgba(70,160,255,.04)';
    ctx.beginPath(); ctx.ellipse(W * .35, H * .32, W * .52, H * .38, -.28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(120,210,255,.03)';
    ctx.beginPath(); ctx.ellipse(W * .74, H * .62, W * .4, H * .3, .35, 0, Math.PI * 2); ctx.fill();

    // Stars
    for (let i = 0; i < 30; i++) {
      const sx = (i * 137 + 11) % W, sy = (i * 79 + 9) % H;
      ctx.globalAlpha = 0.13 + 0.13 * Math.sin(bgT * 0.022 + i * 0.72);
      ctx.fillStyle = '#b0d8f8';
      ctx.beginPath(); ctx.arc(sx, sy, 0.5 + (i % 3) * 0.32, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw rows
    const rMin = Math.max(0, player.row - 4);
    const rMax = Math.min(rows.length - 1, player.row + 15);
    for (let r = rMin; r <= rMax; r++) {
      const row = rows[r];
      const ty = rowTop(r, H);
      if (ty > H + ROW_H || ty < -ROW_H * 2) continue;

      if (row.safe) {
        // Safe row: dark blue ice
        ctx.fillStyle = 'rgba(28,58,118,.74)';
        ctx.fillRect(0, ty, W, ROW_H);
        // Cell grid
        ctx.strokeStyle = 'rgba(100,190,255,.13)'; ctx.lineWidth = 0.5;
        for (let c = 0; c < COLS; c++) {
          ctx.strokeRect(c * CELL_W + 0.5, ty + 0.5, CELL_W - 1, ROW_H - 1);
        }
        // Subtle crystals
        ctx.globalAlpha = 0.07;
        ctx.fillStyle = '#88ddff';
        for (let c = 0; c < COLS; c++) {
          const cx = c * CELL_W + CELL_W / 2, cy = ty + ROW_H / 2;
          ctx.beginPath(); ctx.moveTo(cx, cy-8); ctx.lineTo(cx+5, cy); ctx.lineTo(cx, cy+8); ctx.lineTo(cx-5, cy); ctx.closePath(); ctx.fill();
        }
        ctx.globalAlpha = 1;
      } else {
        // Obstacle row: dark with rail glow
        ctx.fillStyle = 'rgba(4,10,30,.88)';
        ctx.fillRect(0, ty, W, ROW_H);
        // Rail glow top
        const rgt = ctx.createLinearGradient(0, ty, 0, ty + 10);
        rgt.addColorStop(0, 'rgba(55,195,255,.68)'); rgt.addColorStop(1, 'rgba(55,195,255,0)');
        ctx.fillStyle = rgt; ctx.fillRect(0, ty, W, 10);
        // Rail glow bottom
        const rgb = ctx.createLinearGradient(0, ty + ROW_H - 10, 0, ty + ROW_H);
        rgb.addColorStop(0, 'rgba(55,195,255,0)'); rgb.addColorStop(1, 'rgba(55,195,255,.68)');
        ctx.fillStyle = rgb; ctx.fillRect(0, ty + ROW_H - 10, W, 10);
        // Rail lines
        ctx.strokeStyle = 'rgba(80,215,255,.42)'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(0, ty + 3.5); ctx.lineTo(W, ty + 3.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, ty + ROW_H - 3.5); ctx.lineTo(W, ty + ROW_H - 3.5); ctx.stroke();

        // Ships
        const sw = _shipWidth(r) * CELL_W;
        const sh = ROW_H * 0.56;
        const shipCY = ty + ROW_H / 2;
        row.ships.forEach(s => {
          for (const ox of [0, COLS, -COLS]) {
            const sx2 = (s.x + ox) * CELL_W;
            if (sx2 + sw / 2 < -12 || sx2 - sw / 2 > W + 12) continue;
            // Glow aura
            const sg = ctx.createRadialGradient(sx2, shipCY, 3, sx2, shipCY, sw * 0.72);
            sg.addColorStop(0, 'rgba(55,200,255,.22)'); sg.addColorStop(1, 'rgba(55,200,255,0)');
            ctx.fillStyle = sg;
            ctx.beginPath(); ctx.ellipse(sx2, shipCY, sw * 0.72, sh * 0.78, 0, 0, Math.PI * 2); ctx.fill();
            // Chrome body
            const wg = ctx.createLinearGradient(sx2 - sw / 2, shipCY - sh / 2, sx2 - sw / 2, shipCY + sh / 2);
            wg.addColorStop(0, '#bdd8ee'); wg.addColorStop(0.28, '#3d5a74'); wg.addColorStop(0.72, '#253848'); wg.addColorStop(1, '#8aaec8');
            ctx.fillStyle = wg;
            ctx.beginPath(); ctx.roundRect(sx2 - sw / 2, shipCY - sh / 2, sw, sh, 7); ctx.fill();
            // Top neon line
            ctx.strokeStyle = 'rgba(110,232,255,.88)'; ctx.lineWidth = 1.8;
            ctx.beginPath(); ctx.moveTo(sx2 - sw / 2 + 7, shipCY - sh / 2); ctx.lineTo(sx2 + sw / 2 - 7, shipCY - sh / 2); ctx.stroke();
            // Bottom neon line dimmer
            ctx.strokeStyle = 'rgba(55,145,210,.52)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(sx2 - sw / 2 + 7, shipCY + sh / 2); ctx.lineTo(sx2 + sw / 2 - 7, shipCY + sh / 2); ctx.stroke();
            // Portholes
            const wCount = Math.max(1, Math.floor(sw / (CELL_W * 0.56)));
            for (let wi = 0; wi < wCount; wi++) {
              const wx2 = sx2 - sw * 0.32 + wi * sw * 0.32;
              ctx.fillStyle = 'rgba(145,228,255,' + (0.4 + 0.28 * Math.sin(bgT * 0.06 + r + wi)).toFixed(2) + ')';
              ctx.beginPath(); ctx.roundRect(wx2 - 5, shipCY - 4.5, 10, 8, 3); ctx.fill();
            }
          }
        });
      }
    }

    // Player position on screen
    const ppx = player.drawCol * CELL_W + CELL_W / 2;
    const ppy = rowTop(player.row, H) + ROW_H / 2;

    // Idle warning bar above player
    if (idleTimer > 300 && invTimer === 0) {
      const pct = idleTimer / IDLE_LIMIT;
      const barW = CELL_W * 0.84;
      ctx.fillStyle = 'rgba(255,' + Math.floor(210 - 160 * pct) + ',0,0.72)';
      ctx.fillRect(ppx - barW / 2, ppy - 36, barW * (1 - pct), 4);
      ctx.strokeStyle = 'rgba(255,160,0,.4)'; ctx.lineWidth = 1;
      ctx.strokeRect(ppx - barW / 2, ppy - 36, barW, 4);
      if (idleTimer > 480) {
        const sLeft = Math.ceil((IDLE_LIMIT - idleTimer) / 60);
        ctx.fillStyle = 'rgba(255,175,45,' + (0.78 + 0.22 * Math.sin(bgT * 0.26)).toFixed(2) + ')';
        ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'center';
        ctx.fillText('Bouge ! ' + sLeft + 's', W / 2, H * 0.9);
      }
    }

    // Particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life / 24; ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Player
    const visible = invTimer === 0 || Math.floor(bgT / 6) % 2 === 0;
    if (visible) {
      const pig = ctx.createRadialGradient(ppx, ppy, 4, ppx, ppy, 26);
      pig.addColorStop(0, 'rgba(100,215,255,.44)'); pig.addColorStop(1, 'rgba(60,165,255,0)');
      ctx.fillStyle = pig; ctx.beginPath(); ctx.arc(ppx, ppy, 26, 0, Math.PI * 2); ctx.fill();
      drawCosmonaut(ctx, ppx, ppy, 16, 0);
    }

    // HUD distance / record
    ctx.fillStyle = 'rgba(0,0,0,.52)';
    ctx.beginPath(); ctx.roundRect(W - 92, H - 130, 86, 50, 8); ctx.fill();
    ctx.fillStyle = '#88d8ff'; ctx.font = 'bold 13px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('Rang ' + maxRow, W - 49, H - 108);
    ctx.fillStyle = 'rgba(136,216,255,.5)'; ctx.font = '10px system-ui';
    ctx.fillText('record', W - 49, H - 96);
    ctx.fillStyle = '#aaeeff'; ctx.font = '10px system-ui';
    ctx.fillText('actuel ' + player.row, W - 49, H - 84);
  };
  loop();
}
window.gameStart = gameStart;

function _tryMove(dc, dr) {
  if (!GPS0_running()) return;
  const nc = player.col + dc, nr = player.row + dr;
  if (nc < 0 || nc >= COLS || nr < 0) return;
  player.col = nc; player.row = nr;
  idleTimer = 0;
  if (player.row > maxRow) maxRow = player.row;
  while (rows.length < player.row + 24) rows.push(_genRow(rows.length));
}

function _spawnFx(x, y, col, n) {
  for (let i = 0; i < n; i++) particles.push({
    x: x + (Math.random() - .5) * 8, y: y + (Math.random() - .5) * 8,
    vx: (Math.random() - .5) * 3.5, vy: -2 + Math.random() * 2, life: 24, col
  });
}

function _buildDpad() {
  const gc = document.getElementById('game-container');
  if (dpadEl && gc.contains(dpadEl)) gc.removeChild(dpadEl);
  dpadEl = document.createElement('div');
  dpadEl.style.cssText = 'position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:50;display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:3px';
  const acts = [[null,()=>_tryMove(0,1),null],[()=>_tryMove(-1,0),null,()=>_tryMove(1,0)],[null,()=>_tryMove(0,-1),null]];
  const lbls = [['',' \u2191',''],['\u2190','','\u2192'],['','\u2193','']];
  lbls.forEach((row, ri) => row.forEach((lbl, ci) => {
    const btn = document.createElement('div');
    if (!lbl.trim()) { btn.style.cssText = 'width:60px;height:60px'; dpadEl.appendChild(btn); return; }
    btn.textContent = lbl.trim();
    btn.style.cssText = 'width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(60,180,255,.14);border-radius:10px;border:1px solid rgba(60,180,255,.3);cursor:pointer;touch-action:none';
    const fn = acts[ri][ci];
    btn.addEventListener('pointerdown', e => { e.preventDefault(); fn && fn(); });
    dpadEl.appendChild(btn);
  }));
  gc.appendChild(dpadEl);
}
</script>
</body>
</html>
