<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000 url(../assets/backgrounds/bg-n8.svg) center/cover no-repeat;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#c0b8d0}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:52px;text-align:right}
#game-container{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}
canvas{display:block;width:100%;height:100%}
body{display:flex;flex-direction:column;height:100dvh}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:30</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
window.NIVEAU = 8;
window.GPS0_TIMER_SEC = 120;
window.GPS0_onTimerExpired = function () { endGame(true); };
window.TUTO_TEXT = "\ud83d\udef8 Monte vers le haut en évitant les vaisseaux aliens !<br><small>3 vies · 10s sans bouger = vie perdue · Arrive au sommet</small>";

const COLS = 9, ROW_H = 66, IDLE_LIMIT = 600, FLOOR_PCT = 0.82;

let CELL_W;
let player, rows, camOffY, idleTimer, invTimer, maxRow, frame, bgT, particles, dpadEl, rafId;
let swX = null, swY = null;
let traverseesReussies = 0, lastTapT = 0;

window.GPS0_computeDust = function(success) {
  var tempsJoue = GPS0_timerTotal() - GPS0_timerSec();
  var tempsMax  = GPS0_timerTotal() || 120;
  var scoreTps  = (tempsJoue / tempsMax) * 20;
  var scoreTrav = Math.min(traverseesReussies * 6, 20);
  var scoreVies = GPS0_lives() * 3;
  var bonusWin  = success ? 5 : 0;
  return scoreTps + scoreTrav + scoreVies + bonusWin;
};

function rowTop(r, H) {
  return H * FLOOR_PCT - (r + 1) * ROW_H + camOffY;
}

function _shipWidth(r, type) {
  const tw = [0.74, 0.60, 0.82, 0.42, 1.38];
  return Math.min((tw[type] || 0.74) + r * 0.010, 1.80);
}

function _rowSpeed(r, type) {
  const ts = [0.48, 0.90, 1.40, 2.60, 0.26];
  return Math.min((ts[type] || 0.56) + r * 0.015, 3.20);
}

function _isSafeRow(r) {
  return r === 0 || r % 5 === 0;
}

function _genRow(r) {
  if (_isSafeRow(r)) return { ships: [], safe: true, dir: 0, spd: 0, type: 0 };
  const dir = (r % 2 === 0) ? 1 : -1;
  const type = Math.floor(Math.random() * 5);
  const spd = _rowSpeed(r, type);
  const ships = [{ x: 0.2 + Math.random() * 0.6 }];
  return { ships, safe: false, dir, spd, type };
}

function gameReset() {
  cancelAnimationFrame(rafId);
  player = { col: Math.floor(COLS / 2), row: 0, drawCol: Math.floor(COLS / 2) };
  rows = [];
  for (let i = 0; i < 22; i++) rows.push(_genRow(i));
  camOffY = 0;
  idleTimer = 0; invTimer = 0; maxRow = 0;
  frame = 0; bgT = 0; particles = [];
  traverseesReussies = 0; lastTapT = 0;
}
window.gameReset = gameReset;

function gameStart() {
  const cv = document.getElementById('cv');
  GPS0_resizeCanvas(cv);
  if (!cv.width || !cv.height) {
    const hud = document.getElementById('hud');
    cv.width = window.innerWidth;
    cv.height = window.innerHeight - (hud ? hud.offsetHeight : 44);
  }
  CELL_W = cv.width / COLS;
  gameReset();

  cv.addEventListener('touchstart', e => {
    const t = e.touches[0]; swX = t.clientX; swY = t.clientY;
  }, { passive: true });
  cv.addEventListener('touchend', e => {
    if (swX === null) return;
    const dx = e.changedTouches[0].clientX - swX, dy = e.changedTouches[0].clientY - swY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 22) { swX = null; swY = null; return; }
    if (Math.abs(dx) > Math.abs(dy)) _tryMove(dx > 0 ? 1 : -1, 0);
    else _tryMove(0, dy < 0 ? 1 : -1);
    swX = null; swY = null;
  }, { passive: true });
  document.addEventListener('keydown', e => {
    const m = { ArrowLeft:[-1,0], ArrowRight:[1,0], ArrowUp:[0,1], ArrowDown:[0,-1] };
    if (m[e.key]) { e.preventDefault(); _tryMove(...m[e.key]); }
  });

  const ctx = cv.getContext('2d');
  let _lastTs8 = 0;
  const loop = (ts) => {
    rafId = requestAnimationFrame(loop);
    const _dt8 = _lastTs8 ? Math.min((ts - _lastTs8) / 16.667, 2.5) : 1;
    _lastTs8 = ts;
    if (!GPS0_running()) return;
    const W = cv.width, H = cv.height;
    frame++; bgT++;

    // Smooth col anim
    player.drawCol += (player.col - player.drawCol) * 0.22;

    // Camera smooth follow
    camOffY += (player.row * ROW_H - camOffY) * 0.13;

    // Idle timer
    if (invTimer === 0) idleTimer++;
    if (idleTimer >= IDLE_LIMIT) {
      idleTimer = 0; invTimer = 80;
      const px = player.drawCol * CELL_W + CELL_W / 2;
      const py = rowTop(player.row, H) + ROW_H / 2;
      _spawnFx(px, py, '#ffaa00', 10);
      loseLife();
    }
    if (invTimer > 0) invTimer--;

    // Ensure rows
    while (rows.length < player.row + 24) rows.push(_genRow(rows.length));

    // Update ships
    rows.forEach(row => {
      if (row.safe) return;
      row.ships.forEach(s => {
        s.x += row.dir * row.spd / CELL_W * _dt8;
        if (s.x > COLS + 1.2) s.x -= COLS;
        if (s.x < -1.2) s.x += COLS;
      });
    });

    // Collision
    if (invTimer === 0 && player.row < rows.length && !rows[player.row].safe) {
      const row = rows[player.row];
      const sw = _shipWidth(player.row, row.type);
      const pL = player.col + 0.14, pR = player.col + 0.86;
      let hit = false;
      for (const s of row.ships) {
        if (hit) break;
        for (const ox of [0, COLS, -COLS]) {
          const sL = s.x + ox - sw / 2, sR = s.x + ox + sw / 2;
          if (sR > pL && sL < pR) {
            hit = true;
            invTimer = 80;
            idleTimer = 0;
            player.row = Math.max(0, player.row - 1);
            const hpx = player.drawCol * CELL_W + CELL_W / 2;
            const hpy = rowTop(player.row, H) + ROW_H / 2;
            _spawnFx(hpx, hpy, '#80ccff', 14);
            loseLife();
            navigator.vibrate && navigator.vibrate([20, 8, 45]);
            break;
          }
        }
      }
    }

    // Particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.life--; });

    // ====== DRAW ======
    ctx.clearRect(0, 0, W, H);

    // Station spatiale BG
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#09090f'); bg.addColorStop(1, '#14141e');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Panneaux metal BG hint
    ctx.fillStyle = 'rgba(100,90,130,.04)';
    ctx.beginPath(); ctx.ellipse(W * .35, H * .32, W * .52, H * .38, -.28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(150,130,100,.03)';
    ctx.beginPath(); ctx.ellipse(W * .74, H * .62, W * .4, H * .3, .35, 0, Math.PI * 2); ctx.fill();

    // Etoiles lointaines
    for (let i = 0; i < 30; i++) {
      const sx = (i * 137 + 11) % W, sy = (i * 79 + 9) % H;
      ctx.globalAlpha = 0.10 + 0.10 * Math.sin(bgT * 0.022 + i * 0.72);
      ctx.fillStyle = '#d0cce0';
      ctx.beginPath(); ctx.arc(sx, sy, 0.5 + (i % 3) * 0.32, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw rows
    const rMin = Math.max(0, player.row - 4);
    const rMax = Math.min(rows.length - 1, player.row + 15);
    for (let r = rMin; r <= rMax; r++) {
      const row = rows[r];
      const ty = rowTop(r, H);
      if (ty > H + ROW_H || ty < -ROW_H * 2) continue;

      if (row.safe) {
        // Safe row: corridor metal station
        ctx.fillStyle = 'rgba(32,30,42,.82)';
        ctx.fillRect(0, ty, W, ROW_H);
        // Grid metal
        ctx.strokeStyle = 'rgba(160,150,180,.16)'; ctx.lineWidth = 0.5;
        for (let c = 0; c < COLS; c++) {
          ctx.strokeRect(c * CELL_W + 0.5, ty + 0.5, CELL_W - 1, ROW_H - 1);
        }
        // Rivets decor
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#b0a8c0';
        for (let c = 0; c < COLS; c++) {
          const cx = c * CELL_W + CELL_W / 2, cy = ty + ROW_H / 2;
          ctx.beginPath(); ctx.arc(cx - CELL_W * 0.36, cy, 2.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(cx + CELL_W * 0.36, cy, 2.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      } else {
        // Obstacle row: couloir danger rails orange
        ctx.fillStyle = 'rgba(10,8,12,.92)';
        ctx.fillRect(0, ty, W, ROW_H);
        // Rail glow top
        const rgt = ctx.createLinearGradient(0, ty, 0, ty + 10);
        rgt.addColorStop(0, 'rgba(230,120,40,.72)'); rgt.addColorStop(1, 'rgba(230,120,40,0)');
        ctx.fillStyle = rgt; ctx.fillRect(0, ty, W, 10);
        // Rail glow bottom
        const rgb = ctx.createLinearGradient(0, ty + ROW_H - 10, 0, ty + ROW_H);
        rgb.addColorStop(0, 'rgba(230,120,40,0)'); rgb.addColorStop(1, 'rgba(230,120,40,.72)');
        ctx.fillStyle = rgb; ctx.fillRect(0, ty + ROW_H - 10, W, 10);
        // Rail lines danger
        ctx.strokeStyle = 'rgba(255,160,60,.48)'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(0, ty + 3.5); ctx.lineTo(W, ty + 3.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, ty + ROW_H - 3.5); ctx.lineTo(W, ty + ROW_H - 3.5); ctx.stroke();

        // Ships (5 types : UFO, pointu, croiseur, moto, cargo)
        const shipType = row.type || 0;
        const hues = [115, 280, 0, 120, 0]; // UFO vert, pointu violet, croiseur rouge, moto vert, cargo gris
        const hue = hues[shipType];
        const sw = _shipWidth(r, shipType) * CELL_W;
        const sh = ROW_H * 0.56;
        const shipCY = ty + ROW_H / 2;
        row.ships.forEach(s => {
          for (const ox of [0, COLS, -COLS]) {
            const sx2 = (s.x + ox) * CELL_W;
            if (sx2 + sw / 2 < -12 || sx2 - sw / 2 > W + 12) continue;
            const pulse = 0.62 + 0.38 * Math.sin(bgT * 0.08 + r * 0.7);
            // Halo lueur moteur
            const sg = ctx.createRadialGradient(sx2, shipCY, 3, sx2, shipCY, sw * 0.82);
            sg.addColorStop(0, `hsla(${hue},100%,55%,${(0.22*pulse).toFixed(2)})`);
            sg.addColorStop(1, `hsla(${hue},100%,45%,0)`);
            ctx.fillStyle = sg;
            ctx.beginPath(); ctx.ellipse(sx2, shipCY, sw * 0.82, sh * 0.88, 0, 0, Math.PI * 2); ctx.fill();

            if (shipType === 0) {
              // UFO disc vert alien
              const gr = ctx.createLinearGradient(sx2 - sw/2, shipCY - sh*.35, sx2, shipCY - sh*.7);
              gr.addColorStop(0, `hsl(${hue},70%,28%)`);
              gr.addColorStop(1, `hsl(${hue},80%,42%)`);
              ctx.fillStyle = gr;
              ctx.beginPath(); ctx.ellipse(sx2, shipCY, sw/2, sh*.35, 0, 0, Math.PI*2); ctx.fill();
              // Dôme supérieur
              const dg = ctx.createRadialGradient(sx2-sw*.1, shipCY-sh*.32, 1, sx2, shipCY-sh*.28, sw*.22);
              dg.addColorStop(0, `rgba(180,255,180,.90)`);
              dg.addColorStop(0.5, `hsl(${hue},90%,50%)`);
              dg.addColorStop(1, `hsl(${hue},80%,22%)`);
              ctx.fillStyle = dg;
              ctx.beginPath(); ctx.ellipse(sx2, shipCY-sh*.24, sw*.22, sh*.38, 0, 0, Math.PI*2); ctx.fill();
              // Lumières orbite
              for (let li = 0; li < 4; li++) {
                const la = (li/4)*Math.PI*2 + bgT*0.10;
                const lx2 = sx2 + Math.cos(la)*sw*.38;
                const ly2 = shipCY + Math.sin(la)*sh*.18;
                ctx.fillStyle = `hsl(${hue+60},100%,80%)`;
                ctx.beginPath(); ctx.arc(lx2, ly2, 2.2, 0, Math.PI*2); ctx.fill();
              }
            } else if (shipType === 1) {
              // Vaisseau pointu violet
              const wg = ctx.createLinearGradient(sx2 - sw/2, shipCY, sx2 + sw/2, shipCY);
              wg.addColorStop(0, `hsl(${hue},85%,15%)`);
              wg.addColorStop(0.4, `hsl(${hue},90%,42%)`);
              wg.addColorStop(1, `hsl(${hue},85%,18%)`);
              ctx.fillStyle = wg;
              ctx.beginPath();
              ctx.moveTo(sx2 - sw/2, shipCY + sh*.22);
              ctx.lineTo(sx2 - sw/2 + sw*.18, shipCY - sh*.28);
              ctx.lineTo(sx2, shipCY - sh*.5);
              ctx.lineTo(sx2 + sw/2 - sw*.18, shipCY - sh*.28);
              ctx.lineTo(sx2 + sw/2, shipCY + sh*.22);
              ctx.closePath(); ctx.fill();
              // Néon violet contour
              ctx.strokeStyle = `hsla(${hue},100%,70%,${(0.55*pulse).toFixed(2)})`;
              ctx.lineWidth = 1.5; ctx.stroke();
              // Hublot central
              const eg = ctx.createRadialGradient(sx2, shipCY - sh*.08, 2, sx2, shipCY - sh*.08, sw*.14);
              eg.addColorStop(0, `hsl(${hue+40},100%,85%)`);
              eg.addColorStop(0.5, `hsl(${hue},100%,55%)`);
              eg.addColorStop(1, `hsl(${hue},90%,22%)`);
              ctx.fillStyle = eg;
              ctx.beginPath(); ctx.ellipse(sx2, shipCY - sh*.08, sw*.14, sh*.22, 0, 0, Math.PI*2); ctx.fill();
              // Moteurs
              for (const mx2 of [sx2 - sw*.30, sx2 + sw*.30]) {
                const fg = ctx.createLinearGradient(mx2, shipCY+sh*.22, mx2, shipCY+sh*.22+sh*.38*pulse);
                fg.addColorStop(0, `hsla(${hue+30},100%,75%,.90)`);
                fg.addColorStop(1, `hsla(${hue+60},100%,60%,0)`);
                ctx.fillStyle = fg;
                ctx.beginPath(); ctx.ellipse(mx2, shipCY+sh*.22, sw*.055, sh*.38*pulse, 0, 0, Math.PI*2); ctx.fill();
              }
            } else {
              // Croiseur rouge
              const wg2 = ctx.createLinearGradient(sx2-sw/2, shipCY-sh*.38, sx2-sw/2, shipCY+sh*.38);
              wg2.addColorStop(0, `hsl(${hue},85%,32%)`);
              wg2.addColorStop(0.28, `hsl(${hue},90%,18%)`);
              wg2.addColorStop(0.72, `hsl(${hue},90%,14%)`);
              wg2.addColorStop(1, `hsl(${hue},80%,28%)`);
              ctx.fillStyle = wg2;
              ctx.beginPath(); ctx.roundRect(sx2-sw/2, shipCY-sh*.38, sw, sh*.76, 5); ctx.fill();
              // Ailes latérales
              ctx.fillStyle = `hsl(${hue},80%,22%)`;
              ctx.beginPath();
              ctx.moveTo(sx2-sw/2, shipCY-sh*.10);
              ctx.lineTo(sx2-sw/2-sw*.20, shipCY+sh*.28);
              ctx.lineTo(sx2-sw/2, shipCY+sh*.38);
              ctx.closePath(); ctx.fill();
              ctx.beginPath();
              ctx.moveTo(sx2+sw/2, shipCY-sh*.10);
              ctx.lineTo(sx2+sw/2+sw*.20, shipCY+sh*.28);
              ctx.lineTo(sx2+sw/2, shipCY+sh*.38);
              ctx.closePath(); ctx.fill();
              // Néon rouge ligne
              ctx.strokeStyle = `hsla(${hue},100%,64%,${(0.72*pulse).toFixed(2)})`;
              ctx.lineWidth = 2.2;
              ctx.beginPath(); ctx.moveTo(sx2-sw*.38, shipCY-sh*.28); ctx.lineTo(sx2+sw*.38, shipCY-sh*.28); ctx.stroke();
              // Hublots rouges
              for (let wi = 0; wi < 3; wi++) {
                const wx2 = sx2 - sw*.28 + wi*sw*.28;
                ctx.fillStyle = `hsla(${hue},100%,65%,${(0.45+0.30*Math.sin(bgT*0.09+r+wi)).toFixed(2)})`;
                ctx.beginPath(); ctx.arc(wx2, shipCY-sh*.05, 4.5, 0, Math.PI*2); ctx.fill();
              }
              // Jet moteur
              const fg2 = ctx.createLinearGradient(sx2, shipCY+sh*.38, sx2, shipCY+sh*.38+sh*.44*pulse);
              fg2.addColorStop(0, `hsla(${hue+30},100%,70%,.88)`);
              fg2.addColorStop(1, `hsla(${hue+60},100%,55%,0)`);
              ctx.fillStyle = fg2;
              ctx.beginPath(); ctx.ellipse(sx2, shipCY+sh*.38, sw*.10, sh*.44*pulse, 0, 0, Math.PI*2); ctx.fill();
            } else if (shipType === 3) {
              // Moto spatiale verte (rapide, étroite)
              ctx.fillStyle = `hsl(${hue},80%,28%)`;
              ctx.beginPath(); ctx.ellipse(sx2, shipCY, sw/2, sh*.20, 0, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = `hsl(${hue},100%,55%)`;
              ctx.beginPath(); ctx.ellipse(sx2 + row.dir*sw*.28, shipCY-sh*.05, sw*.12, sh*.17, 0.3, 0, Math.PI*2); ctx.fill();
              ctx.strokeStyle = `hsla(${hue},100%,65%,${(0.75*pulse).toFixed(2)})`;
              ctx.lineWidth = 1.8;
              ctx.beginPath(); ctx.moveTo(sx2-sw*.36, shipCY); ctx.lineTo(sx2+sw*.36, shipCY); ctx.stroke();
              const mf3 = ctx.createLinearGradient(sx2-row.dir*sw*.5, shipCY, sx2-row.dir*sw*.88, shipCY);
              mf3.addColorStop(0, `hsla(${hue+30},100%,75%,.88)`);
              mf3.addColorStop(1, `hsla(${hue},100%,60%,0)`);
              ctx.fillStyle = mf3;
              ctx.beginPath(); ctx.ellipse(sx2-row.dir*sw*.52, shipCY, sw*.27*pulse, sh*.10, 0, 0, Math.PI*2); ctx.fill();
            } else {
              // Cargo spatial gris (lent, très large)
              const wg4 = ctx.createLinearGradient(sx2-sw/2, shipCY-sh*.42, sx2, shipCY+sh*.42);
              wg4.addColorStop(0, `hsl(${hue},14%,38%)`);
              wg4.addColorStop(0.5, `hsl(${hue},10%,22%)`);
              wg4.addColorStop(1, `hsl(${hue},14%,32%)`);
              ctx.fillStyle = wg4;
              ctx.beginPath(); ctx.roundRect(sx2-sw/2, shipCY-sh*.40, sw, sh*.80, 4); ctx.fill();
              ctx.strokeStyle = `rgba(200,200,220,0.20)`; ctx.lineWidth = 0.7;
              for (let gi=1; gi<4; gi++) {
                ctx.beginPath();
                ctx.moveTo(sx2-sw/2+sw*gi/4, shipCY-sh*.40);
                ctx.lineTo(sx2-sw/2+sw*gi/4, shipCY+sh*.40);
                ctx.stroke();
              }
              for (let li=0; li<3; li++) {
                const lx4 = sx2-sw*.26+li*sw*.26;
                ctx.fillStyle = `hsla(200,50%,65%,${(0.30+0.15*Math.sin(bgT*.04+li)).toFixed(2)})`;
                ctx.beginPath(); ctx.arc(lx4, shipCY-sh*.20, 3.5, 0, Math.PI*2); ctx.fill();
              }
              for (const mx4 of [sx2-sw*.36, sx2+sw*.36]) {
                const fg4 = ctx.createLinearGradient(mx4, shipCY+sh*.40, mx4, shipCY+sh*.68*pulse);
                fg4.addColorStop(0, `hsla(200,50%,60%,.55)`);
                fg4.addColorStop(1, `hsla(200,50%,50%,0)`);
                ctx.fillStyle = fg4;
                ctx.beginPath(); ctx.ellipse(mx4, shipCY+sh*.40, sw*.07, sh*.26*pulse, 0, 0, Math.PI*2); ctx.fill();
              }
            }
          }
        });
      }
    }

    // Player position on screen
    const ppx = player.drawCol * CELL_W + CELL_W / 2;
    const ppy = rowTop(player.row, H) + ROW_H / 2;

    // Idle warning bar above player
    if (idleTimer > 300 && invTimer === 0) {
      const pct = idleTimer / IDLE_LIMIT;
      const barW = CELL_W * 0.84;
      ctx.fillStyle = 'rgba(255,' + Math.floor(210 - 160 * pct) + ',0,0.72)';
      ctx.fillRect(ppx - barW / 2, ppy - 36, barW * (1 - pct), 4);
      ctx.strokeStyle = 'rgba(255,160,0,.4)'; ctx.lineWidth = 1;
      ctx.strokeRect(ppx - barW / 2, ppy - 36, barW, 4);
      if (idleTimer > 480) {
        const sLeft = Math.ceil((IDLE_LIMIT - idleTimer) / 60);
        ctx.fillStyle = 'rgba(255,175,45,' + (0.78 + 0.22 * Math.sin(bgT * 0.26)).toFixed(2) + ')';
        ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'center';
        ctx.fillText('Bouge ! ' + sLeft + 's', W / 2, H * 0.9);
      }
    }

    // Particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life / 24; ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Player
    const visible = invTimer === 0 || Math.floor(bgT / 6) % 2 === 0;
    if (visible) {
      const pig = ctx.createRadialGradient(ppx, ppy, 4, ppx, ppy, 26);
      pig.addColorStop(0, 'rgba(200,180,255,.44)'); pig.addColorStop(1, 'rgba(140,120,200,0)');
      ctx.fillStyle = pig; ctx.beginPath(); ctx.arc(ppx, ppy, 26, 0, Math.PI * 2); ctx.fill();
      drawCosmonaut(ctx, ppx, ppy, 16, 0);
    }

    // HUD distance / record
    ctx.fillStyle = 'rgba(0,0,0,.52)';
    ctx.beginPath(); ctx.roundRect(W - 92, H - 130, 86, 50, 8); ctx.fill();
    ctx.fillStyle = '#c8c0d8'; ctx.font = 'bold 13px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('Rang ' + maxRow, W - 49, H - 108);
    ctx.fillStyle = 'rgba(180,170,200,.5)'; ctx.font = '10px system-ui';
    ctx.fillText('record', W - 49, H - 96);
    ctx.fillStyle = '#d0c8e0'; ctx.font = '10px system-ui';
    ctx.fillText('actuel ' + player.row, W - 49, H - 84);
  };
  _lastTs8 = performance.now();
  loop(_lastTs8);
}
window.gameStart = gameStart;

function _tryMove(dc, dr) {
  if (!GPS0_running()) return;
  const nc = player.col + dc, nr = player.row + dr;
  if (nc < 0 || nc >= COLS || nr < 0) return;
  player.col = nc; player.row = nr;
  idleTimer = 0;
  if (dr > 0) {
    traverseesReussies++;
    // Anti-spam: deux montées < 400ms → prochain couloir = chasseur (type 2)
    const now = Date.now();
    if (now - lastTapT < 400) {
      const nextR = player.row + 1;
      while (rows.length <= nextR + 1) rows.push(_genRow(rows.length));
      if (rows[nextR] && !rows[nextR].safe) rows[nextR].type = 2;
    }
    lastTapT = now;
  }
  if (player.row > maxRow) maxRow = player.row;
  while (rows.length < player.row + 24) rows.push(_genRow(rows.length));
}

function _spawnFx(x, y, col, n) {
  for (let i = 0; i < n; i++) particles.push({
    x: x + (Math.random() - .5) * 8, y: y + (Math.random() - .5) * 8,
    vx: (Math.random() - .5) * 3.5, vy: -2 + Math.random() * 2, life: 24, col
  });
}

// D-pad supprime (swipe + clavier uniquement)
