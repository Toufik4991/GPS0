<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"><title>GPS0 - Lune de Cendre</title><style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none}
body{background:#1a0800;overflow:hidden;width:100vw;height:100vh;font-family:system-ui,sans-serif}
canvas{position:fixed;inset:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(26,8,0,.92);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:10;border-bottom:1px solid rgba(255,120,0,.25)}
#hud>*{color:#FF8C00;font-weight:bold;font-size:.92rem}
#btn-q{background:none;border:1px solid rgba(255,120,0,.3);border-radius:8px;color:rgba(255,140,0,.6);padding:4px 10px;font-size:.76rem;cursor:pointer;font-weight:normal}
#grav-bar-wrap{position:fixed;bottom:0;left:0;right:0;height:6px;background:rgba(0,0,0,.4)}
#grav-bar{height:100%;background:linear-gradient(90deg,#FF3300,#FF8C00);transition:width .1s}
#overlay,#results{position:fixed;inset:0;background:rgba(26,8,0,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;padding:24px;text-align:center}
#results{display:none;z-index:30}
h2{color:#FF8C00;font-size:1.35rem}p{color:rgba(255,220,180,.85);font-size:.88rem;max-width:280px;line-height:1.5}
.ti{display:flex;align-items:center;gap:8px;font-size:.82rem;color:rgba(255,180,100,.65)}
.btn-go{background:linear-gradient(135deg,#FF8C00,#cc4400);border:none;border-radius:14px;color:#fff;font-weight:bold;font-size:1rem;padding:13px 30px;cursor:pointer;margin-top:6px}
</style></head><body>
<canvas id="c"></canvas>
<div id="hud"><span id="htimer">3:00</span><span>🔥 Lune de Cendre</span><button id="btn-q">Quitter</button></div>
<div id="grav-bar-wrap"><div id="grav-bar" style="width:100%"></div></div>
<div id="overlay">
  <h2>🔥 Lune de Cendre</h2>
  <p>La lave brûle tout en bas ! Inverse la gravité pour survivre !</p>
  <div class="ti">👆 <span>TAP = inverser la gravité (max 5 secondes)</span></div>
  <div class="ti">🪨 <span>Évite la lave et le plafond</span></div>
  <div class="ti">⭐ <span>Plateforme secrète quelque part...</span></div>
  <button class="btn-go" id="btn-start">Commencer !</button>
</div>
<div id="results"></div>
<script>
'use strict';
const C=document.getElementById('c'),X=C.getContext('2d');
let W=window.innerWidth,H=window.innerHeight;C.width=W;C.height=H;
const sd=localStorage.getItem('gps0_avatar_selfie_base64');
const selfieImg=new Image();if(sd)selfieImg.src=sd;
const TOTAL=180,GRAV_MAX=5;
let started=false,done=false,poussieres=0,raf=null;
let elapsed=0,startTs=0;
let lives=3,touchedLava=false,secretPlatFound=false;
// Physics
const G=0.45,VX=3.2;
let px=80,py=0,vy=0,gravDir=1,gravT=0,gravFlipped=false;
let camX=0;
// Platforms (world coords, progressing to right)
function genPlatforms(){
  const plats=[];
  let x=300;
  while(x<8000){
    const thick=18+Math.random()*12,len=80+Math.random()*120;
    const ypos=H*0.28+Math.random()*H*0.44;
    plats.push({x,y:ypos,w:len,h:thick});
    x+=len+90+Math.random()*80;
  }
  // Secret platform near x=1200
  plats.push({x:1200,y:H*0.15,w:60,h:14,secret:true});
  return plats;
}
let platforms=genPlatforms();
let onGround=false;
const GROUND_Y=H-50,CEIL_Y=50;

function resetPlayer(){
  px=80;py=GROUND_Y-40;vy=0;gravDir=1;gravFlipped=false;gravT=0;camX=0;onGround=false;
}

function draw(){
  X.clearRect(0,0,W,H);
  const ox=camX;
  // Sky
  const sg=X.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#1a0800');sg.addColorStop(0.7,'#2a0a00');sg.addColorStop(1,'#cc2200');
  X.fillStyle=sg;X.fillRect(0,0,W,H);
  // Lava floor
  const now=Date.now()/600;
  const lg=X.createLinearGradient(0,GROUND_Y,0,H);
  lg.addColorStop(0,'#FF3300');lg.addColorStop(1,'#FF6600');
  X.fillStyle=lg;X.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  for(let i=0;i<12;i++){
    const bx=(i*90-ox*0.3+now*30)%(W+90)-45;
    X.fillStyle='rgba(255,200,0,0.4)';
    X.beginPath();X.ellipse(bx,GROUND_Y-4,18+Math.sin(now+i)*6,5,0,0,Math.PI*2);X.fill();
  }
  // Platforms
  platforms.forEach(pl=>{
    if(pl.x-ox>W+60||pl.x-ox<-pl.w-60)return;
    if(pl.secret){
      X.fillStyle=secretPlatFound?'rgba(255,220,100,.6)':'rgba(200,162,200,.06)';
    }else{
      X.fillStyle='#4a2010';
    }
    X.fillRect(pl.x-ox,pl.y,pl.w,pl.h);
    if(!pl.secret){X.fillStyle='rgba(255,80,0,.3)';X.fillRect(pl.x-ox,pl.y,pl.w,4);}
  });
  // Meteors
  const mt=Math.floor(elapsed*0.5);
  for(let i=0;i<3;i++){
    const mx=((i*333+mt*80)%(W+200))-100;
    const myt=((i*173+mt*60)%(H*0.6))+H*0.1;
    X.fillStyle='rgba(255,140,0,.35)';X.beginPath();X.arc(mx,myt,10+i*4,0,Math.PI*2);X.fill();
  }
  // Cosmonaute
  const cpx=120,cpy=py;
  X.fillStyle='#888';X.beginPath();X.ellipse(cpx,cpy+16,13,10,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(200,162,200,.3)';X.beginPath();X.arc(cpx,cpy,16,0,Math.PI*2);X.fill();
  if(sd&&selfieImg.complete){X.save();X.beginPath();X.arc(cpx,cpy,14,0,Math.PI*2);X.clip();X.drawImage(selfieImg,cpx-14,cpy-14,28,28);X.restore();}
  else{X.font='18px serif';X.textAlign='center';X.textBaseline='middle';X.fillText('🧑‍🚀',cpx,cpy);}
  // Gravity indicator
  X.fillStyle='rgba(255,200,100,.7)';X.font='20px serif';X.textAlign='center';X.textBaseline='middle';
  X.fillText(gravDir<0?'⬆':'⬇',W-40,H/2);
  // Gravity timer bar
  if(gravFlipped){
    const pct=1-gravT/GRAV_MAX;
    document.getElementById('grav-bar').style.width=(pct*100)+'%';
  }else{
    document.getElementById('grav-bar').style.width='100%';
  }
  // Lives
  X.font='18px serif';X.textAlign='left';
  for(let i=0;i<lives;i++)X.fillText('❤️',10+i*28,H*0.5);
}

let lastTs=0;
function tick(ts){
  if(!started||done)return;
  if(!startTs)startTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
  elapsed=(ts-startTs)/1000;
  const rem=Math.max(0,TOTAL-elapsed);
  document.getElementById('htimer').textContent=mm(rem);
  if(rem<=0){done=true;_end(true);return;}
  // Physics
  if(gravFlipped){
    gravT+=dt;
    if(gravT>=GRAV_MAX){gravDir=1;gravFlipped=false;gravT=0;}
  }
  vy+=G*gravDir;
  py+=vy;
  px+=VX;
  camX=Math.max(0,px-80);
  // Platform collisions
  onGround=false;
  platforms.forEach(pl=>{
    const cpx=120,cpRadius=14;
    const worldCpx=cpx+camX;
    if(worldCpx+cpRadius>pl.x&&worldCpx-cpRadius<pl.x+pl.w){
      if(gravDir===1&&py+22>pl.y&&py+22<pl.y+pl.h+vy+1&&vy>=0){
        py=pl.y-22;vy=0;onGround=true;if(pl.secret){secretPlatFound=true;}
      }else if(gravDir===-1&&py-16<pl.y+pl.h&&py-16>pl.y-pl.h*.5&&vy<=0){
        py=pl.y+pl.h+16;vy=0;
      }
    }
  });
  if(gravDir===1&&py+22>=GROUND_Y){
    py=GROUND_Y-22;vy=0;onGround=true;
    if(!touchedLava){touchedLava=true;}
    lives=Math.max(0,lives-0.02);
    if(lives<=0){done=true;_end(true);}
  }
  if(gravDir===-1&&py-16<=CEIL_Y){
    py=CEIL_Y+16;vy=0;lives=Math.max(0,lives-0.02);
    if(lives<=0){done=true;_end(true);}
  }
  if(py-16<=CEIL_Y&&gravDir===1){py=CEIL_Y+16;vy=0;}
  draw();
  raf=requestAnimationFrame(tick);
}

function mm(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');}

function _end(ok){
  done=true;cancelAnimationFrame(raf);
  const noLava=!touchedLava,r=document.getElementById('results');
  r.style.display='flex';
  if(ok||elapsed>0){
    if(noLava&&secretPlatFound)poussieres=50;
    else if(noLava)poussieres=25;
    else poussieres=5;
    r.innerHTML=`<h2 style="color:#FF8C00">🔥 Survécu !</h2><p>${noLava?'✨ Sans toucher la lave !':''} ${secretPlatFound?'🌟 Plateforme secrète !':''}</p><p style="color:#FF8C00;font-size:1.2rem">+${poussieres} ✨ poussières</p>`;
  }
  setTimeout(()=>window.parent.postMessage({source:'gps0_minijeu',success:true,niveau:2,poussieres},'*'),2200);
}

C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!started)return;
  if(!gravFlipped){gravDir*=-1;gravFlipped=true;gravT=0;vy=0;}
  else if(gravT>1){gravDir*=-1;gravFlipped=true;gravT=0;vy=0;}
},{passive:false});

document.getElementById('btn-start').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  resetPlayer();started=true;lastTs=performance.now();raf=requestAnimationFrame(tick);
});
document.getElementById('btn-q').addEventListener('click',()=>{
  done=true;cancelAnimationFrame(raf);
  window.parent.postMessage({source:'gps0_minijeu',success:false,niveau:2,poussieres:0},'*');
});
draw();
</script></body></html>
