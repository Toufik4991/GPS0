<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#060310;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#CC88FF}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:72px;text-align:right}
#game-container{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}
canvas{display:block;width:100%;height:100%}
body{display:flex;flex-direction:column;height:100dvh}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">5:00</span>
  <span id="score-hud">Round 1/15</span>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
window.NIVEAU = 4;
window.TUTO_TEXT = "Mémorise la séquence de cristaux · Reproduis dans l'ordre 🔮<br><small>3 vies · 1 erreur/round tolérée (⛨ bouclier) · Atteins le Round 15 !</small>";
window.GPS0_TIMER_SEC = 300;

// ── COULEURS CRISTAUX (9 uniques) ───────────────────────────────────────────────────────────────────────
const CC = [
  {l:"#FF66AA",d:"#5a1e3a",g:"rgba(255,102,170,0.62)"},
  {l:"#66FFDD",d:"#0e4e42",g:"rgba(102,255,221,0.62)"},
  {l:"#CC88FF",d:"#3e1e68",g:"rgba(204,136,255,0.62)"},
  {l:"#FFD040",d:"#6a5000",g:"rgba(255,208,64,0.62)"},
  {l:"#FF7733",d:"#6a2800",g:"rgba(255,119,51,0.62)"},
  {l:"#44CCFF",d:"#0e3a5a",g:"rgba(68,204,255,0.62)"},
  {l:"#88FF44",d:"#284e10",g:"rgba(136,255,68,0.62)"},
  {l:"#FF5555",d:"#6a0000",g:"rgba(255,85,85,0.62)"},
  {l:"#5588FF",d:"#0e1e6a",g:"rgba(85,136,255,0.62)"},
];

// ── CONSTANTES ────────────────────────────────────────────────────────────────────────────────────
const SHOW_MS_START = 520; // ms par cristal au round 1
const SHOW_MS_MIN   = 240; // plancher
const SHOW_DARK_MS  = 110; // pause noire entre cristaux
const SHOW_ACCEL    = 0.87; // accélération par round
const SEQ_START_LEN = 2;    // longueur séquence au round 1

// ── ÉTAT ───────────────────────────────────────────────────────────────────────────────────────
// phase : "showing_lit" | "showing_dark" | "input" |
//         "flash_ok" | "flash_err" | "round_clear" | "done"
let round, sequence, inputIdx, shieldUsed, totalDust;
let phase, showIdx, showTimer, showMs;
let flashIdx, flashTimer, flashMs;
let crystalRects, bgParts;
let lastTs, rafId, bgT;
let cosmoAnim;

function gameReset() {
  cancelAnimationFrame(rafId);
  round = 1; sequence = []; inputIdx = 0; shieldUsed = false; totalDust = 0;
  window.GPS0_rewardOverride = 0;
  phase = "showing_lit";
  showIdx = 0; showTimer = 0; showMs = SHOW_MS_START;
  flashIdx = -1; flashTimer = 0; flashMs = 0;
  crystalRects = null; bgParts = []; lastTs = 0; bgT = 0; cosmoAnim = null;
}
window.gameReset = gameReset;

function gameStart() {
  const cv = document.getElementById("cv");
  GPS0_resizeCanvas(cv);
  gameReset();
  const W = cv.width, H = cv.height;
  _buildRects(W, H);
  _initBg(W, H);
  _startRound();
  _updateHUD();
  window.onResize = () => { if (cv && crystalRects) _buildRects(cv.width, cv.height); };
  cv.addEventListener("pointerdown", _onTap);
  const ctx = cv.getContext("2d");
  const loop = ts => {
    rafId = requestAnimationFrame(loop);
    if (!GPS0_running()) return;
    const dt = Math.min(ts - (lastTs || ts), 60);
    lastTs = ts; bgT++;
    _update(dt, cv.width, cv.height); // pass W/H to bgParts
    ctx.clearRect(0, 0, cv.width, cv.height);
    _drawBg(ctx, cv.width, cv.height);
    _drawCrystals(ctx, cv.width, cv.height);
    _drawLabels(ctx, cv.width, cv.height);
    if (cosmoAnim && cosmoAnim.timer < 550) {
      const bounce = Math.abs(Math.sin(cosmoAnim.timer * 0.016)) * 14 * (1 - cosmoAnim.timer / 550);
      const alpha = 1 - cosmoAnim.timer / 550;
      ctx.globalAlpha = alpha;
      drawCosmonaut(ctx, cosmoAnim.x, cosmoAnim.y - bounce, 14, 0, 'jump');
      ctx.globalAlpha = 1;
    }
  };
  loop(0);
}
window.gameStart = gameStart;

// ── LOGIQUE ─────────────────────────────────────────────────────────────────────────────────────────
function _startRound() {
  // Ajoute SEQ_START_LEN cristaux pour round 1, +1 pour chaque round suivant
  if (sequence.length === 0) {
    for (let i = 0; i < SEQ_START_LEN; i++) sequence.push(Math.floor(Math.random() * 9));
  } else {
    sequence.push(Math.floor(Math.random() * 9));
  }
  inputIdx = 0; shieldUsed = false;
  showIdx = 0;
  showMs = Math.max(SHOW_MS_MIN, SHOW_MS_START * Math.pow(SHOW_ACCEL, round - 1));
  showTimer = 0;
  phase = "showing_lit";
}

function _replaySequence() {
  showIdx = 0;
  showMs = Math.max(SHOW_MS_MIN, SHOW_MS_START * Math.pow(SHOW_ACCEL, round - 1));
  showTimer = 0; inputIdx = 0;
  phase = "showing_lit";
}

function _updateHUD() {
  const el = document.getElementById("score-hud");
  if (el) el.textContent = "Round " + round + "/15";
}

function _update(dt, W, H) {
  // Cosmonaut anim
  if (cosmoAnim) {
    cosmoAnim.timer += dt;
    if (cosmoAnim.timer > 550) cosmoAnim = null;
  }
  // Particules de fond
  bgParts.forEach(p => { p.y += p.vy; if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; } });

  if (phase === "showing_lit") {
    showTimer += dt;
    if (showTimer >= showMs) { showTimer = 0; phase = "showing_dark"; }
  } else if (phase === "showing_dark") {
    showTimer += dt;
    if (showTimer >= SHOW_DARK_MS) {
      showTimer = 0; showIdx++;
      phase = showIdx < sequence.length ? "showing_lit" : "input";
    }
  } else if (phase === "flash_ok") {
    flashTimer += dt;
    if (flashTimer >= flashMs) {
      flashIdx = -1; inputIdx++;
      if (inputIdx >= sequence.length) {
        // Gain progressif : rounds 1-5=1, 6-10=2, 11-15=7 poussières
        const gain = round <= 5 ? 1 : round <= 10 ? 2 : 7;
        totalDust += gain;
        window.GPS0_rewardOverride = totalDust;
        addDust(gain);
        if (round >= 15) { phase = "done"; endGame(true); }
        else { phase = "round_clear"; flashTimer = 0; flashMs = 750; }
      } else { phase = "input"; }
    }
  } else if (phase === "flash_err") {
    flashTimer += dt;
    if (flashTimer >= flashMs) { flashIdx = -1; _replaySequence(); }
  } else if (phase === "round_clear") {
    flashTimer += dt;
    if (flashTimer >= flashMs) { round++; _updateHUD(); _startRound(); }
  }
}

function _onTap(e) {
  e.preventDefault();
  if (phase !== "input" || !GPS0_running()) return;
  const cv = e.target;
  const rect = cv.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (cv.width  / rect.width);
  const cy = (e.clientY - rect.top)  * (cv.height / rect.height);
  let hit = -1;
  for (let i = 0; i < 9; i++) {
    const r = crystalRects[i];
    // Test diamond (Manhattan distance dans espace cristal)
    if (Math.abs(cx - r.x) / r.s + Math.abs(cy - r.y) / r.s < 1.15) { hit = i; break; }
  }
  if (hit < 0) return;
  navigator.vibrate && navigator.vibrate(14);
  const cr = crystalRects[hit];
  cosmoAnim = { x: cr.x, y: cr.y - cr.s - 16, timer: 0 };
  if (hit === sequence[inputIdx]) {
    flashIdx = hit; flashTimer = 0; flashMs = 190; phase = "flash_ok";
  } else {
    flashIdx = hit; flashTimer = 0; flashMs = 490; phase = "flash_err";
    if (!shieldUsed) {
      shieldUsed = true;
      navigator.vibrate && navigator.vibrate([40, 25, 80]);
    } else {
      loseLife();
      // Si lives <= 0, endGame(false) est appelé par loseLife()
      // Le loop s'arrête au prochain frame (running = false)
    }
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────────────────────────────
function _buildRects(W, H) {
  const margin = 18;
  const avail  = Math.min(W - margin * 2, H * 0.70);
  const gap    = avail * 0.07;
  const cs     = (avail - gap * 2) / 3;
  const gridSz = cs * 3 + gap * 2;
  const sx     = (W - gridSz) * 0.5;
  const sy     = H * 0.13;
  crystalRects = [];
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      crystalRects.push({
        x: sx + c * (cs + gap) + cs * 0.5,
        y: sy + r * (cs + gap) + cs * 0.5,
        s: cs * 0.44
      });
    }
  }
}

function _initBg(W, H) {
  bgParts = [];
  for (let i = 0; i < 32; i++) bgParts.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vy: -0.28 - Math.random() * 0.45,
    r: 0.8 + Math.random() * 1.6,
    col: Math.random() < 0.5 ? "#aa88ff" : "#66ddff"
  });
}

// ── DESSIN FOND ───────────────────────────────────────────────────────────────────────────────────
function _drawBg(ctx, W, H) {
  // Sol sombre violet
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, "#040214");
  bg.addColorStop(0.55, "#08041c");
  bg.addColorStop(1, "#0c062a");
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Lueur centrale (cœur de caverne)
  const cg = ctx.createRadialGradient(W * 0.5, H * 0.48, 8, W * 0.5, H * 0.48, H * 0.55);
  cg.addColorStop(0, "rgba(80,30,150,0.22)");
  cg.addColorStop(1, "rgba(80,30,150,0)");
  ctx.fillStyle = cg; ctx.fillRect(0, 0, W, H);

  // Poussière magique flottante (mise à jour faite dans _update)
  bgParts.forEach(p => {
    const a = 0.10 + 0.20 * Math.sin(bgT * 0.022 + p.x * 0.012);
    ctx.globalAlpha = a; ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  _drawStalags(ctx, W, H);
  _drawStalacts(ctx, W, H);
}

function _drawStalags(ctx, W, H) {
  [[0.05,0.16,0.055],[0.18,0.24,0.044],[0.28,0.12,0.038],
   [0.70,0.20,0.042],[0.82,0.14,0.046],[0.94,0.26,0.055]].forEach(([xr,hr,wr]) => {
    const x = W*xr, h = H*hr, w = W*wr;
    const g = ctx.createLinearGradient(x, H, x, H - h);
    g.addColorStop(0, "#100820"); g.addColorStop(1, "#2c1848");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(x - w, H); ctx.lineTo(x, H - h); ctx.lineTo(x + w, H);
    ctx.closePath(); ctx.fill();
    // Lueur au sommet
    const pulse = 0.28 + 0.18 * Math.sin(bgT * 0.038 + xr * 10);
    const tg = ctx.createRadialGradient(x, H - h, 0, x, H - h, w * 2.2);
    tg.addColorStop(0, `rgba(160,90,255,${pulse.toFixed(2)})`);
    tg.addColorStop(1, "rgba(160,90,255,0)");
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.arc(x, H - h, w * 2.2, 0, Math.PI * 2); ctx.fill();
  });
}

function _drawStalacts(ctx, W, H) {
  [[0.09,0.11,0.040],[0.21,0.17,0.038],[0.68,0.13,0.042],
   [0.80,0.09,0.036],[0.92,0.18,0.048]].forEach(([xr,hr,wr]) => {
    const x = W*xr, h = H*hr, w = W*wr;
    const g = ctx.createLinearGradient(x, 0, x, h);
    g.addColorStop(0, "#100820"); g.addColorStop(1, "#2c1848");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(x - w, 0); ctx.lineTo(x, h); ctx.lineTo(x + w, 0);
    ctx.closePath(); ctx.fill();
    const pulse = 0.25 + 0.15 * Math.sin(bgT * 0.035 + xr * 8);
    const tg = ctx.createRadialGradient(x, h, 0, x, h, w * 2.2);
    tg.addColorStop(0, `rgba(160,90,255,${pulse.toFixed(2)})`);
    tg.addColorStop(1, "rgba(160,90,255,0)");
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.arc(x, h, w * 2.2, 0, Math.PI * 2); ctx.fill();
  });
}

// ── DESSIN CRISTAUX ─────────────────────────────────────────────────────────────────────────────────
function _drawCrystals(ctx, W, H) {
  if (!crystalRects) return;

  const lit = new Set();
  if (phase === "showing_lit" && showIdx < sequence.length) lit.add(sequence[showIdx]);
  if (phase === "flash_ok"   && flashIdx >= 0)              lit.add(flashIdx);
  if (phase === "round_clear") for (let i = 0; i < 9; i++) lit.add(i);

  for (let i = 0; i < 9; i++) {
    const cr = crystalRects[i];
    const col = CC[i];
    const isLit = lit.has(i);
    const isErr = (phase === "flash_err" && i === flashIdx);
    const s = cr.s;

    // Halo glow
    if (isLit || isErr) {
      const glowR = s * 2.6;
      const glowG = ctx.createRadialGradient(cr.x, cr.y, s * 0.18, cr.x, cr.y, glowR);
      glowG.addColorStop(0, isErr ? "rgba(255,50,50,0.70)" : col.g);
      glowG.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glowG;
      ctx.beginPath(); ctx.arc(cr.x, cr.y, glowR, 0, Math.PI * 2); ctx.fill();
    }

    // Corps diamant
    ctx.fillStyle   = isErr ? "#FF3333" : isLit ? col.l : col.d;
    ctx.strokeStyle = isLit ? col.l     : "rgba(140,80,240,0.30)";
    ctx.lineWidth   = isLit ? 2.5 : 0.9;
    ctx.beginPath();
    ctx.moveTo(cr.x,     cr.y - s);
    ctx.lineTo(cr.x + s, cr.y    );
    ctx.lineTo(cr.x,     cr.y + s);
    ctx.lineTo(cr.x - s, cr.y    );
    ctx.closePath();
    ctx.fill();
    if (isLit || isErr) ctx.stroke();

    // Facette interne (reflet)
    ctx.fillStyle = isLit ? "rgba(255,255,255,0.35)" : "rgba(160,110,240,0.10)";
    const fs = s * 0.44;
    ctx.beginPath();
    ctx.moveTo(cr.x,           cr.y - fs);
    ctx.lineTo(cr.x + fs,      cr.y     );
    ctx.lineTo(cr.x,           cr.y + fs * 0.38);
    ctx.lineTo(cr.x - fs*0.5,  cr.y     );
    ctx.closePath(); ctx.fill();
  }
}

// ── LABELS HUD CANVAS ─────────────────────────────────────────────────────────────────────────────
function _drawLabels(ctx, W, H) {
  ctx.textAlign = "center";

  // Label de phase
  let label = "", labelCol = "rgba(180,140,255,0.88)";
  if (phase === "showing_lit" || phase === "showing_dark") {
    label = "● Mémorise...";
  } else if (phase === "input" || phase === "flash_ok" || phase === "flash_err") {
    label = "▸ À toi !";
    labelCol = "rgba(120,220,255,0.92)";
  } else if (phase === "round_clear") {
    label = "✓ Round " + round + " réussi !";
    labelCol = "rgba(255,215,60,0.95)";
  }
  if (label) {
    ctx.fillStyle = labelCol;
    ctx.font = "bold 16px system-ui";
    ctx.fillText(label, W * 0.5, H * 0.878);
  }

  // Progression saisie
  if (phase === "input" || phase === "flash_ok") {
    const prog = (phase === "flash_ok") ? inputIdx + 1 : inputIdx;
    ctx.fillStyle = "rgba(180,140,255,0.60)";
    ctx.font = "12px system-ui";
    ctx.fillText(prog + " / " + sequence.length, W * 0.5, H * 0.935);
  }

  // Bouclier (indicateur 1 erreur/round)
  ctx.globalAlpha = shieldUsed ? 0.20 : 0.90;
  ctx.font = "24px system-ui";
  ctx.fillText("⛨", W * 0.5, H * 0.968);
  if (!shieldUsed) {
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = "rgba(180,140,255,1)";
    ctx.font = "10px system-ui";
    ctx.fillText("bouclier", W * 0.5, H * 0.988);
  }
  ctx.globalAlpha = 1;
}
</script>
</body>
