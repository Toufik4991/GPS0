<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000 url(../assets/backgrounds/bg-n6.svg) center/cover no-repeat;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#aaffcc}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:52px;text-align:right}
#game-container{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}
canvas{display:block;width:100%;height:100%}
body{display:flex;flex-direction:column;height:100dvh}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;</span>
  <span id="timer">3:00</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="looser-overlay" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-size:clamp(3rem,15vw,6rem);font-weight:900;color:#ff2222;text-shadow:0 0 40px #ff0000,0 0 80px rgba(255,0,0,.6);animation:losePulse .5s ease-in-out infinite alternate;letter-spacing:.08em">LOOSER !</div>
</div>
<style>@keyframes losePulse{to{transform:scale(1.08);text-shadow:0 0 60px #ff0000,0 0 120px rgba(255,60,60,.8)}}</style>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
window.NIVEAU = 6;
window.GPS0_TIMER_SEC = 150;
window.GPS0_MAX_LIVES = 1;
window.GPS0_onGameOver = function() {
  const el = document.getElementById('looser-overlay');
  if (el) { el.style.display = 'flex'; }
};
window.GPS0_onTimerExpired = function () { endGame(true); };
window.TUTO_TEXT = "Niveau 6 \u2014 Glisse le doigt pour bouger \u00b7 Mange les plus petites \u00b7 Fuis les plus grosses \u00b7 \u2726 = +1 poussi\u00e8re"; 

const MAP = 2400, PLAYER_R0 = 22;
const FOOD_N = 70, ENEMY_N = 40, CRYSTAL_N = 30, CRYSTAL_MAX = 50;

let player, enemies, foods, crystals, particles, stars;
let joystick, dustCount, bgT, rafId, cellulesIAMangees;

window.GPS0_computeDust = function(success) {
  var tempsJoue = GPS0_timerTotal() - GPS0_timerSec();
  var tempsMax  = GPS0_timerTotal() || 150;
  var tailleFin = player ? player.r : PLAYER_R0;
  var scoreTps   = (tempsJoue / tempsMax) * 20;
  var scoreTaille = Math.min((tailleFin - PLAYER_R0) * 0.5, 15);
  var scoreCells  = Math.min(cellulesIAMangees * 3, 15);
  var bonusWin    = success ? 5 : 0;
  return scoreTps + scoreTaille + scoreCells + bonusWin;
};

function _drawHelmet(ctx, cx, cy, r) {
  var hr = Math.max(20, r);
  // Rim / bord casque
  ctx.strokeStyle = 'rgba(160,230,255,0.65)'; ctx.lineWidth = Math.max(2, hr * 0.08);
  ctx.beginPath(); ctx.arc(cx, cy, hr, 0, Math.PI * 2); ctx.stroke();
  // Visière sombre centrale
  var vw = hr * 0.62, vh = hr * 0.48;
  var vg = ctx.createRadialGradient(cx - vw*0.2, cy - vh*0.25, 2, cx, cy + vh*0.12, Math.max(vw, vh));
  vg.addColorStop(0, 'rgba(0,20,70,0.82)');
  vg.addColorStop(0.7, 'rgba(0,50,140,0.60)');
  vg.addColorStop(1, 'rgba(0,30,100,0.30)');
  ctx.fillStyle = vg;
  ctx.beginPath(); ctx.ellipse(cx, cy + hr * 0.05, vw, vh, 0, 0, Math.PI * 2); ctx.fill();
  // Reflet visière
  ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.beginPath(); ctx.ellipse(cx - vw*0.23, cy - vh*0.18, vw*0.28, vh*0.20, -0.35, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.beginPath(); ctx.ellipse(cx + vw*0.18, cy + vh*0.22, vw*0.18, vh*0.12, 0.3, 0, Math.PI*2); ctx.fill();
  // Petits yeux dans visière
  var eyeR = Math.max(2, hr * 0.085);
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.arc(cx - hr*0.20, cy - hr*0.04, eyeR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + hr*0.20, cy - hr*0.04, eyeR, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,200,255,0.9)';
  ctx.beginPath(); ctx.arc(cx - hr*0.20, cy - hr*0.04, eyeR*0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + hr*0.20, cy - hr*0.04, eyeR*0.5, 0, Math.PI*2); ctx.fill();
  // Sourire
  ctx.strokeStyle = 'rgba(200,240,255,0.65)'; ctx.lineWidth = Math.max(1, eyeR*0.6); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(cx, cy + hr*0.10, hr*0.14, 0.2, Math.PI - 0.2); ctx.stroke();
}

function _genStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({ x: Math.random()*MAP, y: Math.random()*MAP, r: Math.random()*1.4+.4, a: .25+Math.random()*.55 });
  }
}

function _newFood() {
  return { x: 30+Math.random()*(MAP-60), y: 30+Math.random()*(MAP-60), r: 5, hue: Math.floor(Math.random()*360) };
}

function _spawnEnemy(i) {
  let x, y, att = 0;
  do {
    x = 60+Math.random()*(MAP-120);
    y = 60+Math.random()*(MAP-120);
    att++;
  } while (player && Math.hypot(x-player.x, y-player.y) < 320 && att < 25);
  const r = 15 + Math.random()*38;
  const hue = (i*43+17)%360;
  enemies[i] = { x, y, r, vx:0, vy:0, hue, tx:x, ty:y, tTimer:0 };
}

function gameReset() {
  cancelAnimationFrame(rafId);
  player = { x:MAP/2, y:MAP/2, r:PLAYER_R0, vx:0, vy:0 };
  enemies = new Array(ENEMY_N).fill(null);
  enemies.forEach((_,i) => _spawnEnemy(i));
  foods = Array.from({length:FOOD_N}, _newFood);
  crystals = Array.from({length:CRYSTAL_N}, () => ({ x:50+Math.random()*(MAP-100), y:50+Math.random()*(MAP-100), col:false }));
  particles = []; dustCount = 0; bgT = 0; cellulesIAMangees = 0;
  joystick = { active:false, bx:0, by:0, sx:0, sy:0, id:-1 };
  if (!stars) _genStars();
}
window.gameReset = gameReset;

function gameStart() {
  const cv = document.getElementById('cv');
  GPS0_resizeCanvas(cv);
  gameReset();

  // Joystick touch
  cv.addEventListener('touchstart', e => {
    for (const t of e.changedTouches) {
      const rect = cv.getBoundingClientRect();
      const scX = cv.width/rect.width, scY = cv.height/rect.height;
      const cx = (t.clientX-rect.left)*scX, cy = (t.clientY-rect.top)*scY;
      if (!joystick.active && cx < cv.width/2) {
        joystick.active = true; joystick.id = t.identifier;
        joystick.bx = cx; joystick.by = cy; joystick.sx = cx; joystick.sy = cy;
      }
    }
  }, {passive:true});

  cv.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joystick.id) {
        const rect = cv.getBoundingClientRect();
        joystick.sx = (t.clientX-rect.left)*cv.width/rect.width;
        joystick.sy = (t.clientY-rect.top)*cv.height/rect.height;
      }
    }
  }, {passive:false});

  cv.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === joystick.id) { joystick.active = false; joystick.id = -1; }
    }
  }, {passive:true});

  // Clavier fallback
  const keys = {};
  document.addEventListener('keydown', e => { keys[e.key] = true; });
  document.addEventListener('keyup',   e => { keys[e.key] = false; });

  const ctx = cv.getContext('2d');
  const loop = () => {
    rafId = requestAnimationFrame(loop);
    if (!GPS0_running()) return;
    const W = cv.width, H = cv.height;
    bgT++;

    // --- INPUT JOUEUR ---
    const spd = 3.8 / Math.pow(player.r / PLAYER_R0, 0.42);
    let ix = 0, iy = 0;
    if (joystick.active) {
      const ddx = joystick.sx - joystick.bx, ddy = joystick.sy - joystick.by;
      const len = Math.sqrt(ddx*ddx + ddy*ddy);
      if (len > 5) { const t = Math.min(len,52)/52; ix = (ddx/len)*t; iy = (ddy/len)*t; }
    }
    if (keys['ArrowLeft']||keys['a']) ix -= 1;
    if (keys['ArrowRight']||keys['d']) ix += 1;
    if (keys['ArrowUp']||keys['w']) iy -= 1;
    if (keys['ArrowDown']||keys['s']) iy += 1;
    const ilen = Math.sqrt(ix*ix+iy*iy); if (ilen>1) { ix/=ilen; iy/=ilen; }
    player.vx = player.vx*.78 + ix*spd*.22;
    player.vy = player.vy*.78 + iy*spd*.22;
    player.x = Math.max(player.r, Math.min(MAP-player.r, player.x+player.vx));
    player.y = Math.max(player.r, Math.min(MAP-player.r, player.y+player.vy));

    // --- ENNEMIS IA ---
      const rawDiff = 1 + Math.min(bgT / 3600, 1.2); // difficulté progressive jusqu'à x2.2
      const startMul = bgT < 1800 ? 0.5 + 0.5 * (bgT / 1800) : 1.0; // 30s de démarrage facile
      const diffMul = rawDiff * startMul;
    enemies.forEach((en, i) => {
      if (!en) return;
      en.tTimer--;
      const dp = Math.hypot(player.x-en.x, player.y-en.y);
      const hunting = en.r > player.r * 1.05 && dp < MAP * 0.3;
      if (hunting) {
        // Chasse continue — cible le joueur chaque frame
        en.tx = player.x + (Math.random()-.5)*10;
        en.ty = player.y + (Math.random()-.5)*10;
      } else if (en.tTimer <= 0) {
        en.tTimer = 40 + Math.floor(Math.random()*35);
        let prey = null, pDist = 9999, flee = null, fDist = 9999;
        if (dp < 300) {
          if (player.r < en.r*.88)       { if (dp<pDist) { pDist=dp; prey={x:player.x,y:player.y}; } }
          else if (player.r > en.r*1.12) { if (dp<fDist) { fDist=dp; flee={x:player.x,y:player.y}; } }
        }
        enemies.forEach((e2, j) => {
          if (i===j || !e2) return;
          const d = Math.hypot(e2.x-en.x, e2.y-en.y);
          if (d < 260) {
            if (e2.r < en.r*.88)       { if (d<pDist) { pDist=d; prey={x:e2.x,y:e2.y}; } }
            else if (e2.r > en.r*1.12) { if (d<fDist) { fDist=d; flee={x:e2.x,y:e2.y}; } }
          }
        });
        if (flee) {
          const ang = Math.atan2(flee.y-en.y, flee.x-en.x) + Math.PI;
          en.tx = en.x + Math.cos(ang)*(180+Math.random()*120);
          en.ty = en.y + Math.sin(ang)*(180+Math.random()*120);
        } else if (prey) {
          en.tx = prey.x + (Math.random()-.5)*16;
          en.ty = prey.y + (Math.random()-.5)*16;
        } else {
          en.tx = 60+Math.random()*(MAP-120);
          en.ty = 60+Math.random()*(MAP-120);
        }
        en.tx = Math.max(en.r, Math.min(MAP-en.r, en.tx));
        en.ty = Math.max(en.r, Math.min(MAP-en.r, en.ty));
      }
      const chaseMul = hunting ? 1.1 : 1.0;
      const eSpd = (2.6 / Math.pow(en.r/22, 0.38)) * chaseMul * diffMul;
      const tdx = en.tx-en.x, tdy = en.ty-en.y, tlen = Math.hypot(tdx,tdy);
      if (tlen > 1) { en.vx = en.vx*.84+(tdx/tlen)*eSpd*.16; en.vy = en.vy*.84+(tdy/tlen)*eSpd*.16; }
      en.x = Math.max(en.r, Math.min(MAP-en.r, en.x+en.vx));
      en.y = Math.max(en.r, Math.min(MAP-en.r, en.y+en.vy));

      // Collision player <-> ennemi
      const d = Math.hypot(player.x-en.x, player.y-en.y);
      if (d < player.r+en.r-8) {
        if (player.r > en.r*1.1) {
          // Player mange ennemi
          player.r = Math.min(player.r + en.r*.35, 140);
          cellulesIAMangees++;
          _spawnFx(player.x, player.y, `hsl(${en.hue},80%,65%)`, 12);
          _spawnEnemy(i);
          navigator.vibrate && navigator.vibrate([8,4,15]);
        } else if (en.r > player.r*1.1) {
          // Ennemi mange player — repousse player pour eviter double-collision
          en.r = Math.min(en.r+5, 120);
          player.r = Math.max(PLAYER_R0, player.r-7);
          const ang = Math.atan2(player.y-en.y, player.x-en.x);
          player.x = Math.max(player.r, Math.min(MAP-player.r, en.x+Math.cos(ang)*(en.r+player.r+18)));
          player.y = Math.max(player.r, Math.min(MAP-player.r, en.y+Math.sin(ang)*(en.r+player.r+18)));
          player.vx *= -.5; player.vy *= -.5;
          _spawnFx(player.x, player.y, '#ff4466', 14);
          loseLife();
        }
      }
    });

    // Spawn ennemi périodique (toutes les 5s = 300 frames, max 120)
    if (bgT % 300 === 0 && enemies.filter(Boolean).length < 60) {
      enemies.push(null);
      _spawnEnemy(enemies.length - 1);
    }

    // --- NOURRITURE ---
    foods.forEach((f, fi) => {
      if (Math.hypot(player.x-f.x, player.y-f.y) < player.r+f.r-2) {
        player.r = Math.min(player.r+0.25, 140);
        foods[fi] = _newFood();
      }
    });

    // --- CRISTAUX ---
    crystals.forEach(c => {
      if (c.col) return;
      if (Math.hypot(player.x-c.x, player.y-c.y) < player.r+10) {
        c.col = true;
        dustCount = Math.min(dustCount+1, CRYSTAL_MAX);
        addDust(1);
        _spawnFx(c.x, c.y, '#cc88ff', 8);
        navigator.vibrate && navigator.vibrate([6,3,12]);
      }
    });

    // --- PARTICULES ---
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=.05; p.life--; });

    // === DESSIN ===
    const offX = W/2 - player.x, offY = H/2 - player.y;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#01020b'; ctx.fillRect(0,0,W,H);

    // Grille map style Agar.io
    ctx.strokeStyle = 'rgba(60,100,180,.07)'; ctx.lineWidth = 1;
    const gS = 80, gox = (offX%gS+gS)%gS, goy = (offY%gS+gS)%gS;
    for (let gx=gox-gS; gx<W+gS; gx+=gS) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for (let gy=goy-gS; gy<H+gS; gy+=gS) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

    // Etoiles (filtrées par viewport)
    stars.forEach(s => {
      const sx=s.x+offX, sy=s.y+offY;
      if (sx<-3||sx>W+3||sy<-3||sy>H+3) return;
      ctx.globalAlpha = s.a + .12*Math.sin(bgT*.025+s.x*.008);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx,sy,s.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Bordure map
    ctx.strokeStyle = 'rgba(80,180,255,.4)'; ctx.lineWidth = 3;
    ctx.strokeRect(offX+1, offY+1, MAP-2, MAP-2);

    // Nourriture
    foods.forEach(f => {
      const fx=f.x+offX, fy=f.y+offY;
      if (fx<-14||fx>W+14||fy<-14||fy>H+14) return;
      const fg = ctx.createRadialGradient(fx,fy,1,fx,fy,f.r*2.4);
      fg.addColorStop(0, `hsla(${f.hue},80%,72%,.32)`); fg.addColorStop(1, `hsla(${f.hue},80%,60%,0)`);
      ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(fx,fy,f.r*2.4,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = .88;
      ctx.fillStyle = `hsl(${f.hue},80%,68%)`; ctx.beginPath(); ctx.arc(fx,fy,f.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Cristaux
    crystals.forEach(c => {
      if (c.col) return;
      const cx=c.x+offX, cy=c.y+offY;
      if (cx<-22||cx>W+22||cy<-22||cy>H+22) return;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(bgT*.022);
      const hg = ctx.createRadialGradient(0,0,2,0,0,16);
      hg.addColorStop(0,'rgba(200,136,255,.5)'); hg.addColorStop(1,'rgba(200,136,255,0)');
      ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#cc88ff';
      ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(5,0); ctx.lineTo(0,9); ctx.lineTo(-5,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(220,180,255,.6)'; ctx.lineWidth=1.2; ctx.stroke();
      ctx.restore();
    });

    // Ennemis
    enemies.forEach(en => {
      if (!en) return;
      const ex=en.x+offX, ey=en.y+offY;
      if (ex<-en.r-22||ex>W+en.r+22||ey<-en.r-22||ey>H+en.r+22) return;
      // Glow
      const eg = ctx.createRadialGradient(ex,ey,en.r*.3,ex,ey,en.r*2);
      eg.addColorStop(0,`hsla(${en.hue},70%,55%,.22)`); eg.addColorStop(1,`hsla(${en.hue},70%,55%,0)`);
      ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(ex,ey,en.r*2,0,Math.PI*2); ctx.fill();
      // Corps
      ctx.fillStyle=`hsl(${en.hue},55%,30%)`;
      ctx.beginPath(); ctx.arc(ex,ey,en.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=`hsl(${en.hue},80%,60%)`; ctx.lineWidth=2; ctx.stroke();
      // Yeux (rouges si menace, blancs sinon)
      const threat = en.r > player.r*1.1;
      ctx.fillStyle = threat ? '#ff2233' : 'rgba(255,255,255,.9)';
      ctx.beginPath(); ctx.arc(ex-en.r*.27,ey-en.r*.16,en.r*.13,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex+en.r*.27,ey-en.r*.16,en.r*.13,0,Math.PI*2); ctx.fill();
      if (threat) {
        // Pupille rouge brillante
        ctx.fillStyle='#ff6677';
        ctx.beginPath(); ctx.arc(ex-en.r*.27,ey-en.r*.16,en.r*.06,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex+en.r*.27,ey-en.r*.16,en.r*.06,0,Math.PI*2); ctx.fill();
      }
    });

    // Particules
    particles.forEach(p => {
      ctx.globalAlpha = p.life/24; ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x+offX,p.y+offY,3.5,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Cellule joueur
    const pr = player.r;
    const pg = ctx.createRadialGradient(W/2,H/2,pr*.2,W/2,H/2,pr*2);
    pg.addColorStop(0,'rgba(80,180,255,.28)'); pg.addColorStop(1,'rgba(80,180,255,0)');
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(W/2,H/2,pr*2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(30,110,200,.38)';
    ctx.strokeStyle='rgba(100,210,255,.88)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(W/2,H/2,pr,0,Math.PI*2); ctx.fill(); ctx.stroke();
    _drawHelmet(ctx, W/2, H/2, pr);

    // Mini-map (coin haut-droite)
    _drawMinimap(ctx, W, H);
    // Joystick invisible (tracking actif, pas de rendu)
    // HUD info
    _drawHUD(ctx, W, H);
  };
  loop();
}
window.gameStart = gameStart;

function _spawnFx(x, y, col, n) {
  for (let i=0; i<n; i++) particles.push({
    x: x+(Math.random()-.5)*6, y: y+(Math.random()-.5)*6,
    vx: (Math.random()-.5)*3, vy: -2+Math.random()*1.5, life:24, col
  });
}

function _drawJoystick(ctx, W, H) {
  // Base : position du touch si actif, sinon hint bas-gauche
  const bx = joystick.active ? joystick.bx : 72;
  const by = joystick.active ? joystick.by : H - 72;
  ctx.globalAlpha = .18; ctx.fillStyle = '#66aaff';
  ctx.beginPath(); ctx.arc(bx,by,52,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = .30; ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(bx,by,52,0,Math.PI*2); ctx.stroke();
  // Stick
  let sx=bx, sy=by;
  if (joystick.active) {
    const ddx=joystick.sx-joystick.bx, ddy=joystick.sy-joystick.by;
    const len=Math.sqrt(ddx*ddx+ddy*ddy), cl=Math.min(len,50);
    if (len>2) { sx=bx+(ddx/len)*cl; sy=by+(ddy/len)*cl; }
  }
  ctx.globalAlpha = .58; ctx.fillStyle = '#aaddff';
  ctx.beginPath(); ctx.arc(sx,sy,22,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function _drawMinimap(ctx, W, H) {
  const mw=80, mh=80, mx=W-mw-8, my=8, sc=mw/MAP;
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.beginPath(); ctx.roundRect(mx-2,my-2,mw+4,mh+4,4); ctx.fill();
  ctx.strokeStyle='rgba(80,180,255,.35)'; ctx.lineWidth=1;
  ctx.strokeRect(mx,my,mw,mh);
  // Ennemis sur minimap
  enemies.forEach(en => {
    if (!en) return;
    ctx.fillStyle = `hsl(${en.hue},70%,55%)`;
    ctx.beginPath(); ctx.arc(mx+en.x*sc,my+en.y*sc,Math.max(2,en.r*sc*1.4),0,Math.PI*2); ctx.fill();
  });
  // Cristaux non collectes
  ctx.fillStyle='#cc88ff';
  crystals.forEach(c => {
    if (c.col) return;
    ctx.beginPath(); ctx.arc(mx+c.x*sc,my+c.y*sc,1.5,0,Math.PI*2); ctx.fill();
  });
  // Joueur
  ctx.fillStyle='rgba(100,210,255,.95)';
  ctx.beginPath(); ctx.arc(mx+player.x*sc,my+player.y*sc,Math.max(3,player.r*sc*1.5),0,Math.PI*2); ctx.fill();
}

function _drawHUD(ctx, W, H) {
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.beginPath(); ctx.roundRect(W-96,H-132,90,48,8); ctx.fill();
  ctx.fillStyle='#aaffcc'; ctx.font='bold 13px system-ui'; ctx.textAlign='center';
  ctx.fillText('\u2299 '+Math.round(player.r), W-51, H-108);
  ctx.fillStyle='rgba(170,255,204,.5)'; ctx.font='10px system-ui';
  ctx.fillText('taille', W-51, H-96);
  ctx.fillStyle='#cc88ff'; ctx.font='bold 12px system-ui';
  ctx.fillText('\u2726 '+dustCount+'/'+CRYSTAL_MAX, W-51, H-82);
}
</script>
