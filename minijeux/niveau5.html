<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000 url(../assets/backgrounds/bg-n5.svg) center/cover no-repeat;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#FFD700}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:52px;text-align:right}
#game-container{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}
canvas{display:block;width:100%;height:100%}
body{display:flex;flex-direction:column;height:100dvh}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:30</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
window.NIVEAU = 5;
window.GPS0_TIMER_SEC = 150;
window.GPS0_onTimerExpired = function () { endGame(false); };
window.TUTO_TEXT = "☀️ 1, 2, 3... SOLEIL !<br>TAP quand le soleil a le DOS tourné 🔆<br><small>STOP quand il se retourne ! 😡 La Lune te guide... 🌙</small>";

/* ══════════════════════════════════════════════════════════════════════════
   NIVEAU 5 — 1, 2, 3 SOLEIL ! (version cosmique)
   ══════════════════════════════════════════════════════════════════════════ */

const SUN_R       = 48;
const COSMO_R     = 20;
const STEP_BASE   = 0.028;
const PENALTY     = 0.15;
const STAR_COUNT  = 55;
const DUST_COUNT  = 18;
const COUNT_MIN   = 1200;
const COUNT_MAX   = 4000;
const TURN_MS     = 500;
const STOP_MIN    = 2000;
const STOP_MAX    = 4000;
const MOON_R      = 28;
const MOON_PAD    = 16;

let cv, ctx, W, H;
let progress, phase, phaseTimer, countStep, countStepTimer;
let bgT, stars, dustParts, fxParts;
let sunFlipProg, stopFlash, difficultyMul;
let moonBlink, moonBlinkTimer;
let rafId, lastT;

function gameReset() {
  cancelAnimationFrame(rafId);
  progress = 0; phase = 'count';
  phaseTimer = _rnd(COUNT_MIN, COUNT_MAX);
  countStep = 0; countStepTimer = 0;
  bgT = 0; sunFlipProg = 0; stopFlash = 0; difficultyMul = 1;
  moonBlink = 0; moonBlinkTimer = 0;
  fxParts = []; _initStars(); _initDust();
}
window.gameReset = gameReset;

function gameStart() {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  GPS0_resizeCanvas(cv); _fixSize();
  gameReset();
  cv.addEventListener('pointerdown', _onTap);
  cv.addEventListener('touchstart', function(e){ e.preventDefault(); }, { passive: false });
  lastT = performance.now();
  rafId = requestAnimationFrame(_loop);
}
window.gameStart = gameStart;
window.onResize = function () { _fixSize(); };

function _fixSize() {
  W = cv.width; H = cv.height;
  if (!W || !H) {
    var hud = document.getElementById('hud');
    W = cv.width = window.innerWidth;
    H = cv.height = window.innerHeight - (hud ? hud.offsetHeight : 44);
  }
}

function _rnd(a, b) { return a + Math.random() * (b - a); }
function _sunX() { return W / 2; }
function _sunY() { return SUN_R + 36; }
function _pathTop() { return _sunY() + SUN_R + COSMO_R + 18; }
function _pathBot() { return H - COSMO_R - 50; }
function _playerY() { return _pathBot() - progress * (_pathBot() - _pathTop()); }

/* ── ÉTOILES FOND ──────────────────────────────────────────────────────── */
function _initStars() {
  stars = [];
  for (var i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      r: 0.6 + Math.random() * 2,
      a: 0.3 + Math.random() * 0.6,
      ph: Math.random() * Math.PI * 2,
      spd: 0.015 + Math.random() * 0.04
    });
  }
}

/* ── POUSSIÈRES COLLECTABLES ───────────────────────────────────────────── */
function _initDust() {
  dustParts = [];
  for (var i = 0; i < DUST_COUNT; i++) {
    var t = (i + 0.5) / DUST_COUNT;
    dustParts.push({
      t: t,
      ox: (Math.random() - 0.5) * 0.36,
      r: 3.5 + Math.random() * 3,
      ph: Math.random() * Math.PI * 2,
      collected: false
    });
  }
}

/* ── TAP ───────────────────────────────────────────────────────────────── */
function _onTap(e) {
  e.preventDefault();
  if (!GPS0_running()) return;

  if (phase === 'stop' || phase === 'turning') {
    stopFlash = 1;
    progress = Math.max(0, progress - PENALTY);
    loseLife();
    if (navigator.vibrate) navigator.vibrate([80, 40, 160]);
    return;
  }

  var step = STEP_BASE * (1 + (1 - progress) * 0.15);
  progress = Math.min(1, progress + step);
  if (navigator.vibrate) navigator.vibrate(5);

  var py = _playerY();
  for (var i = 0; i < 3; i++) {
    fxParts.push({
      x: _sunX() + (Math.random() - 0.5) * 12,
      y: py + COSMO_R * 0.5,
      vx: (Math.random() - 0.5) * 2,
      vy: 0.8 + Math.random() * 1.5,
      r: 2 + Math.random() * 2,
      col: 'hsl(' + (40 + Math.random() * 30) + ',100%,80%)',
      al: 0.8
    });
  }

  if (progress >= 1) {
    var elapsed = (window.GPS0_TIMER_SEC || 150) - (window.GPS0_timerSec ? window.GPS0_timerSec() : 0);
    window.GPS0_rewardOverride = elapsed < 90 ? 50 : 30;
    endGame(true);
  }
}

/* ── BOUCLE ────────────────────────────────────────────────────────────── */
function _loop(now) {
  rafId = requestAnimationFrame(_loop);
  if (!GPS0_running()) return;
  var dt = Math.min(now - lastT, 80);
  lastT = now;
  bgT += dt / 16.67;
  _fixSize();
  _updateDifficulty();
  _updatePhase(dt);
  _updateSunFlip(dt);
  _updateMoon(dt);
  _collectDust();
  _updateFx(dt / 16.67);
  _draw();
}

function _updateDifficulty() {
  difficultyMul = 1 + progress * 0.8;
}

/* ── MACHINE À ÉTATS ───────────────────────────────────────────────────── */
function _updatePhase(dt) {
  phaseTimer -= dt * difficultyMul;
  if (phaseTimer > 0) {
    if (phase === 'count') {
      var stepDur = (COUNT_MAX / difficultyMul) / 4;
      countStepTimer += dt;
      if (countStepTimer > stepDur && countStep < 3) { countStep++; countStepTimer = 0; }
    }
    return;
  }
  if (phase === 'count')         { countStep = 4; phase = 'turning'; phaseTimer = TURN_MS; }
  else if (phase === 'turning')  { phase = 'stop'; phaseTimer = Math.max(1500, _rnd(STOP_MIN, STOP_MAX) / difficultyMul); }
  else if (phase === 'stop')     { phase = 'unturning'; phaseTimer = TURN_MS; }
  else                           { phase = 'count'; countStep = 0; countStepTimer = 0; phaseTimer = Math.max(800, _rnd(COUNT_MIN, COUNT_MAX) / difficultyMul); }
}

/* ── FLIP SOLEIL ───────────────────────────────────────────────────────── */
function _updateSunFlip(dt) {
  var speed = dt / TURN_MS;
  if (phase === 'turning' || phase === 'stop') sunFlipProg = Math.min(1, sunFlipProg + speed * 2.5);
  else sunFlipProg = Math.max(0, sunFlipProg - speed * 2.5);
}

/* ── LUNE (clignement) ─────────────────────────────────────────────────── */
function _updateMoon(dt) {
  moonBlinkTimer -= dt;
  if (moonBlinkTimer <= 0) {
    moonBlink = moonBlink ? 0 : 1;
    moonBlinkTimer = moonBlink ? 120 : (2000 + Math.random() * 3000);
  }
}

/* ── COLLECTE POUSSIÈRES ───────────────────────────────────────────────── */
function _collectDust() {
  var py = _playerY(), sx = _sunX();
  for (var i = 0; i < dustParts.length; i++) {
    var d = dustParts[i];
    if (d.collected) continue;
    var dy = _pathBot() - d.t * (_pathBot() - _pathTop());
    var dx2 = sx + d.ox * W;
    if (Math.hypot(sx - dx2, py - dy) < COSMO_R + d.r + 8) {
      d.collected = true; addDust(1);
      for (var j = 0; j < 6; j++) {
        var a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 3;
        fxParts.push({ x: dx2, y: dy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          r: 2 + Math.random() * 2.5, col: 'hsl(' + (40 + Math.random() * 40) + ',100%,80%)', al: 1 });
      }
    }
  }
}

/* ── FX PARTICULES ─────────────────────────────────────────────────────── */
function _updateFx(dt) {
  for (var i = fxParts.length - 1; i >= 0; i--) {
    var p = fxParts[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.94; p.vy *= 0.94;
    p.al -= 0.025 * dt;
    if (p.al <= 0) fxParts.splice(i, 1);
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   DESSIN
   ══════════════════════════════════════════════════════════════════════════ */
function _draw() {
  ctx.clearRect(0, 0, W, H);

  /* Fond spatial */
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0015'); bg.addColorStop(0.3, '#1a0e2e');
  bg.addColorStop(0.7, '#0f0a1a'); bg.addColorStop(1, '#060010');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  var neb = ctx.createRadialGradient(W * 0.3, H * 0.2, 10, W * 0.3, H * 0.2, W * 0.4);
  neb.addColorStop(0, 'rgba(120,40,180,0.06)'); neb.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = neb; ctx.fillRect(0, 0, W, H);

  /* Étoiles */
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var alpha = s.a * (0.5 + 0.5 * Math.sin(bgT * s.spd + s.ph));
    ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  /* Halo ambiance */
  var haloA = phase === 'stop' ? 0.20 : phase === 'turning' ? 0.15 : 0.08;
  var haloCol = phase === 'stop' ? 'rgba(255,80,20,' : 'rgba(255,200,40,';
  var hl = ctx.createRadialGradient(_sunX(), _sunY(), SUN_R, _sunX(), _sunY(), H * 0.7);
  hl.addColorStop(0, haloCol + haloA + ')');
  hl.addColorStop(0.5, haloCol + (haloA * 0.3) + ')');
  hl.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = hl; ctx.fillRect(0, 0, W, H);

  /* Chemin d'étoiles */
  _drawPath();

  /* Poussières collectables */
  for (var i = 0; i < dustParts.length; i++) {
    var d = dustParts[i];
    if (d.collected) continue;
    var dy = _pathBot() - d.t * (_pathBot() - _pathTop());
    var dx = _sunX() + d.ox * W;
    var pulse = 0.55 + 0.45 * Math.sin(bgT * 0.08 + d.ph);
    ctx.save(); ctx.globalAlpha = 0.5 * pulse;
    ctx.fillStyle = 'hsl(' + (45 + Math.sin(d.ph) * 20) + ',100%,78%)';
    ctx.beginPath(); ctx.arc(dx, dy, d.r * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  /* Flash stop rouge */
  if (stopFlash > 0) {
    ctx.save(); ctx.globalAlpha = stopFlash * 0.4;
    ctx.fillStyle = '#ff0000'; ctx.fillRect(0, 0, W, H);
    ctx.restore();
    stopFlash = Math.max(0, stopFlash - 0.04);
  }

  /* FX */
  for (var i = 0; i < fxParts.length; i++) {
    var p = fxParts[i];
    if (p.al <= 0) continue;
    ctx.save(); ctx.globalAlpha = p.al; ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  /* Cosmonaute */
  var posY = _playerY();
  drawCosmonaut(ctx, _sunX(), posY, COSMO_R, 0, (phase === 'count' || phase === 'unturning') ? 'run' : 'idle');

  /* Soleil */
  _drawSun();

  /* Lune guide */
  _drawMoon();

  /* Jauge + Labels */
  _drawProgressBar();
  _drawPhaseLabel();
}

/* ── CHEMIN D'ÉTOILES ──────────────────────────────────────────────────── */
function _drawPath() {
  var sx = _sunX(), top = _pathTop(), bot = _pathBot();
  for (var i = 0; i <= 28; i++) {
    var t = i / 28;
    var y = bot - t * (bot - top);
    var pulse = 0.3 + 0.4 * Math.sin(bgT * 0.06 + t * 8);
    ctx.save(); ctx.globalAlpha = pulse; ctx.fillStyle = '#ffee88';
    _drawStar4(ctx, sx, y, 3 + Math.sin(bgT * 0.04 + t * 5) * 1.5);
    ctx.restore();
  }
}

function _drawStar4(ctx, x, y, r) {
  ctx.beginPath();
  for (var i = 0; i < 8; i++) {
    var a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    var d = i % 2 === 0 ? r : r * 0.4;
    var px = x + Math.cos(a) * d, py = y + Math.sin(a) * d;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill();
}

/* ══════════════════════════════════════════════════════════════════════════
   SOLEIL — Face arrière (dos, calme) ↔ Face avant (méchant 😡)
   Flip horizontal fluide via sunFlipProg (0=dos, 1=face)
   ══════════════════════════════════════════════════════════════════════════ */
function _drawSun() {
  var sx = _sunX(), sy = _sunY(), t = bgT;

  /* Rayons */
  for (var i = 0; i < 12; i++) {
    var a = (i / 12) * Math.PI * 2 + t * 0.015;
    var rIn = SUN_R + 4, rOut = SUN_R + 22 + 8 * Math.sin(t * 0.05 + i);
    ctx.save();
    ctx.globalAlpha = phase === 'stop' ? 0.75 : 0.30;
    ctx.strokeStyle = phase === 'stop' ? '#ff6600' : '#ffdd44';
    ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(a) * rIn, sy + Math.sin(a) * rIn);
    ctx.lineTo(sx + Math.cos(a) * rOut, sy + Math.sin(a) * rOut);
    ctx.stroke(); ctx.restore();
  }

  /* Halo rapproché */
  var hR = SUN_R + 18 + 4 * Math.sin(t * 0.07);
  var hg = ctx.createRadialGradient(sx, sy, SUN_R * 0.5, sx, sy, hR);
  if (phase === 'stop') {
    hg.addColorStop(0, 'rgba(255,70,0,.65)'); hg.addColorStop(1, 'rgba(255,70,0,0)');
  } else {
    hg.addColorStop(0, 'rgba(255,220,80,.45)'); hg.addColorStop(1, 'rgba(255,200,0,0)');
  }
  ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(sx, sy, hR, 0, Math.PI * 2); ctx.fill();

  /* Corps soleil avec flip */
  ctx.save();
  ctx.translate(sx, sy);
  var scaleX = Math.cos(sunFlipProg * Math.PI);
  ctx.scale(Math.abs(scaleX) < 0.05 ? 0.05 : scaleX, 1);

  var isFace = sunFlipProg > 0.5;
  var sunCol = isFace ? (phase === 'stop' ? '#ff5500' : '#ffaa00') : '#ffdd22';
  var bodyG = ctx.createRadialGradient(-SUN_R * 0.3, -SUN_R * 0.3, 4, 0, 0, SUN_R);
  bodyG.addColorStop(0, '#fff8c0'); bodyG.addColorStop(0.4, sunCol);
  bodyG.addColorStop(1, isFace ? '#cc3300' : '#e6a800');
  ctx.fillStyle = bodyG;
  ctx.beginPath(); ctx.arc(0, 0, SUN_R, 0, Math.PI * 2); ctx.fill();

  ctx.strokeStyle = isFace ? 'rgba(200,50,0,0.4)' : 'rgba(200,180,60,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, SUN_R, 0, Math.PI * 2); ctx.stroke();

  /* Visage FACE (méchant) */
  if (sunFlipProg > 0.55) {
    var faceAlpha = Math.min(1, (sunFlipProg - 0.55) / 0.25);
    ctx.save(); ctx.scale(-1, 1); ctx.globalAlpha = faceAlpha;

    var eyY = -SUN_R * 0.18;
    var exArr = [-SUN_R * 0.34, SUN_R * 0.34];
    for (var ei = 0; ei < 2; ei++) {
      var ex = exArr[ei];
      ctx.fillStyle = '#fff'; ctx.strokeStyle = '#4a0000'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(ex, eyY, SUN_R * 0.17, SUN_R * 0.21, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#cc0000';
      ctx.beginPath(); ctx.arc(ex, eyY + SUN_R * 0.03, SUN_R * 0.10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1a0000';
      ctx.beginPath(); ctx.arc(ex, eyY + SUN_R * 0.03, SUN_R * 0.05, 0, Math.PI * 2); ctx.fill();
    }

    ctx.strokeStyle = '#4a1000'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-SUN_R * 0.56, eyY - SUN_R * 0.30); ctx.lineTo(-SUN_R * 0.16, eyY - SUN_R * 0.08); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(SUN_R * 0.56, eyY - SUN_R * 0.30); ctx.lineTo(SUN_R * 0.16, eyY - SUN_R * 0.08); ctx.stroke();

    var mY = SUN_R * 0.30;
    ctx.strokeStyle = '#3a0000'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, mY, SUN_R * 0.28, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
    ctx.fillStyle = '#ffffcc';
    var tW = SUN_R * 0.08, tH = SUN_R * 0.09;
    for (var ti = 0; ti < 4; ti++) {
      ctx.beginPath(); ctx.roundRect(-SUN_R * 0.18 + ti * tW * 1.2, mY - tH * 0.4, tW, tH, 2); ctx.fill();
    }
    ctx.restore();

  } else if (sunFlipProg < 0.45) {
    /* Visage DOS (calme, yeux fermés) */
    var backAlpha = Math.min(1, (0.45 - sunFlipProg) / 0.25);
    ctx.save(); ctx.globalAlpha = backAlpha * 0.5;
    ctx.strokeStyle = '#b08800'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    var eyBY = -SUN_R * 0.05;
    var bexArr = [-SUN_R * 0.30, SUN_R * 0.30];
    for (var bei = 0; bei < 2; bei++) {
      ctx.beginPath(); ctx.arc(bexArr[bei], eyBY, SUN_R * 0.14, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0, SUN_R * 0.15, SUN_R * 0.22, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

/* ══════════════════════════════════════════════════════════════════════════
   LUNE — Visage guide (coin haut-droit)
   Regarde le joueur quand c'est safe, se cache quand le soleil regarde
   ══════════════════════════════════════════════════════════════════════════ */
function _drawMoon() {
  var mx = W - MOON_R - MOON_PAD, my = _sunY();
  var safe = (phase === 'count' || phase === 'unturning');
  var danger = (phase === 'stop');

  /* Halo lunaire */
  var mHalo = ctx.createRadialGradient(mx, my, MOON_R * 0.3, mx, my, MOON_R * 2.2);
  mHalo.addColorStop(0, safe ? 'rgba(180,200,255,0.18)' : 'rgba(255,120,60,0.10)');
  mHalo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mHalo; ctx.beginPath(); ctx.arc(mx, my, MOON_R * 2.2, 0, Math.PI * 2); ctx.fill();

  /* Corps lunaire (croissant) */
  ctx.save();
  ctx.beginPath(); ctx.arc(mx, my, MOON_R, 0, Math.PI * 2); ctx.clip();
  var mG = ctx.createRadialGradient(mx - MOON_R * 0.3, my - MOON_R * 0.3, 2, mx, my, MOON_R);
  mG.addColorStop(0, '#f0f0ff'); mG.addColorStop(0.5, '#d8dce8'); mG.addColorStop(1, '#b0b4c8');
  ctx.fillStyle = mG; ctx.beginPath(); ctx.arc(mx, my, MOON_R, 0, Math.PI * 2); ctx.fill();
  /* Ombre croissant */
  ctx.fillStyle = 'rgba(10,5,30,0.65)';
  ctx.beginPath(); ctx.arc(mx + MOON_R * 0.45, my, MOON_R * 0.85, 0, Math.PI * 2); ctx.fill();
  /* Cratères */
  ctx.fillStyle = 'rgba(140,140,165,0.35)';
  ctx.beginPath(); ctx.arc(mx - MOON_R * 0.25, my - MOON_R * 0.15, MOON_R * 0.12, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx - MOON_R * 0.05, my + MOON_R * 0.30, MOON_R * 0.08, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  /* Contour lumineux */
  ctx.strokeStyle = safe ? 'rgba(200,210,255,0.5)' : 'rgba(255,150,80,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(mx, my, MOON_R, 0, Math.PI * 2); ctx.stroke();

  /* Visage de la Lune */
  var eyeY = my - MOON_R * 0.12;
  var eyeLX = mx - MOON_R * 0.28, eyeRX = mx - MOON_R * 0.02;
  var eyeOpen = moonBlink ? 0 : 1;

  if (safe) {
    /* Yeux ouverts — regarde vers le bas (le joueur) */
    if (eyeOpen) {
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(eyeLX, eyeY, MOON_R * 0.07, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(eyeRX, eyeY, MOON_R * 0.07, 0, Math.PI * 2); ctx.fill();
      /* Pupilles vers le bas */
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(eyeLX, eyeY - MOON_R * 0.025, MOON_R * 0.025, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(eyeRX, eyeY - MOON_R * 0.025, MOON_R * 0.025, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(eyeLX - MOON_R * 0.06, eyeY); ctx.lineTo(eyeLX + MOON_R * 0.06, eyeY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeRX - MOON_R * 0.06, eyeY); ctx.lineTo(eyeRX + MOON_R * 0.06, eyeY); ctx.stroke();
    }
    /* Petit sourire encourageant */
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1.3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(mx - MOON_R * 0.15, my + MOON_R * 0.12, MOON_R * 0.14, 0.2, Math.PI - 0.2); ctx.stroke();

  } else if (danger) {
    /* Yeux fermés serrés — la Lune se cache */
    ctx.strokeStyle = '#553333'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(eyeLX - MOON_R * 0.07, eyeY - MOON_R * 0.03); ctx.lineTo(eyeLX + MOON_R * 0.07, eyeY + MOON_R * 0.03); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eyeRX - MOON_R * 0.07, eyeY - MOON_R * 0.03); ctx.lineTo(eyeRX + MOON_R * 0.07, eyeY + MOON_R * 0.03); ctx.stroke();
    /* Bouche inquiète (petit O) */
    ctx.strokeStyle = '#553333'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(mx - MOON_R * 0.15, my + MOON_R * 0.15, MOON_R * 0.07, 0, Math.PI * 2); ctx.stroke();

  } else {
    /* Transition — yeux mi-clos */
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(eyeLX - MOON_R * 0.06, eyeY); ctx.lineTo(eyeLX + MOON_R * 0.06, eyeY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eyeRX - MOON_R * 0.06, eyeY); ctx.lineTo(eyeRX + MOON_R * 0.06, eyeY); ctx.stroke();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(mx - MOON_R * 0.15, my + MOON_R * 0.12, MOON_R * 0.10, 0.3, Math.PI - 0.3); ctx.stroke();
  }
}

/* ── JAUGE DE PROGRESSION ──────────────────────────────────────────────── */
function _drawProgressBar() {
  var barW = W * 0.65, barH = 14;
  var barX = (W - barW) / 2, barY = H - 50;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.roundRect(barX - 2, barY - 2, barW + 4, barH + 4, 8); ctx.fill();
  var fillW = barW * progress;
  var col = progress < 0.5 ? '#44aaff' : progress < 0.85 ? '#44ff88' : '#FFD700';
  var gFill = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  gFill.addColorStop(0, col); gFill.addColorStop(1, '#fff');
  ctx.fillStyle = gFill;
  ctx.beginPath(); ctx.roundRect(barX, barY, fillW, barH, 6); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 6); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px system-ui'; ctx.textAlign = 'center';
  ctx.fillText(Math.floor(progress * 100) + '%', W / 2, barY + barH + 16);
}

/* ── LABELS PHASE ──────────────────────────────────────────────────────── */
function _drawPhaseLabel() {
  var cx = W / 2, y = H * 0.42;
  ctx.textAlign = 'center';

  if (phase === 'count' || phase === 'unturning') {
    var labels = ['', '1', '1  2', '1  2  3'];
    var txt = countStep >= 4 ? '' : (labels[countStep] || '');
    if (txt) {
      var numSize = Math.floor(W * 0.13);
      ctx.save();
      ctx.globalAlpha = 0.8 + 0.2 * Math.sin(bgT * 0.1);
      ctx.fillStyle = '#ffee88';
      ctx.font = 'bold ' + numSize + 'px system-ui';
      ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 25;
      ctx.fillText(txt, cx, y);
      /* Double glow */
      ctx.shadowBlur = 50; ctx.globalAlpha = 0.3;
      ctx.fillText(txt, cx, y);
      ctx.restore();
    }

  } else if (phase === 'turning') {
    var soleilSize = Math.floor(W * 0.13);
    ctx.save();
    var pulse = 0.7 + 0.3 * Math.abs(Math.sin(bgT * 0.3));
    ctx.globalAlpha = pulse; ctx.fillStyle = '#ff4400';
    ctx.font = 'bold ' + soleilSize + 'px system-ui';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 35;
    ctx.fillText('SOLEIL !', cx, y);
    /* Glow intense */
    ctx.shadowBlur = 70; ctx.globalAlpha = pulse * 0.25;
    ctx.fillText('SOLEIL !', cx, y);
    ctx.restore();

  } else if (phase === 'stop') {
    /* Icône danger pulsante */
    ctx.save();
    var dangerPulse = 0.6 + 0.4 * Math.abs(Math.sin(bgT * 0.25));
    ctx.globalAlpha = dangerPulse; ctx.fillStyle = '#ff6600';
    ctx.font = 'bold ' + Math.floor(W * 0.12) + 'px system-ui';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 30;
    ctx.fillText('☀️', cx, y);
    ctx.restore();
  }
}
