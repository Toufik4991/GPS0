<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#66aaff}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:52px;text-align:right}
#game-container{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}
canvas{display:block;width:100%;height:100%}
body{display:flex;flex-direction:column;height:100dvh}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:30</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
window.NIVEAU = 5;
window.GPS0_TIMER_SEC = 150;
window.GPS0_onTimerExpired = function () { endGame(true); };
window.TUTO_TEXT = "\ud83e\uddf2 Maintiens = aimant actif · Attire les bleus · Fuis les rouges !<br><small>Maintiens 2:30 pour gagner</small>";

/* ── CONSTANTES ─────────────────────────────────────────────────────────── */
const COSMO_R    = 26;
const MAG_R      = 148;
const COLLECT_R  = COSMO_R + 14;   // 40
const EXPLODE_R  = COSMO_R + 14;   // 40
const GOOD_MAX   = 18;
const TRAP_MAX   = 7;
const DEBRIS_INT = 108;
const MAG_FG     = 0.28;  // force attraction bons
const MAG_FT     = 0.22;  // force attraction pieges

/* ── ETAT ───────────────────────────────────────────────────────────────── */
let cv, ctx, W, H, cx, cy;
let holding = false;
let goodFrags, trapFrags, debris, particles, bgStars, bgDust;
let arcPhase, frame, rafId, lastT, expFlash;

/* ── RESET ──────────────────────────────────────────────────────────────── */
function gameReset() {
  cancelAnimationFrame(rafId);
  holding = false; arcPhase = 0; frame = 0; lastT = 0; expFlash = 0;
  goodFrags = []; trapFrags = []; debris = []; particles = [];
  bgStars = []; bgDust = [];
}
window.gameReset = gameReset;

/* ── DEMARRAGE ──────────────────────────────────────────────────────────── */
function gameStart() {
  cv  = document.getElementById('cv');
  ctx = cv.getContext('2d');
  GPS0_resizeCanvas(cv);
  // Fallback si le game-container n'a pas encore de taille résolue
  if (!cv.width || !cv.height) {
    const hud = document.getElementById('hud');
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight - (hud ? hud.offsetHeight : 44);
  }
  W = cv.width; H = cv.height; cx = W / 2; cy = H / 2;
  _initBg();
  cv.addEventListener('pointerdown',   _onDown);
  cv.addEventListener('pointerup',     _onUp);
  cv.addEventListener('pointercancel', _onUp);
  cv.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  lastT = performance.now();
  rafId = requestAnimationFrame(_loop);
}
window.gameStart = gameStart;

window.onResize = function () {
  GPS0_resizeCanvas(cv);
  W = cv.width; H = cv.height; cx = W / 2; cy = H / 2;
};

/* ── CONTROLES ──────────────────────────────────────────────────────────── */
function _onDown(e) { e.preventDefault(); if (GPS0_running()) holding = true; }
function _onUp(e)   { e.preventDefault(); holding = false; }

/* ── INIT DECOR ─────────────────────────────────────────────────────────── */
function _initBg() {
  for (let i = 0; i < 90; i++)
    bgStars.push({ x: Math.random(), y: Math.random(),
      r: 0.3 + Math.random() * 1.7,
      tp: Math.random() * Math.PI * 2,
      ts: 0.3 + Math.random() * 0.9 });
  for (let i = 0; i < 22; i++)
    bgDust.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.16,
      vy: (Math.random() - 0.5) * 0.16,
      r: 0.4 + Math.random() * 1.4,
      a: 0.07 + Math.random() * 0.16 });
  for (let i = 0; i < 13; i++) _spawnGood();
}

/* ── HELPERS SPAWN ──────────────────────────────────────────────────────── */
function _edge() {
  const side = Math.random() * 4 | 0;
  if (side === 0) return { x: Math.random() * W, y: -26 };
  if (side === 1) return { x: W + 26, y: Math.random() * H };
  if (side === 2) return { x: Math.random() * W, y: H + 26 };
  return               { x: -26, y: Math.random() * H };
}

function _spawnGood() {
  if (goodFrags.length >= GOOD_MAX) return;
  const { x, y } = _edge();
  const a = Math.atan2(cy - y, cx - x) + (Math.random() - 0.5) * 1.5;
  const s = 0.5 + Math.random() * 1.3;
  goodFrags.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                   r: 7 + Math.random() * 4, ph: Math.random() * Math.PI * 2 });
}

function _spawnTrap() {
  if (trapFrags.length >= TRAP_MAX) return;
  const { x, y } = _edge();
  // Vitesse orbitale pour tourner autour du centre plutot que foncer dessus
  const toC  = Math.atan2(cy - y, cx - x);
  const tang = toC + (Math.random() < 0.5 ? 1 : -1) * Math.PI * 0.5;
  const sv   = 0.85 + Math.random() * 0.85;
  const iv   = 0.12 + Math.random() * 0.22;
  trapFrags.push({
    x, y,
    vx: Math.cos(tang)*sv + Math.cos(toC)*iv,
    vy: Math.sin(tang)*sv + Math.sin(toC)*iv,
    r: 8 + Math.random() * 4, ph: Math.random() * Math.PI * 2 });
}

function _spawnDebris() {
  if (debris.length >= 5) return;
  const { x, y } = _edge();
  const a = Math.atan2(cy - y, cx - x) + (Math.random() - 0.5) * 0.75;
  const s = 1.6 + Math.random() * 1.9;
  const r = 11 + Math.random() * 14;
  debris.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                r, rot: Math.random() * Math.PI * 2,
                rv: (Math.random() - 0.5) * 0.055 });
}

function _burst(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.5 + Math.random() * 3.5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                     r: 1.5 + Math.random() * 3.5, col, al: 1 });
  }
}

/* ── BOUCLE ─────────────────────────────────────────────────────────────── */
function _loop(now) {
  rafId = requestAnimationFrame(_loop);
  if (!GPS0_running()) return;
  const dt = Math.min((now - lastT) / 16.67, 3);
  lastT = now; frame++;
  W = cv.width || window.innerWidth;
  H = cv.height || (window.innerHeight - 44);
  cx = W / 2; cy = H / 2;
  arcPhase += 0.027 * dt;
  _update(dt);
  _draw();
}

/* ── UPDATE ─────────────────────────────────────────────────────────────── */
function _update(dt) {
  /* spawns */
  if (frame % DEBRIS_INT === 0)          _spawnDebris();
  if (frame % 88  === 0)                 _spawnGood();
  if (frame > 600 && frame % 185 === 0)  _spawnTrap();

  /* bgDust derive */
  for (const d of bgDust) {
    d.x = (d.x + d.vx * dt + W) % W;
    d.y = (d.y + d.vy * dt + H) % H;
  }

  /* bons fragments */
  for (let i = goodFrags.length - 1; i >= 0; i--) {
    const f  = goodFrags[i];
    f.ph    += 0.042 * dt;
    const dx = cx - f.x, dy = cy - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 0.01;
    if (holding && dist < MAG_R) {
      const force = MAG_FG * dt * (1 - dist / MAG_R);
      f.vx += dx / dist * force;
      f.vy += dy / dist * force;
    }
    f.vx *= Math.pow(0.990, dt); f.vy *= Math.pow(0.990, dt);
    f.x  += f.vx * dt; f.y += f.vy * dt;
    /* rebond bords */
    if (f.x < f.r)     { f.x = f.r;     f.vx =  Math.abs(f.vx) * 0.55; }
    if (f.x > W - f.r) { f.x = W - f.r; f.vx = -Math.abs(f.vx) * 0.55; }
    if (f.y < f.r)     { f.y = f.r;     f.vy =  Math.abs(f.vy) * 0.55; }
    if (f.y > H - f.r) { f.y = H - f.r; f.vy = -Math.abs(f.vy) * 0.55; }
    if (dist < COLLECT_R) {
      _burst(f.x, f.y, '#88ddff', 9);
      goodFrags.splice(i, 1);
      addDust(2);
    }
  }

  /* fragments pieges */
  for (let i = trapFrags.length - 1; i >= 0; i--) {
    const f  = trapFrags[i];
    f.ph    += 0.068 * dt;
    const dx = cx - f.x, dy = cy - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 0.01;
    if (holding && dist < MAG_R) {
      const force = MAG_FT * dt * (1 - dist / MAG_R);
      f.vx += dx / dist * force;
      f.vy += dy / dist * force;
    }
    f.vx *= Math.pow(0.988, dt); f.vy *= Math.pow(0.988, dt);
    f.x  += f.vx * dt; f.y += f.vy * dt;
    /* rebond bords (traps restent a l'ecran) */
    if (f.x < f.r)     { f.x = f.r;     f.vx =  Math.abs(f.vx) * 0.5; }
    if (f.x > W - f.r) { f.x = W - f.r; f.vx = -Math.abs(f.vx) * 0.5; }
    if (f.y < f.r)     { f.y = f.r;     f.vy =  Math.abs(f.vy) * 0.5; }
    if (f.y > H - f.r) { f.y = H - f.r; f.vy = -Math.abs(f.vy) * 0.5; }
    if (dist < EXPLODE_R) {
      expFlash = 1;
      _burst(f.x, f.y, '#ff4422', 18);
      _burst(f.x, f.y, '#ffaa00', 10);
      trapFrags.splice(i, 1);
      loseLife();
      if (navigator.vibrate) navigator.vibrate([60, 30, 120]);
    }
  }

  /* debris */
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i];
    d.x += d.vx * dt; d.y += d.vy * dt; d.rot += d.rv * dt;
    const dx = cx - d.x, dy = cy - d.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < COSMO_R + d.r - 5) {
      _burst(d.x, d.y, '#aabbcc', 10);
      debris.splice(i, 1);
      loseLife();
      if (navigator.vibrate) navigator.vibrate(75);
      continue;
    }
    if (d.x < -130 || d.x > W + 130 || d.y < -130 || d.y > H + 130)
      debris.splice(i, 1);
  }

  /* particules */
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.92; p.vy *= 0.92;
    p.al -= 0.035 * dt;
    if (p.al <= 0) particles.splice(i, 1);
  }

  /* flash explosion */
  if (expFlash > 0) expFlash = Math.max(0, expFlash - 0.06 * dt);
}

/* ── DRAW ───────────────────────────────────────────────────────────────── */
function _draw() {
  ctx.clearRect(0, 0, W, H);

  /* fond espace */
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.8);
  bg.addColorStop(0,    '#18082e');
  bg.addColorStop(0.52, '#0b0720');
  bg.addColorStop(1,    '#03020e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  /* etoiles */
  const ts = Date.now() * 0.001;
  for (const s of bgStars) {
    const br = 0.35 + 0.65 * Math.abs(Math.sin(ts * s.ts + s.tp));
    ctx.save();
    ctx.globalAlpha = br * 0.88;
    ctx.fillStyle   = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  /* poussiere de fond (bleuee) */
  for (const d of bgDust) {
    ctx.save();
    ctx.globalAlpha = d.a;
    ctx.fillStyle   = '#5577cc';
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  /* flash explosion */
  if (expFlash > 0) {
    ctx.save();
    ctx.globalAlpha = expFlash * 0.38;
    ctx.fillStyle   = '#ff3300';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  /* ring zone magnetique (pointille discret) */
  ctx.save();
  ctx.globalAlpha = holding ? 0.24 : 0.07;
  ctx.strokeStyle = '#4499ff';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([5, 9]);
  ctx.beginPath();
  ctx.arc(cx, cy, MAG_R, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  /* arcs champ magnetique (quand hold) */
  if (holding) _drawMagField();

  /* bons fragments */
  for (const f of goodFrags)  _drawGoodFrag(f);

  /* fragments pieges */
  for (const f of trapFrags)  _drawTrapFrag(f);

  /* debris */
  for (const d of debris)     _drawDebris(d);

  /* particules */
  for (const p of particles) {
    if (p.al <= 0) continue;
    ctx.save();
    ctx.globalAlpha = p.al;
    ctx.fillStyle   = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  /* cosmonaute centre */
  drawCosmonaut(ctx, cx, cy, COSMO_R, 0, holding ? 'fly' : 'idle');

  /* halo aimant autour du cosmo */
  if (holding) {
    const haloR = COSMO_R + 9 + Math.sin(arcPhase * 5) * 3;
    ctx.save();
    ctx.globalAlpha   = 0.55;
    ctx.strokeStyle   = '#88ccff';
    ctx.lineWidth     = 2;
    ctx.shadowColor   = '#4499ff';
    ctx.shadowBlur    = 12;
    ctx.beginPath();
    ctx.arc(cx, cy, haloR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  /* label hint bas de l'ecran */
  ctx.save();
  ctx.globalAlpha = 0.52;
  ctx.fillStyle   = '#8899ee';
  ctx.font        = '12px system-ui';
  ctx.textAlign   = 'center';
  ctx.fillText(holding ? '\u25a0 AIMANT ACTIF' : 'Hold = aimant', cx, H - 12);
  ctx.restore();
}

/* ── CHAMP MAGNETIQUE (arcs) ────────────────────────────────────────────── */
function _drawMagField() {
  const N = 8;
  for (let i = 0; i < N; i++) {
    const base = (i / N) * Math.PI * 2 + arcPhase * 0.65;
    ctx.save();
    ctx.globalAlpha = 0.11 + 0.07 * Math.sin(arcPhase * 2.8 + i * 0.7);
    ctx.strokeStyle = '#4499ff';
    ctx.lineWidth   = 1.4;
    ctx.beginPath();
    const steps  = 20;
    const rInner = COSMO_R + 10;
    const rOuter = MAG_R;
    for (let s = 0; s <= steps; s++) {
      const frac  = s / steps;
      const r     = rInner + (rOuter - rInner) * frac;
      const spr   = 0.42 * (1 - frac * 0.5);
      const angle = base + Math.sin(frac * Math.PI) * spr;
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;
      s === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }
  /* lueur radiale centrale (aimant actif) */
  ctx.save();
  ctx.globalAlpha = 0.06 + 0.04 * Math.sin(arcPhase * 4);
  const glow = ctx.createRadialGradient(cx, cy, COSMO_R, cx, cy, MAG_R);
  glow.addColorStop(0, 'rgba(68,153,255,0.6)');
  glow.addColorStop(1, 'rgba(68,153,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, MAG_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/* ── FRAGMENT BON (diamant bleu) ────────────────────────────────────────── */
function _drawGoodFrag(f) {
  const pulse = 0.82 + 0.18 * Math.sin(f.ph);
  /* lueur */
  ctx.save();
  ctx.globalAlpha = 0.16 * pulse;
  const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 2.8);
  g.addColorStop(0, '#88ddff'); g.addColorStop(1, 'rgba(68,153,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 2.8, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  /* diamant */
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.ph * 0.35);
  const r = f.r * pulse;
  ctx.fillStyle   = '#88ddff';
  ctx.strokeStyle = '#ccffff';
  ctx.lineWidth   = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, -r); ctx.lineTo(r * 0.58, 0);
  ctx.lineTo(0,  r); ctx.lineTo(-r * 0.58, 0);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  /* reflet interieur */
  ctx.globalAlpha = 0.5;
  ctx.fillStyle   = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(0, -r * 0.48); ctx.lineTo(r * 0.24, -r * 0.08);
  ctx.lineTo(0,  r * 0.22); ctx.lineTo(-r * 0.24, -r * 0.08);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* ── FRAGMENT PIEGE (etoile rouge) ─────────────────────────────────────── */
function _drawTrapFrag(f) {
  const pulse = 0.65 + 0.35 * Math.abs(Math.sin(f.ph));
  /* lueur rouge */
  ctx.save();
  ctx.globalAlpha = 0.22 * pulse;
  const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 3);
  g.addColorStop(0, '#ff4422'); g.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  /* etoile 8 branches */
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.ph * 0.55);
  const r = f.r * pulse;
  ctx.fillStyle   = '#ff4422';
  ctx.strokeStyle = '#ffaa00';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a  = (i / 8) * Math.PI * 2;
    const rr = i % 2 === 0 ? r : r * 0.46;
    i === 0 ? ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr)
            : ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  /* croix alerte */
  ctx.globalAlpha = 0.88;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = 1.4;
  ctx.beginPath();
  ctx.moveTo(-r * 0.3, -r * 0.3); ctx.lineTo( r * 0.3,  r * 0.3);
  ctx.moveTo( r * 0.3, -r * 0.3); ctx.lineTo(-r * 0.3,  r * 0.3);
  ctx.stroke();
  ctx.restore();
}

/* ── DEBRIS (asteroide gris) ────────────────────────────────────────────── */
function _drawDebris(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.rotate(d.rot);
  /* polygone irregulier */
  ctx.beginPath();
  const pts = 7;
  for (let i = 0; i < pts; i++) {
    const a  = (i / pts) * Math.PI * 2;
    const rr = d.r * (0.70 + 0.30 * Math.sin(i * 2.2 + d.rot));
    i === 0 ? ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr)
            : ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
  }
  ctx.closePath();
  ctx.fillStyle   = '#58606e';
  ctx.strokeStyle = '#8a9aaa';
  ctx.lineWidth   = 1.5;
  ctx.fill(); ctx.stroke();
  /* crateres */
  ctx.globalAlpha = 0.30;
  ctx.fillStyle   = '#303540';
  ctx.beginPath(); ctx.arc(d.r * 0.22, -d.r * 0.17, d.r * 0.21, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-d.r * 0.27, d.r * 0.13, d.r * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}
</script>
