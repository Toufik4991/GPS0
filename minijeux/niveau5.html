<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS0 N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:6px 52px 6px 10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);flex-shrink:0}
#lives{font-size:1.1rem;letter-spacing:2px;min-width:54px}
#timer{flex:1;text-align:center;font-size:.95rem;font-weight:bold;color:#FFD700}
#score-hud{font-size:.9rem;color:#FFD700;font-weight:bold;min-width:52px;text-align:right}
#game-container{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}
canvas{display:block;width:100%;height:100%}
body{display:flex;flex-direction:column;height:100dvh}
</style>
</head>
<body>
<div id="hud">
  <span id="lives">&#10084;&#10084;&#10084;</span>
  <span id="timer">2:30</span>
  <span id="score-hud">0 &#10024;</span>
</div>
<div id="game-container">
  <canvas id="cv"></canvas>
</div>
<script src="shared.js"></script>
<script>
window.NIVEAU = 5;
window.GPS0_TIMER_SEC = 150;
window.GPS0_onTimerExpired = function () { endGame(true); };
window.TUTO_TEXT = "☀️ 1-2-3 Soleil ! Avance quand le soleil regarde ailleurs 🔆<br><small>Reste IMMOBILE quand il te regarde ! Atteins-le pour gagner !</small>";

/* ── CONSTANTES ─────────────────────────────────────────────────────────── */
const SUN_R    = 46;
const COSMO_R  = 18;
const STEP_PX  = 22;
const STARDUST_N = 48;
const PHASE_GO_MIN   = 1800;
const PHASE_GO_MAX   = 3800;
const PHASE_TURN_MS  = 600;
const PHASE_STOP_MIN = 1400;
const PHASE_STOP_MAX = 3000;

/* ── ETAT ───────────────────────────────────────────────────────────────── */
let cv, ctx, W, H;
let sunX, sunY, pathTop, pathBot;
let playerY;
let phase;
let phaseTimer;
let bgT;
let particles, stardust;
let tapped;
let lastT, rafId;
let stopFlash;

/* ── RESET ──────────────────────────────────────────────────────────────── */
function gameReset() {
  cancelAnimationFrame(rafId);
  playerY    = 0;
  phase      = 'go';
  phaseTimer = _rnd(PHASE_GO_MIN, PHASE_GO_MAX);
  bgT        = 0;
  particles  = [];
  tapped     = false;
  stopFlash  = 0;
  _initStardust();
}
window.gameReset = gameReset;

/* ── DEMARRAGE ──────────────────────────────────────────────────────────── */
function gameStart() {
  cv  = document.getElementById('cv');
  ctx = cv.getContext('2d');
  GPS0_resizeCanvas(cv);
  if (!cv.width || !cv.height) {
    const hud = document.getElementById('hud');
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight - (hud ? hud.offsetHeight : 44);
  }
  _calcLayout();
  cv.addEventListener('pointerdown', _onTap);
  cv.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  lastT = performance.now();
  rafId = requestAnimationFrame(_loop);
}
window.gameStart = gameStart;

window.onResize = function () {
  GPS0_resizeCanvas(cv);
  _calcLayout();
};

function _calcLayout() {
  W = cv.width; H = cv.height;
  sunX    = W / 2;
  sunY    = SUN_R + 30;
  pathTop = sunY + SUN_R + COSMO_R + 22;
  pathBot = H - COSMO_R - 32;
}

/* ── HELPERS ────────────────────────────────────────────────────────────── */
function _rnd(a, b) { return a + Math.random() * (b - a); }
function _playerPY() { return pathBot - playerY * (pathBot - pathTop); }

/* ── STARDUST ────────────────────────────────────────────────────────────── */
function _initStardust() {
  stardust = [];
  for (let i = 0; i < STARDUST_N; i++) {
    const p = (i + 0.5) / STARDUST_N;
    const jitter = _rnd(-1, 1) * (W ? W * 0.18 : 40);
    stardust.push({ t: p, ox: jitter, r: 3.5 + Math.random() * 3.5,
      ph: Math.random() * Math.PI * 2, collected: false });
  }
}

/* ── CONTROLES ──────────────────────────────────────────────────────────── */
function _onTap(e) {
  e.preventDefault();
  if (!GPS0_running()) return;
  if (phase === 'stop' || phase === 'turning') {
    stopFlash = 1;
    loseLife();
    if (navigator.vibrate) navigator.vibrate([80, 40, 160]);
    return;
  }
  tapped = true;
  playerY = Math.min(1, playerY + STEP_PX / (pathBot - pathTop));
  if (navigator.vibrate) navigator.vibrate(5);
  if (playerY >= 1) { endGame(true); }
}

/* ── BOUCLE ─────────────────────────────────────────────────────────────── */
function _loop(now) {
  rafId = requestAnimationFrame(_loop);
  if (!GPS0_running()) return;
  const dtMs = Math.min(now - lastT, 80);
  lastT = now;
  bgT  += dtMs / 16.67;
  W = cv.width || window.innerWidth;
  H = cv.height || (window.innerHeight - 44);
  sunX = W / 2; sunY = SUN_R + 30;
  pathTop = sunY + SUN_R + COSMO_R + 22;
  pathBot = H - COSMO_R - 32;
  _updatePhase(dtMs);
  _collectStardust();
  _updateParticles(dtMs / 16.67);
  _draw();
  tapped = false;
}

/* ── PHASE ───────────────────────────────────────────────────────────────── */
function _updatePhase(dtMs) {
  phaseTimer -= dtMs;
  if (phaseTimer > 0) return;
  if (phase === 'go')      { phase = 'turning'; phaseTimer = PHASE_TURN_MS; }
  else if (phase === 'turning') { phase = 'stop'; phaseTimer = _rnd(PHASE_STOP_MIN, PHASE_STOP_MAX); }
  else                     { phase = 'go';  phaseTimer = _rnd(PHASE_GO_MIN, PHASE_GO_MAX); }
}

/* ── STARDUST COLLECT ────────────────────────────────────────────────────── */
function _collectStardust() {
  const py = _playerPY();
  for (const s of stardust) {
    if (s.collected) continue;
    const sy = pathBot - s.t * (pathBot - pathTop);
    const sx = sunX + s.ox;
    const dx = sunX - sx, dy = py - sy;
    if (dx * dx + dy * dy < (COSMO_R + s.r) * (COSMO_R + s.r)) {
      s.collected = true;
      addDust(1);
      for (let i = 0; i < 7; i++) {
        const a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 3;
        particles.push({ x: sx, y: sy, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
          r: 2 + Math.random() * 2.5, col: `hsl(${40 + Math.random()*40},100%,80%)`, al: 1 });
      }
    }
  }
}

/* ── PARTICULES ──────────────────────────────────────────────────────────── */
function _updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.93; p.vy *= 0.93;
    p.al -= 0.028 * dt;
    if (p.al <= 0) particles.splice(i, 1);
  }
}

/* ── DRAW ─────────────────────────────────────────────────────────────── */
function _draw() {
  ctx.clearRect(0, 0, W, H);

  // Fond dégradé chaud
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a0e00'); bg.addColorStop(0.35, '#2e1800');
  bg.addColorStop(0.78, '#180f00'); bg.addColorStop(1, '#0d0800');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Halo ambiance soleil
  const hA = phase === 'stop' ? 0.18 : phase === 'turning' ? 0.24 + 0.08 * Math.sin(bgT * 0.55) : 0.11;
  const hl = ctx.createRadialGradient(sunX, sunY, SUN_R, sunX, sunY, H * 0.80);
  hl.addColorStop(0, `rgba(255,200,40,${hA.toFixed(2)})`);
  hl.addColorStop(0.45, `rgba(255,110,10,${(hA * 0.32).toFixed(2)})`);
  hl.addColorStop(1, 'rgba(255,60,0,0)');
  ctx.fillStyle = hl; ctx.fillRect(0, 0, W, H);

  // Chemin pointillé
  ctx.save(); ctx.globalAlpha = 0.26; ctx.strokeStyle = '#ffee99';
  ctx.lineWidth = 2.5; ctx.setLineDash([6, 11]);
  ctx.beginPath(); ctx.moveTo(sunX, pathTop); ctx.lineTo(sunX, pathBot); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // Stardust
  for (const s of stardust) {
    if (s.collected) continue;
    const sy = pathBot - s.t * (pathBot - pathTop);
    const sx = sunX + s.ox;
    const pulse = 0.60 + 0.40 * Math.sin(bgT * 0.09 + s.ph);
    ctx.save(); ctx.globalAlpha = 0.44 * pulse;
    ctx.fillStyle = `hsl(${45 + Math.sin(s.ph) * 20},100%,78%)`;
    ctx.beginPath(); ctx.arc(sx, sy, s.r * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Flash stop
  if (stopFlash > 0) {
    ctx.save(); ctx.globalAlpha = stopFlash * 0.44;
    ctx.fillStyle = '#ff0000'; ctx.fillRect(0, 0, W, H);
    ctx.restore();
    stopFlash = Math.max(0, stopFlash - 0.06);
  }

  // Particules
  for (const p of particles) {
    if (p.al <= 0) continue;
    ctx.save(); ctx.globalAlpha = p.al; ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Cosmonaute joueur
  const posY = _playerPY();
  drawCosmonaut(ctx, sunX, posY, COSMO_R, 0, (phase === 'go') ? 'fly' : 'idle');

  // Flèche progression
  if (phase === 'go' && playerY > 0) {
    const ay = posY - COSMO_R - 14;
    ctx.save(); ctx.globalAlpha = 0.62 + 0.28 * Math.sin(bgT * 0.14); ctx.fillStyle = '#ffdd44';
    ctx.beginPath(); ctx.moveTo(sunX, ay - 7); ctx.lineTo(sunX - 7, ay + 2); ctx.lineTo(sunX + 7, ay + 2);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  // SOLEIL MALÉFIQUE
  _drawSun();
  _drawPhaseLabel();
}

/* ── SOLEIL ────────────────────────────────────────────────────────────── */
function _drawSun() {
  const t = bgT;
  // Rayons
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 + t * 0.018;
    const rIn = SUN_R + 6;
    const rOut = SUN_R + 28 + 10 * Math.sin(t * 0.06 + i);
    ctx.save();
    ctx.globalAlpha = (phase === 'stop') ? 0.78 : (phase === 'turning') ? 0.52 + 0.24 * Math.sin(t * 0.45) : 0.32;
    ctx.strokeStyle = (phase === 'stop') ? '#ff7700' : '#ffdd44';
    ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sunX + Math.cos(a) * rIn, sunY + Math.sin(a) * rIn);
    ctx.lineTo(sunX + Math.cos(a) * rOut, sunY + Math.sin(a) * rOut);
    ctx.stroke(); ctx.restore();
  }
  // Halo
  const haloR = SUN_R + 22 + 5 * Math.sin(t * 0.08);
  const hg = ctx.createRadialGradient(sunX, sunY, SUN_R * 0.6, sunX, sunY, haloR);
  if (phase === 'stop') {
    hg.addColorStop(0, 'rgba(255,70,0,.72)'); hg.addColorStop(0.5, 'rgba(255,130,0,.30)'); hg.addColorStop(1, 'rgba(255,90,0,0)');
  } else if (phase === 'turning') {
    const ia = 0.52 + 0.30 * Math.abs(Math.sin(t * 0.36));
    hg.addColorStop(0, `rgba(255,180,0,${ia.toFixed(2)})`); hg.addColorStop(0.5, `rgba(255,200,40,${(ia*.4).toFixed(2)})`); hg.addColorStop(1, 'rgba(255,200,0,0)');
  } else {
    hg.addColorStop(0, 'rgba(255,240,120,.52)'); hg.addColorStop(0.5, 'rgba(255,220,80,.20)'); hg.addColorStop(1, 'rgba(255,200,0,0)');
  }
  ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(sunX, sunY, haloR, 0, Math.PI * 2); ctx.fill();

  // Corps soleil
  const sunCol = phase === 'stop' ? '#ff5500' : phase === 'turning' ? '#ffaa00' : '#ffdd22';
  const bodyG = ctx.createRadialGradient(sunX - SUN_R * 0.3, sunY - SUN_R * 0.3, 4, sunX, sunY, SUN_R);
  bodyG.addColorStop(0, '#fff5a0'); bodyG.addColorStop(0.4, sunCol); bodyG.addColorStop(1, phase === 'stop' ? '#cc3300' : '#e68800');
  ctx.fillStyle = bodyG; ctx.beginPath(); ctx.arc(sunX, sunY, SUN_R, 0, Math.PI * 2); ctx.fill();

  // Visage
  if (phase === 'go') {
    // Yeux fermés souriants
    ctx.save(); ctx.strokeStyle = '#6B3A00'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    const eyY0 = sunY - SUN_R * 0.12;
    for (const ex of [sunX - SUN_R * 0.38, sunX + SUN_R * 0.38]) {
      ctx.beginPath(); ctx.arc(ex, eyY0, SUN_R * 0.18, Math.PI * 0.1, Math.PI * 0.9); ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(sunX, sunY + SUN_R * 0.10, SUN_R * 0.32, Math.PI * 0.1, Math.PI * 0.9); ctx.stroke();
    ctx.restore();

  } else if (phase === 'turning') {
    const warn = Math.abs(Math.sin(t * 0.45));
    const eyY1 = sunY - SUN_R * 0.15;
    ctx.save(); ctx.strokeStyle = '#4a2000'; ctx.lineWidth = 3;
    for (const ex of [sunX - SUN_R * 0.36, sunX + SUN_R * 0.36]) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(ex, eyY1, SUN_R * 0.16, SUN_R * 0.13, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = `rgba(80,20,0,${(0.6 + 0.4 * warn).toFixed(2)})`;
      ctx.beginPath(); ctx.arc(ex + 2 * Math.cos(t * 0.38), eyY1 + 2 * Math.sin(t * 0.28), SUN_R * 0.07, 0, Math.PI * 2); ctx.fill();
    }
    ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.moveTo(sunX - SUN_R * 0.54, eyY1 - SUN_R * 0.22); ctx.lineTo(sunX - SUN_R * 0.20, eyY1 - SUN_R * 0.10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sunX + SUN_R * 0.54, eyY1 - SUN_R * 0.22); ctx.lineTo(sunX + SUN_R * 0.20, eyY1 - SUN_R * 0.10); ctx.stroke();
    ctx.restore();

  } else {
    // STOP — yeux méchants
    const eyY2 = sunY - SUN_R * 0.18;
    ctx.save();
    for (const ex of [sunX - SUN_R * 0.36, sunX + SUN_R * 0.36]) {
      ctx.fillStyle = '#fff'; ctx.strokeStyle = '#330000'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(ex, eyY2, SUN_R * 0.18, SUN_R * 0.22, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#cc0000'; ctx.beginPath(); ctx.arc(ex, eyY2 + SUN_R * 0.04, SUN_R * 0.11, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1a0000'; ctx.beginPath(); ctx.arc(ex, eyY2 + SUN_R * 0.04, SUN_R * 0.055, 0, Math.PI * 2); ctx.fill();
    }
    ctx.strokeStyle = '#330000'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sunX - SUN_R * 0.58, eyY2 - SUN_R * 0.32); ctx.lineTo(sunX - SUN_R * 0.16, eyY2 - SUN_R * 0.08); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sunX + SUN_R * 0.58, eyY2 - SUN_R * 0.32); ctx.lineTo(sunX + SUN_R * 0.16, eyY2 - SUN_R * 0.08); ctx.stroke();
    // Bouche rictus + dents
    const mY = sunY + SUN_R * 0.32;
    ctx.strokeStyle = '#1a0000'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(sunX, mY, SUN_R * 0.30, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
    ctx.fillStyle = '#ffffcc';
    const tW = SUN_R * 0.085, tH = SUN_R * 0.10;
    for (let ti = 0; ti < 4; ti++) {
      ctx.beginPath(); ctx.roundRect(sunX - SUN_R * 0.19 + ti * tW * 1.22, mY - tH * 0.5, tW, tH, 2); ctx.fill();
    }
    ctx.restore();
  }
}

/* ── LABEL PHASE ─────────────────────────────────────────────────────────── */
function _drawPhaseLabel() {
  ctx.textAlign = 'center';
  if (phase === 'go') {
    ctx.save(); ctx.globalAlpha = 0.60 + 0.28 * Math.sin(bgT * 0.12);
    ctx.fillStyle = '#88ff55'; ctx.font = `bold ${Math.floor(W * 0.07)}px system-ui`;
    ctx.fillText('AVANCE !', W / 2, H - 14); ctx.restore();
  } else if (phase === 'stop') {
    ctx.save(); ctx.globalAlpha = 0.72 + 0.28 * Math.abs(Math.sin(bgT * 0.22));
    ctx.fillStyle = '#ff3300'; ctx.font = `bold ${Math.floor(W * 0.09)}px system-ui`;
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 18;
    ctx.fillText('STOP !', W / 2, H - 14); ctx.restore();
  } else {
    ctx.save(); ctx.globalAlpha = 0.82 + 0.18 * Math.abs(Math.sin(bgT * 0.38));
    ctx.fillStyle = '#ffcc00'; ctx.font = `bold ${Math.floor(W * 0.075)}px system-ui`;
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 12;
    ctx.fillText('⚠️ ATTENTION…', W / 2, H - 14); ctx.restore();
  }
}
</script>
</body>
</html>
